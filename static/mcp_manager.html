<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 服务器管理 - Quest3 Agent</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <style>
        body { padding: 20px; min-height: 100vh; }
        @media (max-width: 768px) { body { padding: 0; } .page-container { border-radius: 0; } }
    </style>
</head>
<body class="gradient-bg">
    <div class="page-container">
        <div id="pageNav"></div>

        <div class="page-body">
            <!-- Tabs -->
            <div class="tabs" data-tabs="mcpTabs">
                <button class="tab active" data-tab="servers">服务器</button>
                <button class="tab" data-tab="tools">工具</button>
            </div>

            <!-- Servers Tab -->
            <div data-tab-panel="servers" class="tab-panel active" id="serversTab">
                <div class="add-card" onclick="openAddModal()">
                    <div class="icon">+</div>
                    <h2>添加 MCP 服务器</h2>
                    <p>连接到新的 MCP 工具服务器</p>
                </div>

                <div class="section-title">MCP 服务器列表</div>
                <div style="display: flex; flex-direction: column; gap: 16px;" id="serversList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- Tools Tab -->
            <div data-tab-panel="tools" class="tab-panel" id="toolsTab" style="display: none;">
                <div class="filter-controls">
                    <input type="text" id="toolSearch" class="form-control" placeholder="搜索工具..." oninput="filterTools()">
                    <select id="toolFilter" class="form-control" onchange="filterTools()">
                        <option value="all">全部</option>
                        <option value="mcp">MCP 服务器工具</option>
                        <option value="local">本地工具</option>
                    </select>
                </div>
                <div class="tools-grid" id="toolsList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Server Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加 MCP 服务器</h2>
                <button class="modal-close" onclick="SharedModal.close('addModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="serverName">服务器名称 *</label>
                    <input type="text" id="serverName" class="form-control" placeholder="例如：阿里云 Code Interpreter">
                </div>
                <div class="form-group">
                    <label for="serverUrl">服务器 URL *</label>
                    <input type="url" id="serverUrl" class="form-control" placeholder="https://dashscope.aliyuncs.com/api/v1/mcps/code_interpreter_mcp/mcp">
                </div>
                <div class="form-group">
                    <label for="serverType">服务器类型</label>
                    <select id="serverType" class="form-control">
                        <option value="standard">标准 MCP 服务器</option>
                        <option value="streamable">流式 HTTP 端点 (如阿里云)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="serverDescription">描述</label>
                    <textarea id="serverDescription" class="form-control" placeholder="描述此服务器提供的工具..."></textarea>
                </div>
                <div class="form-group">
                    <label for="authHeader">鉴权头 (可选)</label>
                    <input type="text" id="authHeader" class="form-control" placeholder="Authorization: Bearer YOUR_API_KEY">
                </div>
                <div class="form-group">
                    <label for="customHeaders">自定义 Headers (可选，每行一个，格式: key:value)</label>
                    <textarea id="customHeaders" class="form-control" placeholder="Content-Type: application/json"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addServer()">添加</button>
            </div>
        </div>
    </div>

    <!-- Tool Test Modal -->
    <div class="modal" id="testModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>测试工具: <span id="testToolName"></span></h2>
                <button class="modal-close" onclick="SharedModal.close('testModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="testArguments">参数 (JSON格式)</label>
                    <textarea id="testArguments" class="form-control" placeholder='{"param1": "value1"}'></textarea>
                </div>
                <div id="testResult" class="test-result"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeTestModal()">取消</button>
                <button class="btn btn-primary" onclick="testTool()">测试</button>
            </div>
        </div>
    </div>

    <script src="/static/core/Auth.js"></script>
    <script src="/static/shared/utils.js"></script>
    <script src="/static/shared/toast.js"></script>
    <script src="/static/shared/modal.js"></script>
    <script src="/static/shared/tabs.js"></script>
    <script src="/static/shared/nav.js"></script>
    <script>
        if (!Auth.requireAuth()) { throw new Error('Not authenticated'); }
        SharedNav.render(document.getElementById('pageNav'), { active: 'mcp' });

        const SERVERS_API = '/api/mcp/servers';
        const TOOLS_API = '/tools';
        let servers = [];
        let allTools = [];
        let currentTestTool = null;

        loadServers();
        loadAllTools();

        async function loadServers() {
            try {
                const response = await fetch(SERVERS_API);
                const data = await response.json();
                servers = data.servers || [];
                renderServers();
            } catch (error) {
                console.error('Error loading servers:', error);
                document.getElementById('serversList').innerHTML = '<div class="empty-state">加载失败，请刷新页面</div>';
            }
        }

        async function loadAllTools() {
            try {
                const serverTools = [];
                for (const server of servers) {
                    if (server.status === 'connected') {
                        const response = await fetch(`${SERVERS_API}/${server.id}/tools`);
                        const data = await response.json();
                        if (data.tools) {
                            data.tools.forEach(tool => serverTools.push({ ...tool, source: 'mcp', server_name: server.name, server_id: server.id }));
                        }
                    }
                }
                const localResponse = await fetch(TOOLS_API);
                const localData = await localResponse.json();
                const localTools = (localData.tools || []).map(tool => ({ ...tool, source: 'local' }));
                allTools = [...serverTools, ...localTools];
                renderTools();
            } catch (error) {
                console.error('Error loading tools:', error);
                document.getElementById('toolsList').innerHTML = '<div class="empty-state">加载失败，请刷新页面</div>';
            }
        }

        function renderServers() {
            const listEl = document.getElementById('serversList');
            if (servers.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><div class="icon">📡</div><h3>暂无 MCP 服务器</h3><p>点击上方卡片添加服务器</p></div>`;
                return;
            }
            listEl.innerHTML = '';
            servers.forEach(server => {
                const card = document.createElement('div');
                card.className = 'server-card';
                const statusIcon = server.status === 'connected' ? '✓' : server.status === 'connecting' ? '⟳' : '✗';
                const statusClass = server.status === 'connected' ? 'connected' : server.status === 'connecting' ? 'connecting' : 'disconnected';
                card.innerHTML = `
                    <div class="server-status ${statusClass}">${statusIcon}</div>
                    <div class="server-info">
                        <h3>${Utils.escapeHtml(server.name)}</h3>
                        <div class="url">${Utils.escapeHtml(server.url)}</div>
                        <div class="stats">
                            <span>工具数: ${server.tool_count || 0}</span>
                            ${server.last_connected ? `<span>最后连接: ${Utils.formatRelativeTime(server.last_connected)}</span>` : ''}
                        </div>
                    </div>
                    <div class="server-actions">
                        ${server.status !== 'connected' ? `<button class="btn btn-primary btn-sm" onclick="connectServer('${server.id}')">连接</button>` : `<button class="btn btn-secondary btn-sm" onclick="disconnectServer('${server.id}')">断开</button>`}
                        <button class="btn btn-secondary btn-sm" onclick="testServer('${server.id}')">测试</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteServer('${server.id}')">删除</button>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function renderTools() {
            const listEl = document.getElementById('toolsList');
            const search = document.getElementById('toolSearch').value.toLowerCase();
            const filter = document.getElementById('toolFilter').value;
            let filteredTools = allTools;
            if (search) filteredTools = filteredTools.filter(tool => tool.name.toLowerCase().includes(search) || (tool.description && tool.description.toLowerCase().includes(search)));
            if (filter !== 'all') filteredTools = filteredTools.filter(tool => tool.source === filter);
            if (filteredTools.length === 0) {
                listEl.innerHTML = allTools.length === 0
                    ? `<div class="empty-state"><div class="icon">🔧</div><h3>暂无可用工具</h3><p>添加并连接 MCP 服务器后可查看工具</p></div>`
                    : `<div class="empty-state"><div class="icon">🔍</div><h3>未找到匹配的工具</h3><p>尝试调整搜索条件</p></div>`;
                return;
            }
            listEl.innerHTML = '';
            filteredTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                let paramsHtml = '<div class="param-title">参数:</div><div class="param-list">无参数</div>';
                if (tool.input_schema && tool.input_schema.properties) {
                    const params = Object.keys(tool.input_schema.properties);
                    paramsHtml = `<div class="param-title">参数:</div><div class="param-list">${params.join(', ')}</div>`;
                }
                card.innerHTML = `
                    <div class="tool-header">
                        <span class="tool-name">${Utils.escapeHtml(tool.name)}</span>
                        <span class="source-badge ${tool.source}">${tool.source === 'mcp' ? 'MCP' : '本地'}${tool.source === 'mcp' && tool.server_name ? ` (${Utils.escapeHtml(tool.server_name)})` : ''}</span>
                    </div>
                    <div class="tool-description">${tool.description || '暂无描述'}</div>
                    <div class="tool-params">${paramsHtml}</div>
                    <div class="tool-actions">
                        <button class="btn btn-primary btn-sm" onclick="openTestModal('${Utils.escapeHtml(tool.name)}', '${tool.source}', '${tool.server_id || ''}')">测试</button>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function filterTools() { renderTools(); }

        function openAddModal() {
            document.getElementById('serverName').value = '';
            document.getElementById('serverUrl').value = '';
            document.getElementById('serverDescription').value = '';
            document.getElementById('authHeader').value = '';
            document.getElementById('customHeaders').value = '';
            document.getElementById('serverType').value = 'standard';
            SharedModal.open('addModal');
            document.getElementById('serverName').focus();
        }

        function closeAddModal() { SharedModal.close('addModal'); }

        async function addServer() {
            const name = document.getElementById('serverName').value.trim();
            const url = document.getElementById('serverUrl').value.trim();
            const description = document.getElementById('serverDescription').value.trim();
            const serverType = document.getElementById('serverType').value;
            const authHeader = document.getElementById('authHeader').value.trim();
            const headers = document.getElementById('customHeaders').value.trim();
            if (!name || !url) { showToast('请填写服务器名称和 URL', 'error'); return; }
            try {
                const response = await fetch(SERVERS_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, url, description, server_type: serverType, auth_header: authHeader, headers }) });
                const data = await response.json();
                if (data.success) { closeAddModal(); await loadServers(); showToast('服务器添加成功！'); }
                else showToast('添加失败: ' + (data.message || '未知错误'), 'error');
            } catch (error) { console.error(error); showToast('添加失败，请检查网络连接', 'error'); }
        }

        async function connectServer(serverId) {
            try {
                const response = await fetch(`${SERVERS_API}/${serverId}/connect`, { method: 'POST' });
                const data = await response.json();
                if (data.success) { await loadServers(); showToast('连接成功！'); }
                else showToast('连接失败: ' + (data.message || '未知错误'), 'error');
            } catch (error) { console.error(error); showToast('连接失败', 'error'); }
        }

        async function disconnectServer(serverId) {
            if (!confirm('确定要断开此服务器的连接吗？')) return;
            try {
                const response = await fetch(`${SERVERS_API}/${serverId}/disconnect`, { method: 'POST' });
                const data = await response.json();
                if (data.success) await loadServers();
            } catch (error) { console.error(error); showToast('操作失败', 'error'); }
        }

        async function testServer(serverId) {
            try {
                const response = await fetch(`${SERVERS_API}/${serverId}/test`);
                const data = await response.json();
                if (data.connected) showToast(`连接成功！延迟: ${data.latency_ms}ms, 工具数: ${data.tool_count}`);
                else showToast('连接失败: ' + (data.error || '未知错误'), 'error');
            } catch (error) { console.error(error); showToast('测试失败', 'error'); }
        }

        async function deleteServer(serverId) {
            const server = servers.find(s => s.id === serverId);
            if (!server) return;
            if (!confirm(`确定要删除服务器 "${server.name}" 吗？此操作不可恢复。`)) return;
            try {
                const response = await fetch(`${SERVERS_API}/${serverId}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.success) { await loadServers(); showToast('服务器已删除'); }
            } catch (error) { console.error(error); showToast('删除失败', 'error'); }
        }

        function openTestModal(toolName, source, serverId) {
            currentTestTool = { name: toolName, source, serverId };
            document.getElementById('testToolName').textContent = toolName;
            document.getElementById('testArguments').value = '';
            document.getElementById('testResult').style.display = 'none';
            SharedModal.open('testModal');
        }

        function closeTestModal() { SharedModal.close('testModal'); currentTestTool = null; }

        async function testTool() {
            if (!currentTestTool) return;
            const argumentsText = document.getElementById('testArguments').value.trim();
            const resultDiv = document.getElementById('testResult');
            try {
                let arguments = argumentsText ? JSON.parse(argumentsText) : {};
                const url = currentTestTool.source === 'local' ? '/api/mcp/call' : `${SERVERS_API}/${currentTestTool.serverId}/tools/call`;
                const body = { tool_name: currentTestTool.name, arguments };
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'test-result success';
                resultDiv.innerHTML = `<div class="result-title">测试成功!</div><pre>${JSON.stringify(data.result || data, null, 2)}</pre>`;
            } catch (error) {
                console.error(error);
                resultDiv.style.display = 'block';
                resultDiv.className = 'test-result error';
                resultDiv.innerHTML = `<div class="result-title">测试失败</div><pre>${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
