<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill 管理 - Quest3 Agent</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <style>
        body { padding: 20px; min-height: 100vh; }
        @media (max-width: 768px) { body { padding: 0; } .page-container { border-radius: 0; } }
        .filter-controls input { flex: 1; min-width: 0; }
        .filter-controls select { flex-shrink: 0; width: auto; max-width: 140px; }
    </style>
</head>
<body class="gradient-bg">
    <div class="page-container">
        <div id="pageNav"></div>

        <div class="page-body">
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="add-card" onclick="openNewEditor()" style="background: linear-gradient(135deg, rgba(102,126,234,0.12) 0%, rgba(118,75,162,0.12) 100%);">
                    <div class="icon">+</div>
                    <h2>创建新 Skill</h2>
                    <p>AI 辅助编写，支持纯提示词和脚本模式</p>
                </div>
                <div class="github-import-card" onclick="openGitHubImportModal()">
                    <div class="icon">📦</div>
                    <h2>从 GitHub 导入</h2>
                    <p>导入 GitHub 仓库中的 Skill</p>
                    <div class="import-progress" id="importProgress">
                        <div class="import-progress-bar" id="importProgressBar"></div>
                    </div>
                </div>
            </div>

            <div class="section-title">Skill 列表</div>

            <div class="filter-controls">
                <input type="text" id="skillSearch" class="form-control" placeholder="搜索 Skill..." oninput="filterSkills()">
                <select id="skillFilter" class="form-control" onchange="filterSkills()">
                    <option value="all">全部来源</option>
                    <option value="builtin">内置</option>
                    <option value="user">用户自定义</option>
                    <option value="github">GitHub</option>
                </select>
            </div>

            <div class="skill-grid" id="skillsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- View Skill Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content wide">
            <div class="modal-header">
                <h2 id="viewSkillTitle">查看 Skill</h2>
                <button class="modal-close" onclick="SharedModal.close('viewModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="viewSkillContent" class="skill-view-content"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="SharedModal.close('viewModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- GitHub Import Modal -->
    <div class="modal" id="githubModal">
        <div class="modal-content wide">
            <div class="modal-header">
                <h2>从 GitHub 导入 Skill</h2>
                <button class="modal-close" onclick="closeGitHubModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="githubRepo">GitHub 仓库地址 *</label>
                    <input type="text" id="githubRepo" class="form-control" placeholder="例如：github.com/owner/repo 或 https://github.com/owner/repo.git">
                    <p style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">支持格式：github.com/owner/repo、github.com/owner/repo#tag、github.com/owner/repo/tree/main/path</p>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label for="githubRef">版本 (可选)</label>
                        <input type="text" id="githubRef" class="form-control" placeholder="例如：main、v1.0.0、commit-hash">
                    </div>
                    <div class="form-field">
                        <label for="githubSubdir">子目录 (可选)</label>
                        <input type="text" id="githubSubdir" class="form-control" placeholder="例如：skills/">
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="githubAutoEnable" checked style="margin-right: 8px;">
                        <span style="font-size: 14px;">自动启用导入的 Skill</span>
                    </label>
                    <label style="display: flex; align-items: center; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="githubForceRefresh" style="margin-right: 8px;">
                        <span style="font-size: 14px;">强制刷新缓存</span>
                    </label>
                </div>
                <div id="githubImportResult" style="display: none; margin-bottom: 20px;"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeGitHubModal()">取消</button>
                <button class="btn btn-primary" id="githubImportBtn" onclick="importFromGitHub()">导入 Skill</button>
            </div>
        </div>
    </div>

    <script src="/static/core/Auth.js"></script>
    <script src="/static/shared/utils.js"></script>
    <script src="/static/shared/toast.js"></script>
    <script src="/static/shared/modal.js"></script>
    <script src="/static/shared/nav.js"></script>
    <script>
        if (!Auth.requireAuth()) { throw new Error('Not authenticated'); }
        SharedNav.render(document.getElementById('pageNav'), { active: 'skills' });

        const SKILLS_API = '/api/skills';
        let skills = [];

        loadSkills();

        async function loadSkills() {
            try {
                const response = await fetch(`${SKILLS_API}/`);
                skills = await response.json();
                renderSkills();
            } catch (error) {
                console.error('Error loading skills:', error);
                document.getElementById('skillsList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>加载失败</h3><p>请刷新页面重试</p></div>';
            }
        }

        function renderSkills() {
            const listEl = document.getElementById('skillsList');
            const search = document.getElementById('skillSearch').value.toLowerCase();
            const filter = document.getElementById('skillFilter').value;
            let filteredSkills = skills || [];
            if (search) filteredSkills = filteredSkills.filter(skill => skill.name.toLowerCase().includes(search) || (skill.description && skill.description.toLowerCase().includes(search)));
            if (filter !== 'all') filteredSkills = filteredSkills.filter(skill => skill.source === filter);
            if (filteredSkills.length === 0) {
                listEl.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;"><div class="icon">🛠️</div><h3>${skills.length === 0 ? '暂无 Skill' : '未找到匹配的 Skill'}</h3><p>${skills.length === 0 ? '点击上方卡片创建 Skill' : '尝试调整搜索条件'}</p></div>`;
                return;
            }
            listEl.innerHTML = '';
            filteredSkills.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                const tagsHtml = (skill.tags || []).map(tag => `<span class="skill-tag">${Utils.escapeHtml(tag)}</span>`).join('');
                card.innerHTML = `
                    <div class="skill-header">
                        <span class="skill-name">${Utils.escapeHtml(skill.name)}</span>
                        <span class="source-badge ${skill.source === 'builtin' ? 'builtin' : skill.source === 'github' ? 'github' : 'user-source'}">${getSourceLabel(skill.source)}</span>
                    </div>
                    <div class="skill-description">${skill.description || ''}</div>
                    ${tagsHtml ? `<div class="skill-tags">${tagsHtml}</div>` : '<div class="skill-tags"></div>'}
                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; margin-top: auto;">
                        版本: ${skill.version || '1.0.0'}${skill.author ? ` | 作者: ${Utils.escapeHtml(skill.author)}` : ''}
                    </div>
                    <div class="skill-actions">
                        <button class="btn btn-secondary btn-sm" onclick="viewSkill('${Utils.escapeHtml(skill.name)}')">查看</button>
                        <button class="btn btn-primary btn-sm" onclick="openEditor('${Utils.escapeHtml(skill.name)}')">编辑</button>
                        ${skill.source !== 'builtin' ? `<button class="btn btn-danger btn-sm" onclick="deleteSkill('${Utils.escapeHtml(skill.name)}')">删除</button>` : ''}
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function getSourceLabel(source) {
            return { 'builtin': '内置', 'user': '用户', 'github': '📦 GitHub' }[source] || source;
        }

        function filterSkills() { renderSkills(); }

        async function viewSkill(skillName) {
            try {
                const response = await fetch(`${SKILLS_API}/${skillName}/content`);
                const data = await response.json();
                if (data && data.content) {
                    document.getElementById('viewSkillTitle').textContent = `查看 Skill: ${skillName}`;
                    document.getElementById('viewSkillContent').textContent = data.content;
                    SharedModal.open('viewModal');
                }
            } catch (error) { console.error(error); showToast('加载失败', 'error'); }
        }

        async function deleteSkill(skillName) {
            if (!confirm(`确定要删除 Skill "${skillName}" 吗？此操作不可恢复。`)) return;
            try {
                const response = await fetch(`${SKILLS_API}/${skillName}`, { method: 'DELETE' });
                if (response.ok) { await loadSkills(); showToast('Skill 已删除'); }
                else showToast('删除失败', 'error');
            } catch (error) { console.error(error); showToast('删除失败', 'error'); }
        }

        function closeGitHubModal() { SharedModal.close('githubModal'); hideImportProgress(); }

        function showImportProgress() {
            document.getElementById('importProgress').classList.add('active');
            const bar = document.getElementById('importProgressBar');
            let width = 0;
            const interval = setInterval(() => { if (width >= 90) clearInterval(interval); else { width += Math.random() * 15; bar.style.width = width + '%'; } }, 200);
            return interval;
        }

        function hideImportProgress() {
            document.getElementById('importProgress').classList.remove('active');
            document.getElementById('importProgressBar').style.width = '0%';
        }

        async function importFromGitHub() {
            const repoUrl = document.getElementById('githubRepo').value.trim();
            const ref = document.getElementById('githubRef').value.trim();
            const subdir = document.getElementById('githubSubdir').value.trim();
            const autoEnable = document.getElementById('githubAutoEnable').checked;
            const forceRefresh = document.getElementById('githubForceRefresh').checked;
            if (!repoUrl) { showToast('请输入 GitHub 仓库地址', 'error'); return; }

            const btn = document.getElementById('githubImportBtn');
            btn.disabled = true;
            btn.textContent = '导入中...';
            const resultDiv = document.getElementById('githubImportResult');
            resultDiv.style.display = 'none';
            const progressInterval = showImportProgress();

            try {
                const response = await fetch(`${SKILLS_API}/import/github`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repo_url: repoUrl, ref, subdir, auto_enable: autoEnable, force_refresh: forceRefresh })
                });
                document.getElementById('importProgressBar').style.width = '100%';
                setTimeout(hideImportProgress, 500);

                if (response.ok) {
                    const data = await response.json();
                    if (data.skills && data.skills.length > 0) {
                        resultDiv.innerHTML = `
                            <div style="background: var(--success-light); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                <h3 style="color: #2e7d32; margin-bottom: 8px;">✅ 导入成功!</h3>
                                <p style="color: #388e3c; margin-bottom: 12px;">${data.message}</p>
                                <div style="max-height: 200px; overflow-y: auto;">
                                    ${data.skills.map(s => `<div style="background: white; padding: 10px 12px; margin: 6px 0; border-radius: 6px; border: 1px solid #c8e6c9;"><strong>${Utils.escapeHtml(s.name)}</strong><span style="color: var(--text-muted); font-size: 12px; margin-left: 8px;">${s.version || '1.0.0'}</span>${s.description ? `<br><span style="color: var(--text-muted); font-size: 12px;">${Utils.escapeHtml(s.description)}</span>` : ''}</div>`).join('')}
                                </div>
                                <p style="margin-top: 12px; font-size: 13px; color: var(--text-secondary);">💡 提示：新导入的技能已启用，可在对话中使用！</p>
                            </div>`;
                        resultDiv.style.display = 'block';
                        await loadSkills();
                        btn.textContent = '关闭';
                        btn.onclick = function() { closeGitHubModal(); btn.textContent = '导入 Skill'; btn.onclick = importFromGitHub; btn.disabled = false; };
                    } else {
                        resultDiv.innerHTML = `<div style="background: #fff3e0; padding: 16px; border-radius: 8px; border-left: 4px solid var(--warning);"><h3 style="color: #e65100; margin-bottom: 8px;">⚠️ 未找到 Skill</h3><p style="color: #f57c00;">仓库中未找到符合格式的 Skill，请确认仓库包含 skill.md 文件</p></div>`;
                        resultDiv.style.display = 'block';
                        btn.disabled = false;
                        btn.textContent = '导入 Skill';
                    }
                } else {
                    let errorMsg = '导入失败';
                    try { const errorData = await response.json(); errorMsg = errorData.detail || errorMsg; } catch (e) {}
                    resultDiv.innerHTML = `<div style="background: var(--error-bg); padding: 16px; border-radius: 8px; border-left: 4px solid var(--error);"><h3 style="color: var(--error-color); margin-bottom: 8px;">❌ 导入失败</h3><p style="color: var(--error-color);">${errorMsg}</p></div>`;
                    resultDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '导入 Skill';
                    hideImportProgress();
                }
            } catch (error) {
                console.error(error);
                hideImportProgress();
                resultDiv.innerHTML = `<div style="background: var(--error-bg); padding: 16px; border-radius: 8px; border-left: 4px solid var(--error);"><h3 style="color: var(--error-color); margin-bottom: 8px;">❌ 导入失败</h3><p style="color: var(--error-color);">网络错误，请检查后重试</p></div>`;
                resultDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '导入 Skill';
            }
        }

        function openGitHubImportModal() { SharedModal.open('githubModal'); }
        function openNewEditor() { window.location.href = '/static/skill_editor.html?mode=create'; }
        function openEditor(skillName) { window.location.href = `/static/skill_editor.html?skill=${encodeURIComponent(skillName)}`; }
    </script>
</body>
</html>
