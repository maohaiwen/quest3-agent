<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Playground - 多智能体协作</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: #1a1a2e;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a4a;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            color: #00d4ff;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid #3a3a5a;
            background: #2a2a4a;
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #3a3a6a;
            border-color: #00d4ff;
        }

        .btn-primary {
            background: #0066cc;
            border-color: #0088ff;
            color: white;
        }

        .btn-primary:hover {
            background: #0088ff;
        }

        /* Main Layout - Three Panels */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Panel - Topology */
        .topology-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            background: #12121e;
            flex-shrink: 0;
            border-right: 1px solid #2a2a4a;
        }

        .topology-panel.collapsed {
            width: 0;
            overflow: hidden;
        }

        .topology-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .topology-content.collapsed {
            display: none;
        }

        /* Topology Nodes */
        .topo-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 8px 0;
        }

        .topo-parallel {
            display: flex;
            gap: 20px;
            position: relative;
        }

        .topo-node {
            padding: 10px 14px;
            background: #1a1a2e;
            border: 2px solid #2a2a4a;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .topo-node.thinking {
            border-color: #00d4ff;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
            animation: thinkingPulse 1.5s infinite;
        }

        .topo-node.done {
            border-color: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .topo-node.error {
            border-color: #ff4444;
        }

        @keyframes thinkingPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }
        }

        .topo-node-name {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .topo-node-role {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        /* Connectors */
        .topo-connector {
            width: 2px;
            height: 20px;
            background: #2a2a4a;
            transition: background 0.3s;
        }

        .topo-connector.active {
            background: #00d4ff;
        }

        .topo-label {
            font-size: 10px;
            color: #6060a0;
            text-align: center;
            padding: 2px 0;
        }

        .topo-bidi-arrow {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6060a0;
            font-size: 18px;
            padding: 0 8px;
        }

        .topo-game-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .topo-turn-indicator {
            text-align: center;
            font-size: 11px;
            color: #00d4ff;
            padding: 4px 0;
            min-height: 20px;
        }

        /* Center Panel - Chat Flow */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 300px;
        }

        .panel-header {
            padding: 12px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .panel-header h3 {
            font-size: 14px;
            color: #a0a0c0;
            font-weight: 500;
        }

        .panel-header .collapse-icon {
            color: #6060a0;
            font-size: 12px;
            transition: transform 0.2s;
        }

        .panel-header .collapse-icon.collapsed {
            transform: rotate(-90deg);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages.collapsed {
            display: none;
        }

        /* Round Containers */
        .round-container {
            margin-bottom: 4px;
            border-left: 3px solid #2a2a4a;
            padding-left: 12px;
            transition: border-color 0.3s;
        }

        .round-container.active {
            border-left-color: #00d4ff;
        }

        .round-container.completed {
            border-left-color: #00ff88;
        }

        .round-container.failed {
            border-left-color: #ff4444;
        }

        .round-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            margin-bottom: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        .round-header:hover {
            background: #22223a;
        }

        .round-number {
            font-size: 12px;
            font-weight: 600;
            color: #a0a0c0;
        }

        .round-progress {
            font-size: 11px;
            color: #606080;
        }

        .round-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
        }

        .round-status-dot.active {
            background: #00d4ff;
            animation: pulse 1.5s infinite;
        }

        .round-status-dot.done {
            background: #00ff88;
        }

        .round-footer {
            font-size: 11px;
            color: #8080a0;
            padding: 4px 8px;
            margin-top: 6px;
            border-top: 1px solid #1a1a2e;
        }

        .round-messages {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .round-messages.collapsed-round {
            display: none;
        }

        .task-separator {
            text-align: center;
            padding: 8px;
            border-top: 1px dashed #2a2a4a;
            border-bottom: 1px dashed #2a2a4a;
            margin: 8px 0;
            font-size: 11px;
            color: #606080;
        }

        /* Message Styles */
        .message {
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #1a3a5a;
            border: 1px solid #2a5a8a;
            align-self: flex-end;
        }

        .message.agent {
            background: #1a2a3a;
            border: 1px solid #2a3a5a;
            border-left: 3px solid var(--agent-color, #2a3a5a);
            align-self: flex-start;
        }

        .message.system {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            align-self: center;
            font-size: 12px;
            color: #808080;
            max-width: 90%;
        }

        .message.error {
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            align-self: center;
            color: #ff6666;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .agent-role {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .agent-role.supervisor { background: #4a2a8a; color: #c0a0ff; }
        .agent-role.child { background: #2a6a4a; color: #a0ffc0; }
        .agent-role.worker { background: #3a2a8a; color: #a0a0ff; }
        .agent-role.voter { background: #8a6a2a; color: #ffe0a0; }
        .agent-role.aggregator { background: #8a2a4a; color: #ffa0c0; }
        .agent-role.generator { background: #8a4a2a; color: #ffc0a0; }
        .agent-role.discriminator { background: #8a2a4a; color: #ffa0c0; }
        .agent-role.judge { background: #6a6a2a; color: #ffffa0; }
        .agent-role.game { background: #2a8a6a; color: #a0ffd0; }
        .agent-role.player_black { background: #1a1a2e; color: #c0c0d0; }
        .agent-role.player_white { background: #3a3a4e; color: #e0e0f0; }
        .agent-role.referee { background: #8a6a2a; color: #ffe0a0; }
        .agent-role.summary { background: #2a4a6a; color: #a0d0ff; }

        .round-badge {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: #aaa;
        }

        .message-content {
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-content.collapsible {
            max-height: 100px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .message-content.collapsible::after {
            content: '...';
            position: absolute;
            bottom: 0;
            right: 0;
            background: linear-gradient(transparent, var(--msg-bg, #1a2a3a));
            padding: 0 8px;
        }

        .message-content.expanded {
            max-height: none;
        }

        .message-content.expanded::after {
            display: none;
        }

        /* Thinking Indicator */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #1a1a2e;
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00d4ff;
            animation: dotPulse 1.2s infinite;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        .thinking-label {
            font-size: 12px;
            color: #6080a0;
        }

        /* Right Panel - Config */
        .config-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            background: #12121e;
            flex-shrink: 0;
            border-left: 1px solid #2a2a4a;
        }

        .config-panel.collapsed {
            width: 0;
            overflow: hidden;
        }

        .config-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .config-content.collapsed {
            display: none;
        }

        .config-section {
            margin-bottom: 20px;
        }

        .config-section h4 {
            font-size: 12px;
            color: #8080a0;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .config-item {
            margin-bottom: 12px;
        }

        .config-item label {
            display: block;
            font-size: 11px;
            color: #707090;
            margin-bottom: 4px;
        }

        .config-item select,
        .config-item input {
            width: 100%;
            padding: 6px 10px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .config-item select:focus,
        .config-item input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .agent-card {
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex: 1;
        }

        .agent-card-name {
            font-size: 13px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .agent-card-role {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #2a2a4a;
            color: #a0a0c0;
        }

        .agent-card-desc {
            font-size: 11px;
            color: #707090;
            line-height: 1.4;
        }

        .agent-card-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
        }

        .agent-card-status.thinking {
            background: #00d4ff;
            animation: pulse 1.5s infinite;
        }

        .agent-card-status.done {
            background: #00ff88;
        }

        .agent-card-status.error {
            background: #ff4444;
        }

        /* Shared State Viewer */
        .shared-state-viewer {
            font-size: 11px;
            color: #8080a0;
            background: #0a0a15;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            transition: background 0.3s;
        }

        .shared-state-viewer.flash {
            background: #1a1a2e;
        }

        /* Edit Mode Panel */
        .edit-tabs {
            display: flex;
            border-bottom: 1px solid #2a2a4a;
            flex-shrink: 0;
        }

        .edit-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: #606080;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .edit-tab:hover {
            color: #a0a0c0;
            background: #1a1a2e;
        }

        .edit-tab.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .edit-tab.has-changes::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff6666;
            margin-left: 6px;
            vertical-align: middle;
        }

        .edit-panel {
            display: none;
        }

        .edit-panel.active {
            display: block;
        }

        .role-slot {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .role-slot-label {
            min-width: 70px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            text-align: center;
            flex-shrink: 0;
        }

        .role-slot select {
            flex: 1;
            padding: 6px 10px;
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .role-slot select:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .role-slot-remove {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: #606080;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .role-slot-remove:hover {
            background: #3a1a1a;
            color: #ff6666;
        }

        /* Delete button in collab cards */
        .collab-delete-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: #606080;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .collab-delete-btn:hover {
            background: #3a1a1a;
            color: #ff6666;
        }

        .view-delete-btn {
            width: 100%;
            margin-top: 16px;
            padding: 8px;
            background: transparent;
            border: 1px solid #5a2a2a;
            border-radius: 6px;
            color: #ff6666;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .view-delete-btn:hover {
            background: #3a1a1a;
            border-color: #ff4444;
        }

        .role-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            background: transparent;
            border: 1px dashed #3a3a5a;
            border-radius: 6px;
            color: #606080;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .role-add-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            background: #0a1a2a;
        }

        .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .edit-actions .btn {
            flex: 1;
            text-align: center;
            justify-content: center;
        }

        .mode-param-group {
            margin-bottom: 12px;
        }

        .mode-param-group label {
            display: block;
            font-size: 11px;
            color: #707090;
            margin-bottom: 4px;
        }

        .mode-param-group select,
        .mode-param-group input,
        .mode-param-group textarea {
            width: 100%;
            padding: 6px 10px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .mode-param-group textarea {
            min-height: 60px;
            resize: vertical;
            font-family: inherit;
        }

        .mode-param-group select:focus,
        .mode-param-group input:focus,
        .mode-param-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn-save {
            background: #10b981;
            border-color: #059669;
            color: white;
        }

        .btn-save:hover {
            background: #059669;
        }

        .btn-save.has-changes {
            animation: savePulse 2s infinite;
        }

        @keyframes savePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
            50% { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.3); }
        }

        /* Input Bar */
        .input-bar {
            padding: 12px 16px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-bar textarea {
            width: 100%;
            min-height: 40px;
            max-height: 120px;
            padding: 10px 14px;
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
        }

        .input-bar textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .input-bar textarea::placeholder {
            color: #505070;
        }

        .send-btn {
            padding: 10px 24px;
            background: #0066cc;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            height: 40px;
        }

        .send-btn:hover {
            background: #0088ff;
        }

        .send-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Status Bar */
        .status-bar {
            padding: 6px 16px;
            background: #0a0a15;
            border-top: 1px solid #1a1a2a;
            font-size: 11px;
            color: #606080;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }

        .status-dot.active {
            background: #00ff88;
            animation: pulse 1.5s infinite;
        }

        .status-dot.error {
            background: #ff4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Modal for Collab Selector */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal-content {
            width: 600px;
            max-height: 80vh;
            background: #0f0f1a;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 12px 20px;
            background: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
        }

        .modal-header h2 {
            font-size: 16px;
            color: #e0e0e0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #808080;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
        }

        .modal-close:hover {
            color: #e0e0e0;
        }

        .modal-body {
            flex: 1;
            position: relative;
            padding: 20px;
            overflow-y: auto;
        }

        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a4a;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a6a;
        }

        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2a2a4a;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #505070;
            text-align: center;
            padding: 40px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* Task Progress */
        .task-progress {
            padding: 8px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            font-size: 12px;
            color: #8080a0;
            display: none;
        }

        .task-progress.visible {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: #2a2a4a;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0066cc, #00d4ff);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>多智能体协作平台</h1>
        <div class="header-actions">
            <button class="btn" id="btnSelectCollab" onclick="showCollabSelector()">
                选择协作配置
            </button>
            <button class="btn" id="btnNewCollab" onclick="startNewCollab()">
                新建配置
            </button>
            <button class="btn" id="btnRefresh" onclick="loadCollabs()">
                刷新
            </button>
        </div>
    </div>

    <!-- Main Container - Three Panels -->
    <div class="main-container">
        <!-- Left: Topology Panel -->
        <div class="topology-panel" id="topologyPanel">
            <div class="panel-header" onclick="togglePanel('topology')">
                <h3>协作拓扑</h3>
                <span class="collapse-icon" id="topologyCollapseIcon">&#9650;</span>
            </div>
            <div class="topology-content" id="topologyContent">
                <div class="empty-state" style="padding: 20px;">
                    <div class="icon" style="font-size: 36px;">&#9698;</div>
                    <p style="font-size: 12px;">选择协作配置后显示拓扑关系</p>
                </div>
            </div>
        </div>

        <!-- Center: Chat Flow -->
        <div class="chat-panel" id="chatPanel">
            <div class="panel-header" onclick="togglePanel('chat')">
                <h3>协作流程</h3>
                <span class="collapse-icon" id="chatCollapseIcon">&#9650;</span>
            </div>
            <div class="task-progress" id="taskProgress">
                <span id="progressText">运行中...</span>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <div class="icon">&#128640;</div>
                    <p style="margin-bottom: 16px;">欢迎使用多智能体协作平台</p>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                        <button class="btn" onclick="showCollabSelector()" style="background: #0066cc; color: white; border-color: #0088ff;">
                            选择已有配置
                        </button>
                        <button class="btn" onclick="startNewCollab()" style="background: #10b981; color: white; border-color: #059669;">
                            新建协作配置
                        </button>
                    </div>
                    <p style="margin-top: 16px; font-size: 12px; color: #606080;">
                        选择已有配置，或新建一个多智能体协作任务
                    </p>
                </div>
            </div>
        </div>

        <!-- Right: Config/Edit Panel -->
        <div class="config-panel" id="configPanel">
            <div class="panel-header" onclick="togglePanel('config')">
                <h3>配置面板</h3>
                <span class="collapse-icon" id="configCollapseIcon">&#9650;</span>
            </div>
            <div class="edit-tabs" id="editTabs">
                <button class="edit-tab active" id="tabView" onclick="switchTab('view')">查看</button>
                <button class="edit-tab" id="tabEdit" onclick="switchTab('edit')">编辑</button>
            </div>
            <div class="config-content" id="configContent">
                <!-- View Mode -->
                <div class="edit-panel active" id="viewPanel">
                    <div class="empty-state" style="padding: 20px;">
                        <div class="icon">&#9881;</div>
                        <p>请选择协作配置以查看详情</p>
                    </div>
                </div>
                <!-- Edit Mode -->
                <div class="edit-panel" id="editPanel">
                    <div class="empty-state" style="padding: 20px;">
                        <div class="icon">&#9998;</div>
                        <p>选择"新建配置"或切换到编辑标签</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div class="input-wrapper">
            <textarea
                id="inputText"
                placeholder="输入多智能体协作任务..."
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="executeTask()">执行</button>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">就绪</span>
        </div>
        <div>
            <span id="collabInfo">未选择协作配置</span>
        </div>
    </div>

    <!-- Collab Selector Modal -->
    <div class="modal-overlay" id="collabSelectorModal">
        <div class="modal-content" style="width: 600px; height: 500px;">
            <div class="modal-header">
                <h2>选择协作配置</h2>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="btn" style="background:#0066cc;color:white;border-color:#0088ff;" onclick="startNewCollab(); closeCollabSelector();">+ 新建配置</button>
                    <button class="modal-close" onclick="closeCollabSelector()">&times;</button>
                </div>
            </div>
            <div class="modal-body" style="padding: 20px; overflow-y: auto;">
                <div id="collabList" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Collab items will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentCollab = null;
        let isRunning = false;
        let eventSource = null;

        // Topology state: agent_id -> { status, role, round, name }
        let topologyState = {};

        // Round state
        let currentRound = 0;
        let maxRounds = 0;
        let currentRoundContainer = null;
        let currentMode = null; // current collaboration mode for event rendering

        // Thinking indicators: agent_id -> DOM element
        let thinkingIndicators = {};

        // Agent color assignment
        const AGENT_COLORS = ['#00d4ff', '#ff6b6b', '#ffd93d', '#6bcb77', '#9b59b6', '#e67e22', '#1abc9c', '#e74c3c'];
        let agentColorMap = {};

        // API base
        const API_BASE = '/api/collaborations';

        // Edit mode state
        let editMode = 'view'; // 'view' or 'edit'
        let editHasChanges = false;
        let editRoleSlots = []; // [{role, agent_id}] — the in-memory role list being edited
        let editConfigJson = {}; // in-memory config during editing
        let editName = '';
        let editDescription = '';
        let editModeType = ''; // collaboration mode being edited
        let editCollabId = null; // existing collab ID (null for new)
        let agentsCache = []; // cached agent list for dropdowns

        // Mode definitions for edit UI
        const MODE_ROLES = {
            'supervisor': ['supervisor', 'child'],
            'pipeline': ['worker'],
            'voting': ['voter', 'aggregator'],
            'adversarial_generate_discriminate': ['generator', 'discriminator'],
            'adversarial_game': ['participant', 'referee']
        };
        const MODE_ROLE_LABELS = {
            'supervisor': { 'supervisor': '监督者', 'child': '子Agent' },
            'pipeline': { 'worker': '处理步骤' },
            'voting': { 'voter': '投票者', 'aggregator': '聚合器' },
            'adversarial_generate_discriminate': { 'generator': '生成者', 'discriminator': '判别者' },
            'adversarial_game': { 'participant': '参与者', 'referee': '裁判' }
        };
        const MODE_NAMES = {
            'supervisor': '监督者模式',
            'pipeline': '流水线模式',
            'voting': '投票集成模式',
            'adversarial_generate_discriminate': '对抗模式',
            'adversarial_game': '博弈模式'
        };

        // Load collaborations on start
        window.addEventListener('load', () => {
            loadCollabs();
            loadAgentsCache();
        });

        // =================== Agent Colors ===================
        function getAgentColor(agentId) {
            if (!agentColorMap[agentId]) {
                const idx = Object.keys(agentColorMap).length;
                agentColorMap[agentId] = AGENT_COLORS[idx % AGENT_COLORS.length];
            }
            return agentColorMap[agentId];
        }

        function sanitizeForClass(str) {
            return str.replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        // =================== Load Collaborations ===================
        async function loadCollabs() {
            try {
                const resp = await fetch(`${API_BASE}?enabled_only=true`);
                const data = await resp.json();
                window.collabList = data.collaborations || [];
            } catch (e) {
                console.error('Failed to load collaborations:', e);
                updateStatus('加载配置失败', true);
            }
        }

        async function loadAgentsCache() {
            try {
                const resp = await fetch('/api/agents');
                const data = await resp.json();
                agentsCache = data.agents || [];
            } catch (e) {
                console.error('Failed to load agents:', e);
            }
        }

        // =================== Tab Switching ===================
        function switchTab(tab) {
            editMode = tab;
            document.getElementById('tabView').classList.toggle('active', tab === 'view');
            document.getElementById('tabEdit').classList.toggle('active', tab === 'edit');
            document.getElementById('viewPanel').classList.toggle('active', tab === 'view');
            document.getElementById('editPanel').classList.toggle('active', tab === 'edit');

            if (tab === 'edit') {
                renderEditPanel();
            }
        }

        // =================== New Collaboration ===================
        function startNewCollab() {
            editCollabId = null;
            editName = '';
            editDescription = '';
            editModeType = 'supervisor';
            editRoleSlots = [
                {role: 'supervisor', agent_id: ''},
                {role: 'child', agent_id: ''},
                {role: 'child', agent_id: ''}
            ];
            editConfigJson = {parallel_execution: true, split_prompt: null, summary_prompt: null};
            editHasChanges = true;
            currentCollab = null;
            switchTab('edit');
            updateStatus('新建协作配置', false);
            document.getElementById('collabInfo').textContent = '新建配置';
            // Clear topology and chat
            document.getElementById('topologyContent').innerHTML = '<div class="empty-state" style="padding:20px;"><p style="font-size:12px;">保存后显示拓扑</p></div>';
            document.getElementById('chatMessages').innerHTML = '';
        }

        // =================== Edit Panel Rendering ===================
        function renderEditPanel() {
            const panel = document.getElementById('editPanel');

            const modeOptions = Object.entries(MODE_NAMES).map(([k, v]) =>
                `<option value="${k}" ${k === editModeType ? 'selected' : ''}>${v}</option>`
            ).join('');

            const agentOptions = agentsCache.map(a =>
                `<option value="${a.id}">${escapeHtml(a.name)}</option>`
            ).join('');

            // Build role slots HTML
            let roleSlotsHtml = '';
            editRoleSlots.forEach((slot, i) => {
                const labels = MODE_ROLE_LABELS[editModeType] || {};
                const roleLabel = labels[slot.role] || slot.role;
                const canRemove = canRemoveRoleSlot(i);
                const selectedAgent = agentsCache.find(a => a.id === slot.agent_id);
                const agentNameDisplay = selectedAgent ? ` — ${selectedAgent.name}` : '';
                roleSlotsHtml += `
                    <div class="role-slot" data-index="${i}">
                        <span class="role-slot-label agent-role ${slot.role}">${escapeHtml(roleLabel)}${agentNameDisplay ? `<span style="opacity:0.7;font-weight:400;">${escapeHtml(agentNameDisplay)}</span>` : ''}</span>
                        <select onchange="onRoleSlotAgentChange(${i}, this.value)">
                            <option value="">-- 选择Agent --</option>
                            ${agentsCache.map(a => `<option value="${a.id}" ${a.id === slot.agent_id ? 'selected' : ''}>${escapeHtml(a.name)}</option>`).join('')}
                        </select>
                        ${canRemove ? `<button class="role-slot-remove" onclick="removeRoleSlot(${i})" title="移除">&#10005;</button>` : ''}
                    </div>`;
            });

            // Determine which "add role" buttons to show
            const addButtonsHtml = getAddRoleButtons();

            // Mode-specific params
            const paramsHtml = renderModeParams();

            panel.innerHTML = `
                <div class="config-section">
                    <h4>基本信息</h4>
                    <div class="mode-param-group">
                        <label>名称</label>
                        <input type="text" id="editName" value="${escapeHtml(editName)}" placeholder="输入协作名称" onchange="onEditFieldChange()">
                    </div>
                    <div class="mode-param-group">
                        <label>模式</label>
                        <select id="editModeType" onchange="onEditModeChange()">
                            ${modeOptions}
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>描述</label>
                        <input type="text" id="editDesc" value="${escapeHtml(editDescription)}" placeholder="可选描述" onchange="onEditFieldChange()">
                    </div>
                </div>

                <div class="config-section">
                    <h4>智能体角色</h4>
                    ${roleSlotsHtml}
                    ${addButtonsHtml}
                </div>

                <div class="config-section">
                    <h4>模式参数</h4>
                    ${paramsHtml}
                </div>

                <div class="edit-actions">
                    <button class="btn btn-save" id="btnSave" onclick="saveEditCollab()">保存并去执行</button>
                    <button class="btn" onclick="cancelEdit()">取消</button>
                </div>
            `;
        }

        function canRemoveRoleSlot(index) {
            const mode = editModeType;
            const slot = editRoleSlots[index];
            const roles = MODE_ROLES[mode] || [];

            // Never remove the first/only required role
            if (mode === 'supervisor' && slot.role === 'supervisor') return false;
            if (mode === 'pipeline' && editRoleSlots.filter(s => s.role === 'worker').length <= 2) return false;
            if (mode === 'voting' && slot.role === 'aggregator') return false;
            if (mode === 'voting' && slot.role === 'voter' && editRoleSlots.filter(s => s.role === 'voter').length <= 2) return false;
            if (mode === 'adversarial_generate_discriminate' && (slot.role === 'generator' || slot.role === 'discriminator')) return false;
            if (mode === 'adversarial_game' && slot.role === 'referee') return false;
            if (mode === 'adversarial_game' && slot.role === 'participant' && editRoleSlots.filter(s => s.role === 'participant').length <= 2) return false;
            // Don't remove the very last slot
            if (editRoleSlots.length <= 1) return false;
            return true;
        }

        function getAddRoleButtons() {
            const mode = editModeType;
            let html = '';
            if (mode === 'supervisor') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('child')">+ 添加子Agent</button>`;
            } else if (mode === 'pipeline') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('worker')">+ 添加处理步骤</button>`;
            } else if (mode === 'voting') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('voter')">+ 添加投票者</button>`;
            } else if (mode === 'adversarial_game') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('participant')">+ 添加参与者</button>`;
            }
            return html;
        }

        function renderModeParams() {
            const mode = editModeType;
            const cfg = editConfigJson;
            let html = '';

            if (mode === 'supervisor') {
                html = `
                    <div class="mode-param-group">
                        <label>执行方式</label>
                        <select id="param_parallel" onchange="onParamChange()">
                            <option value="true" ${cfg.parallel_execution !== false ? 'selected' : ''}>并行执行</option>
                            <option value="false" ${cfg.parallel_execution === false ? 'selected' : ''}>串行执行</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>任务拆分提示词</label>
                        <textarea id="param_split_prompt" onchange="onParamChange()" placeholder="自定义任务拆分提示词（留空使用默认）">${escapeHtml(cfg.split_prompt || '')}</textarea>
                    </div>
                    <div class="mode-param-group">
                        <label>汇总提示词</label>
                        <textarea id="param_summary_prompt" onchange="onParamChange()" placeholder="自定义汇总提示词（留空使用默认）">${escapeHtml(cfg.summary_prompt || '')}</textarea>
                    </div>`;
            } else if (mode === 'pipeline') {
                html = `
                    <div class="mode-param-group">
                        <label>上下文传递</label>
                        <select id="param_pass_context" onchange="onParamChange()">
                            <option value="true" ${cfg.pass_context !== false ? 'selected' : ''}>传递全部历史</option>
                            <option value="false" ${cfg.pass_context === false ? 'selected' : ''}>仅传递上一步</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>步骤提示词模板</label>
                        <textarea id="param_step_prompt_template" onchange="onParamChange()" placeholder="自定义步骤提示词模板（留空使用默认）">${escapeHtml(cfg.step_prompt_template || '')}</textarea>
                    </div>`;
            } else if (mode === 'voting') {
                html = `
                    <div class="mode-param-group">
                        <label>聚合策略</label>
                        <select id="param_strategy" onchange="onParamChange()">
                            <option value="best_of" ${cfg.strategy === 'best_of' ? 'selected' : ''}>择优选择</option>
                            <option value="majority" ${cfg.strategy === 'majority' ? 'selected' : ''}>多数表决</option>
                            <option value="weighted" ${cfg.strategy === 'weighted' ? 'selected' : ''}>加权投票</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>聚合器提示词</label>
                        <textarea id="param_aggregator_prompt" onchange="onParamChange()" placeholder="自定义聚合器提示词（留空使用默认）">${escapeHtml(cfg.aggregator_prompt || '')}</textarea>
                    </div>`;
            } else if (mode === 'adversarial_generate_discriminate') {
                html = `
                    <div class="mode-param-group">
                        <label>最大轮次</label>
                        <input type="number" id="param_max_rounds" value="${cfg.max_rounds || 3}" min="1" max="20" onchange="onParamChange()">
                    </div>
                    <div class="mode-param-group">
                        <label>启用裁判</label>
                        <select id="param_judge_enabled" onchange="onParamChange()">
                            <option value="true" ${cfg.judge_enabled ? 'selected' : ''}>是</option>
                            <option value="false" ${!cfg.judge_enabled ? 'selected' : ''}>否</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>通过即终止</label>
                        <select id="param_termination_on_pass" onchange="onParamChange()">
                            <option value="true" ${cfg.termination_on_pass !== false ? 'selected' : ''}>是</option>
                            <option value="false" ${cfg.termination_on_pass === false ? 'selected' : ''}>否</option>
                        </select>
                    </div>`;
            } else if (mode === 'adversarial_game') {
                html = `
                    <div class="mode-param-group">
                        <label>回合策略</label>
                        <select id="param_turn_strategy" onchange="onParamChange()">
                            <option value="simultaneous" ${cfg.turn_strategy === 'simultaneous' ? 'selected' : ''}>同时行动</option>
                            <option value="turn_based" ${cfg.turn_strategy === 'turn_based' ? 'selected' : ''}>轮流行动</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>最大轮次</label>
                        <input type="number" id="param_game_max_rounds" value="${cfg.max_rounds || 10}" min="1" max="100" onchange="onParamChange()">
                    </div>
                    <div class="mode-param-group">
                        <label>游戏规则</label>
                        <textarea id="param_game_rules" onchange="onParamChange()" placeholder="描述游戏规则...">${escapeHtml(cfg.game_rules || '')}</textarea>
                    </div>
                    <div class="mode-param-group">
                        <label>启用裁判</label>
                        <select id="param_referee_enabled" onchange="onParamChange()">
                            <option value="true" ${cfg.referee_enabled !== false ? 'selected' : ''}>是</option>
                            <option value="false" ${cfg.referee_enabled === false ? 'selected' : ''}>否</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>裁判提示词</label>
                        <textarea id="param_referee_prompt" onchange="onParamChange()" placeholder="自定义裁判提示词（留空使用默认）">${escapeHtml(cfg.referee_prompt || '')}</textarea>
                    </div>`;
            }
            return html;
        }

        // =================== Edit Handlers ===================
        function onRoleSlotAgentChange(index, value) {
            editRoleSlots[index].agent_id = value;
            markEditChanged();
        }

        function addRoleSlot(role) {
            editRoleSlots.push({role: role, agent_id: ''});
            markEditChanged();
            renderEditPanel();
        }

        function removeRoleSlot(index) {
            editRoleSlots.splice(index, 1);
            markEditChanged();
            renderEditPanel();
        }

        function onEditModeChange() {
            const newMode = document.getElementById('editModeType').value;
            if (newMode === editModeType) return;
            editModeType = newMode;
            // Reassign roles based on new mode
            reassignRolesForMode();
            // Reset config to mode defaults
            editConfigJson = getDefaultConfigForMode(newMode);
            markEditChanged();
            renderEditPanel();
        }

        function reassignRolesForMode() {
            const mode = editModeType;
            if (mode === 'pipeline') {
                editRoleSlots.forEach(s => s.role = 'worker');
            } else if (mode === 'voting') {
                let voterCount = 0, hasAgg = false;
                editRoleSlots.forEach(s => {
                    if (s.role === 'voter' && voterCount < 10) { voterCount++; }
                    else if (s.role === 'aggregator' && !hasAgg) { hasAgg = true; }
                    else {
                        if (voterCount < 2) { s.role = 'voter'; voterCount++; }
                        else if (!hasAgg) { s.role = 'aggregator'; hasAgg = true; }
                        else { s.role = 'voter'; voterCount++; }
                    }
                });
            } else if (mode === 'supervisor') {
                let hasSuper = false;
                editRoleSlots.forEach(s => {
                    if (!hasSuper && s.role !== 'child') { s.role = 'supervisor'; hasSuper = true; }
                    else { s.role = 'child'; }
                });
            } else if (mode === 'adversarial_generate_discriminate') {
                let hasGen = false, hasDis = false;
                editRoleSlots.forEach(s => {
                    if (!hasGen) { s.role = 'generator'; hasGen = true; }
                    else if (!hasDis) { s.role = 'discriminator'; hasDis = true; }
                    else { s.role = 'discriminator'; }
                });
            } else if (mode === 'adversarial_game') {
                let partCount = 0, hasRef = false;
                editRoleSlots.forEach(s => {
                    if (partCount < 2) { s.role = 'participant'; partCount++; }
                    else if (!hasRef) { s.role = 'referee'; hasRef = true; }
                    else { s.role = 'participant'; partCount++; }
                });
            }
        }

        function getDefaultConfigForMode(mode) {
            switch (mode) {
                case 'supervisor': return {parallel_execution: true, split_prompt: null, summary_prompt: null};
                case 'pipeline': return {pass_context: true, step_prompt_template: null};
                case 'voting': return {strategy: 'best_of', aggregator_prompt: null};
                case 'adversarial_generate_discriminate': return {max_rounds: 3, judge_enabled: false, termination_on_pass: true};
                case 'adversarial_game': return {turn_strategy: 'simultaneous', max_rounds: 10, game_rules: '', referee_enabled: true, referee_prompt: null, shared_state: {}};
                default: return {};
            }
        }

        function onEditFieldChange() {
            editName = document.getElementById('editName').value;
            editDescription = document.getElementById('editDesc').value;
            markEditChanged();
        }

        function onParamChange() {
            // Read all params back from DOM
            const mode = editModeType;
            if (mode === 'supervisor') {
                editConfigJson.parallel_execution = document.getElementById('param_parallel').value !== 'false';
                editConfigJson.split_prompt = document.getElementById('param_split_prompt').value || null;
                editConfigJson.summary_prompt = document.getElementById('param_summary_prompt').value || null;
            } else if (mode === 'pipeline') {
                editConfigJson.pass_context = document.getElementById('param_pass_context').value !== 'false';
                editConfigJson.step_prompt_template = document.getElementById('param_step_prompt_template').value || null;
            } else if (mode === 'voting') {
                editConfigJson.strategy = document.getElementById('param_strategy').value;
                editConfigJson.aggregator_prompt = document.getElementById('param_aggregator_prompt').value || null;
            } else if (mode === 'adversarial_generate_discriminate') {
                editConfigJson.max_rounds = parseInt(document.getElementById('param_max_rounds').value) || 3;
                editConfigJson.judge_enabled = document.getElementById('param_judge_enabled').value === 'true';
                editConfigJson.termination_on_pass = document.getElementById('param_termination_on_pass').value !== 'false';
            } else if (mode === 'adversarial_game') {
                editConfigJson.turn_strategy = document.getElementById('param_turn_strategy').value;
                editConfigJson.max_rounds = parseInt(document.getElementById('param_game_max_rounds').value) || 10;
                editConfigJson.game_rules = document.getElementById('param_game_rules').value;
                editConfigJson.referee_enabled = document.getElementById('param_referee_enabled').value !== 'false';
                editConfigJson.referee_prompt = document.getElementById('param_referee_prompt').value || null;
            }
            markEditChanged();
        }

        function markEditChanged() {
            editHasChanges = true;
            const btnSave = document.getElementById('btnSave');
            if (btnSave) btnSave.classList.add('has-changes');
            const tabEdit = document.getElementById('tabEdit');
            if (tabEdit) tabEdit.classList.add('has-changes');
        }

        function clearEditChanged() {
            editHasChanges = false;
            const btnSave = document.getElementById('btnSave');
            if (btnSave) btnSave.classList.remove('has-changes');
            const tabEdit = document.getElementById('tabEdit');
            if (tabEdit) tabEdit.classList.remove('has-changes');
        }

        // =================== Save ===================
        async function saveEditCollab() {
            // Read latest values from DOM
            editName = document.getElementById('editName')?.value || editName;
            editDescription = document.getElementById('editDesc')?.value || editDescription;

            if (!editName.trim()) {
                showToast('请输入协作名称', true);
                return;
            }

            // Validate role slots
            const validRoles = MODE_ROLES[editModeType] || [];
            const filledSlots = editRoleSlots.filter(s => s.agent_id);
            if (filledSlots.length === 0) {
                showToast('请至少为一个角色选择Agent', true);
                return;
            }

            // Validate mode requirements
            if (editModeType === 'supervisor' && !filledSlots.some(s => s.role === 'supervisor')) {
                showToast('监督者模式需要至少一个监督者', true); return;
            }
            if (editModeType === 'supervisor' && !filledSlots.some(s => s.role === 'child')) {
                showToast('监督者模式需要至少一个子Agent', true); return;
            }
            if (editModeType === 'pipeline' && filledSlots.filter(s => s.role === 'worker').length < 2) {
                showToast('流水线模式需要至少2个步骤', true); return;
            }
            if (editModeType === 'voting' && filledSlots.filter(s => s.role === 'voter').length < 2) {
                showToast('投票模式需要至少2个投票者', true); return;
            }
            if (editModeType === 'voting' && !filledSlots.some(s => s.role === 'aggregator')) {
                showToast('投票模式需要至少1个聚合器', true); return;
            }
            if (editModeType === 'adversarial_game' && filledSlots.filter(s => s.role === 'participant').length < 2) {
                showToast('博弈模式需要至少2个参与者', true); return;
            }

            const agents = filledSlots.map(s => ({
                agent_id: s.agent_id,
                role: s.role,
                priority: 0,
                config_json: {}
            }));

            const payload = {
                name: editName.trim(),
                description: editDescription.trim(),
                mode: editModeType,
                agents: agents,
                config_json: editConfigJson,
                enabled: true
            };

            try {
                let result;
                if (editCollabId) {
                    result = await apiPut(`${API_BASE}/${editCollabId}`, payload);
                } else {
                    result = await apiPost(API_BASE, payload);
                }

                // Refresh collab list
                await loadCollabs();
                clearEditChanged();

                // Select the saved collaboration
                await selectCollab(result.id);
                editCollabId = result.id;

                showToast('保存成功');

                // Auto-jump to execution: switch to view tab and focus input
                switchTab('view');
                document.getElementById('inputText').focus();
            } catch (e) {
                showToast('保存失败: ' + e.message, true);
            }
        }

        function cancelEdit() {
            if (editHasChanges && !confirm('有未保存的更改，确定取消？')) return;
            if (currentCollab) {
                switchTab('view');
                updateConfigPanel(currentCollab);
            } else {
                switchTab('view');
                document.getElementById('viewPanel').innerHTML = '<div class="empty-state" style="padding:20px;"><div class="icon">&#9881;</div><p>请选择协作配置以查看详情</p></div>';
            }
        }

        // =================== Edit from existing collab ===================
        function loadCollabIntoEditor(collab) {
            editCollabId = collab.id;
            editName = collab.name || '';
            editDescription = collab.description || '';
            editModeType = collab.mode;
            editRoleSlots = (collab.agents || []).map(a => ({role: a.role, agent_id: a.agent_id}));
            editConfigJson = {...(collab.config_json || {})};
            editHasChanges = false;
        }

        // =================== API helpers ===================
        async function apiPost(url, data) {
            const resp = await fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
            return await resp.json();
        }

        async function apiPut(url, data) {
            const resp = await fetch(url, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
            return await resp.json();
        }

        function showToast(message, isError) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // =================== Show Collaboration Selector ===================
        function showCollabSelector() {
            const modal = document.getElementById('collabSelectorModal');
            const list = document.getElementById('collabList');

            if (!window.collabList || window.collabList.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>未找到协作配置，请先创建一个。</p></div>';
            } else {
                list.innerHTML = window.collabList.map(c => `
                    <div class="agent-card" style="cursor: pointer; position: relative;" onclick="selectCollab('${c.id}')">
                        <div class="agent-card-header">
                            <span class="agent-card-name">${escapeHtml(c.name)}</span>
                            <span class="agent-card-role">${escapeHtml(c.mode)}</span>
                        </div>
                        <div class="agent-card-desc">${escapeHtml(c.description || '无描述')}</div>
                        <div style="margin-top: 6px; font-size: 10px; color: #606080;">
                            ${c.agents ? c.agents.length : 0} 个智能体 | 使用次数: ${c.usage_count || 0}
                        </div>
                        <button class="collab-delete-btn" onclick="event.stopPropagation(); deleteCollab('${c.id}', '${escapeHtml(c.name)}')" title="删除配置">&#10005;</button>
                    </div>
                `).join('');
            }

            modal.classList.add('visible');
        }

        function closeCollabSelector() {
            document.getElementById('collabSelectorModal').classList.remove('visible');
        }

        // =================== Select a Collaboration ===================
        async function selectCollab(collabId) {
            try {
                const resp = await fetch(`${API_BASE}/${collabId}`);
                if (!resp.ok) throw new Error('Failed to load collaboration');

                currentCollab = await resp.json();
                closeCollabSelector();

                // Reset state
                agentColorMap = {};
                topologyState = {};
                currentRound = 0;
                currentRoundContainer = null;
                thinkingIndicators = {};

                // Load into editor state
                loadCollabIntoEditor(currentCollab);

                // Build topology
                buildTopology(currentCollab);
                updateConfigPanel(currentCollab);
                updateStatus(`已选择: ${currentCollab.name}`, false);

                document.getElementById('collabInfo').textContent =
                    `${currentCollab.name} (${currentCollab.mode})`;

                // Clear chat
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '';

            } catch (e) {
                console.error('Failed to select collaboration:', e);
                updateStatus('加载协作配置失败', true);
            }
        }

        // =================== Build Topology ===================
        function buildTopology(collab) {
            const container = document.getElementById('topologyContent');
            if (!collab || !collab.agents || collab.agents.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 20px;"><p style="font-size: 12px;">未配置智能体</p></div>';
                return;
            }

            // Reset topology state
            topologyState = {};
            collab.agents.forEach(a => {
                topologyState[a.agent_id] = { status: 'idle', role: a.role, name: a.agent_id };
                getAgentColor(a.agent_id);
            });

            let html = '';
            const mode = collab.mode;

            if (mode === 'supervisor') {
                html = buildSupervisorTopology(collab);
            } else if (mode === 'pipeline') {
                html = buildPipelineTopology(collab);
            } else if (mode === 'voting') {
                html = buildVotingTopology(collab);
            } else if (mode === 'adversarial_generate_discriminate') {
                html = buildGenDisTopology(collab);
            } else if (mode === 'adversarial_game') {
                html = buildGameTopology(collab);
            } else {
                html = buildGenericTopology(collab);
            }

            container.innerHTML = html;
        }

        function buildSupervisorTopology(collab) {
            const supervisor = collab.agents.find(a => a.role === 'supervisor');
            const children = collab.agents.filter(a => a.role === 'child');
            const isParallel = collab.config_json && collab.config_json.parallel_execution !== false;

            let html = '<div class="topo-flow">';

            // Input
            html += '<div class="topo-label">&#128230; 任务输入</div>';
            html += '<div class="topo-connector" data-from="input" data-to="supervisor"></div>';

            // Supervisor (split phase)
            if (supervisor) {
                html += buildTopoNode(supervisor, 'supervisor');
            }
            html += '<div class="topo-label">&#128295; 拆分任务</div>';
            html += '<div class="topo-connector" data-from="supervisor" data-to="children"></div>';

            // Children (parallel or sequential)
            if (children.length > 0) {
                html += `<div class="topo-label">${isParallel ? '&#9889; 并行执行' : '&#128336; 顺序执行'}</div>`;
                html += '<div class="topo-parallel">';
                children.forEach((child, i) => {
                    html += buildTopoNode(child, `child_${i}`);
                });
                html += '</div>';
            }

            // Supervisor (summarize phase)
            html += '<div class="topo-connector" data-from="children" data-to="supervisor_summary"></div>';
            html += '<div class="topo-label">&#128203; 汇总结果</div>';
            if (supervisor) {
                html += buildTopoNode(supervisor, 'supervisor_summary', '汇总');
            }

            // Output
            html += '<div class="topo-connector" data-from="supervisor_summary" data-to="output"></div>';
            html += '<div class="topo-label">&#128230; 最终输出</div>';

            html += '</div>';
            return html;
        }

        function buildGenDisTopology(collab) {
            const generator = collab.agents.find(a => a.role === 'generator');
            const discriminator = collab.agents.find(a => a.role === 'discriminator');
            const judge = collab.agents.find(a => a.role === 'judge');
            const maxRounds = collab.config_json ? collab.config_json.max_rounds || 3 : 3;

            let html = '<div class="topo-flow">';

            html += '<div class="topo-label">&#128230; 任务输入</div>';
            html += '<div class="topo-connector" data-from="input" data-to="generator"></div>';

            if (generator) {
                html += buildTopoNode(generator, 'generator');
            }

            html += '<div class="topo-connector" data-from="generator" data-to="discriminator"></div>';
            html += '<div class="topo-label">&#128230; 生成内容</div>';

            if (discriminator) {
                html += buildTopoNode(discriminator, 'discriminator');
            }

            html += '<div class="topo-label">&#128260; 未通过则反馈 (最多' + maxRounds + '轮)</div>';
            html += '<div class="topo-connector" data-from="discriminator" data-to="generator"></div>';

            if (judge) {
                html += '<div class="topo-label">&#9989; 通过校验</div>';
                html += '<div class="topo-connector" data-from="discriminator" data-to="judge"></div>';
                html += buildTopoNode(judge, 'judge');
                html += '<div class="topo-connector" data-from="judge" data-to="output"></div>';
            } else {
                html += '<div class="topo-label">&#9989; 通过校验</div>';
                html += '<div class="topo-connector" data-from="discriminator" data-to="output"></div>';
            }

            html += '<div class="topo-label">&#128230; 最终输出</div>';

            html += '</div>';
            return html;
        }

        function buildPipelineTopology(collab) {
            const workers = collab.agents.filter(a => a.role === 'worker');
            if (workers.length === 0) return '<div class="empty-state" style="padding:20px;"><p style="font-size:12px;">未配置worker</p></div>';

            let html = '<div class="topo-flow">';
            html += '<div class="topo-label">&#128230; 任务输入</div>';
            html += '<div class="topo-connector" data-from="input" data-to="pipeline"></div>';

            workers.forEach((w, i) => {
                html += buildTopoNode(w, `worker_${i}`, `步骤${i + 1}`);
                if (i < workers.length - 1) {
                    html += '<div class="topo-connector" data-from="pipeline" data-to="pipeline"></div>';
                    html += '<div class="topo-label">&#10132;</div>';
                }
            });

            html += '<div class="topo-connector" data-from="pipeline" data-to="output"></div>';
            html += '<div class="topo-label">&#128230; 最终输出</div>';
            html += '</div>';
            return html;
        }

        function buildVotingTopology(collab) {
            const voters = collab.agents.filter(a => a.role === 'voter');
            const aggregator = collab.agents.find(a => a.role === 'aggregator');
            if (voters.length === 0) return '<div class="empty-state" style="padding:20px;"><p style="font-size:12px;">未配置voter</p></div>';

            let html = '<div class="topo-flow">';
            html += '<div class="topo-label">&#128230; 相同问题</div>';
            html += '<div class="topo-connector" data-from="input" data-to="voters"></div>';
            html += '<div class="topo-label">&#128101; 独立投票</div>';
            html += '<div class="topo-parallel">';
            voters.forEach((v, i) => {
                html += buildTopoNode(v, `voter_${i}`, `投票者${i + 1}`);
            });
            html += '</div>';

            if (aggregator) {
                html += '<div class="topo-connector" data-from="voters" data-to="aggregator"></div>';
                html += '<div class="topo-label">&#128203; 聚合</div>';
                html += buildTopoNode(aggregator, 'aggregator', '聚合器');
            }

            html += '<div class="topo-connector" data-from="voters" data-to="output"></div>';
            html += '<div class="topo-label">&#128230; 最终答案</div>';
            html += '</div>';
            return html;
        }

        function buildGameTopology(collab) {
            const config = collab.config_json || {};
            const turnStrategy = config.turn_strategy || 'simultaneous';
            const participants = collab.agents.filter(a =>
                a.role === 'participant' || a.role === 'player_black' || a.role === 'player_white'
            );
            const referee = collab.agents.find(a => a.role === 'referee');
            const refereeEnabled = config.referee_enabled !== false;

            let html = '<div class="topo-flow">';

            html += '<div class="topo-label">&#128230; 游戏开始</div>';
            html += '<div class="topo-connector" data-from="input" data-to="game"></div>';

            if (turnStrategy === 'simultaneous') {
                // Simultaneous: all participants side-by-side, then referee below
                html += '<div class="topo-label">&#9889; 同时行动</div>';
                html += '<div class="topo-parallel">';
                participants.forEach((p, i) => {
                    const key = p.role === 'participant' ? `participant_${i}` : p.role;
                    html += buildTopoNode(p, key, `参与者${i + 1}`);
                });
                html += '</div>';

                if (refereeEnabled && referee) {
                    html += '<div class="topo-connector" data-from="participants" data-to="referee"></div>';
                    html += '<div class="topo-label">&#9878; 裁决</div>';
                    html += buildTopoNode(referee, 'referee', '裁判');
                }
            } else {
                // Turn-based: participants in sequence with referee
                html += `<div class="topo-label">&#128336; 轮流行动</div>`;
                html += '<div class="topo-game-row">';
                participants.forEach((p, i) => {
                    const key = p.role === 'participant' ? `participant_${i}` : p.role;
                    html += buildTopoNode(p, key, `参与者${i + 1}`);
                    if (i < participants.length - 1) {
                        html += '<div class="topo-bidi-arrow">&#8596;</div>';
                    }
                });
                html += '</div>';

                if (refereeEnabled && referee) {
                    html += '<div class="topo-connector" data-from="participants" data-to="referee"></div>';
                    html += '<div class="topo-label">&#9878; 裁决</div>';
                    html += buildTopoNode(referee, 'referee', '裁判');
                }
            }

            html += '<div class="topo-turn-indicator" id="topoTurnIndicator"></div>';
            html += '<div class="topo-connector" data-from="game" data-to="output"></div>';
            html += '<div class="topo-label">&#127942; 游戏结束</div>';

            html += '</div>';
            return html;
        }

        function buildGenericTopology(collab) {
            let html = '<div class="topo-flow">';
            collab.agents.forEach((agent, i) => {
                html += buildTopoNode(agent, sanitizeForClass(agent.agent_id));
                if (i < collab.agents.length - 1) {
                    html += '<div class="topo-connector"></div>';
                }
            });
            html += '</div>';
            return html;
        }

        function buildTopoNode(agent, key, overrideRole) {
            const color = getAgentColor(agent.agent_id);
            const roleDisplay = overrideRole || agent.role;
            return `<div class="topo-node" id="topo_${sanitizeForClass(key)}" data-agent-id="${escapeHtml(agent.agent_id)}" style="--node-color: ${color};">
                <div class="topo-node-name" style="color: ${color};">${escapeHtml(agent.agent_id)}</div>
                <div class="topo-node-role agent-role ${agent.role}">${escapeHtml(roleDisplay)}</div>
            </div>`;
        }

        // =================== Topology State Updates ===================
        function resetTopology() {
            currentMode = null;
            Object.keys(topologyState).forEach(id => {
                topologyState[id].status = 'idle';
            });
            document.querySelectorAll('.topo-node').forEach(node => {
                node.classList.remove('thinking', 'done', 'error');
            });
            document.querySelectorAll('.topo-connector').forEach(c => {
                c.classList.remove('active');
            });
            const turnIndicator = document.getElementById('topoTurnIndicator');
            if (turnIndicator) turnIndicator.textContent = '';

            // Reset agent card statuses
            document.querySelectorAll('.agent-card-status').forEach(s => {
                s.className = 'agent-card-status';
            });
        }

        function updateNodeStatus(agentId, status) {
            // Update topology nodes
            document.querySelectorAll('.topo-node').forEach(node => {
                if (node.dataset.agentId === agentId) {
                    node.classList.remove('thinking', 'done', 'error');
                    node.classList.add(status);
                }
            });

            // Update agent card in config panel
            document.querySelectorAll(`.agent-card[data-agent-id="${agentId}"] .agent-card-status`).forEach(s => {
                s.className = 'agent-card-status ' + status;
            });

            // Update topology state
            if (topologyState[agentId]) {
                topologyState[agentId].status = status;
            }
        }

        function activateConnector(fromKey, toKey) {
            document.querySelectorAll('.topo-connector').forEach(c => {
                if (c.dataset.from === fromKey && c.dataset.to === toKey) {
                    c.classList.add('active');
                    setTimeout(() => c.classList.remove('active'), 2000);
                }
            });
        }

        function updateTurnIndicator(role) {
            const turnIndicator = document.getElementById('topoTurnIndicator');
            if (turnIndicator) {
                const roleLabels = {
                    'player_black': '黑方',
                    'player_white': '白方'
                };
                turnIndicator.textContent = `当前回合: ${roleLabels[role] || role}`;
            }
        }

        // =================== Config Panel ===================
        function updateConfigPanel(collab) {
            if (!collab) return;

            const viewPanel = document.getElementById('viewPanel');

            const isGameMode = collab.mode === 'adversarial_game';
            const isSupervisorMode = collab.mode === 'supervisor';
            const isPipelineMode = collab.mode === 'pipeline';
            const isVotingMode = collab.mode === 'voting';
            const gameRules = collab.config_json ? collab.config_json.game_rules || '' : '';
            const turnStrategy = collab.config_json ? collab.config_json.turn_strategy || '' : '';
            const strategyLabel = turnStrategy === 'turn_based' ? '轮流行动' : '同时行动';
            const passContext = collab.config_json ? collab.config_json.pass_context : true;
            const parallelExec = collab.config_json ? collab.config_json.parallel_execution : true;
