<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Playground - 多智能体协作</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Primary Colors - matching main page */
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            /* Backgrounds */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --container-bg: white;
            --sidebar-bg: #f8f9fa;
            --panel-bg: #fafbfc;

            /* Text */
            --text-primary: #333;
            --text-secondary: #666;
            --text-muted: #999;

            /* Borders */
            --border-color: #e0e0e0;
            --border-focus: #667eea;

            /* Status */
            --success-bg: #d4edda;
            --success-color: #155724;
            --error-bg: #fee;
            --error-color: #dc3545;
            --warning-bg: #fff3cd;
            --warning-color: #856404;
            --info-bg: #e8f4fd;
            --info-color: #0c5460;

            /* Shadows */
            --container-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --card-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);

            /* Radius */
            --radius-lg: 16px;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;

            /* Accent for running state */
            --accent-running: #00d4ff;
            --accent-success: #4caf50;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ========== App Container (matching main page) ========== */
        .app-container {
            width: 100%;
            max-width: 1400px;
            background: var(--container-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--container-shadow);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        /* ========== Header (matching main page) ========== */
        .header {
            background: var(--gradient);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* ========== Buttons ========== */
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .btn-success {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #43a047;
            border-color: #43a047;
        }

        .btn-danger {
            color: var(--error-color);
            border-color: var(--error-color);
        }

        .btn-danger:hover {
            background: var(--error-bg);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== Main Layout ========== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========== Left Panel - Topology ========== */
        .topology-panel {
            width: 260px;
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg);
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
        }

        .topology-panel.collapsed {
            width: 0;
            overflow: hidden;
            border-right: none;
        }

        .topology-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .topology-content.collapsed {
            display: none;
        }

        /* Topology Nodes */
        .topo-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 8px 0;
        }

        .topo-parallel {
            display: flex;
            gap: 12px;
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
        }

        .topo-node {
            padding: 10px 14px;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            text-align: center;
            min-width: 90px;
            transition: all 0.3s;
            position: relative;
        }

        .topo-node:hover {
            box-shadow: var(--hover-shadow);
        }

        .topo-node.thinking {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
            animation: thinkingPulse 1.5s infinite;
        }

        .topo-node.done {
            border-color: var(--accent-success);
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.2);
        }

        .topo-node.error {
            border-color: var(--error-color);
        }

        @keyframes thinkingPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
        }

        .topo-node-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .topo-node-role {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        /* Topology status indicator on node */
        .topo-node-status {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            border: 2px solid white;
        }

        .topo-node-status.thinking {
            background: var(--primary);
            animation: pulse 1.5s infinite;
        }

        .topo-node-status.done {
            background: var(--accent-success);
        }

        .topo-node-status.error {
            background: var(--error-color);
        }

        /* Connectors */
        .topo-connector {
            width: 2px;
            height: 20px;
            background: var(--border-color);
            transition: background 0.3s;
        }

        .topo-connector.active {
            background: var(--primary);
        }

        .topo-label {
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            padding: 2px 0;
        }

        .topo-bidi-arrow {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 18px;
            padding: 0 8px;
        }

        .topo-game-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .topo-turn-indicator {
            text-align: center;
            font-size: 11px;
            color: var(--primary);
            padding: 4px 0;
            min-height: 20px;
        }

        /* ========== Center Panel - Chat Flow ========== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 300px;
            background: white;
        }

        .panel-header {
            padding: 12px 16px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .panel-header h3 {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .panel-header .collapse-icon {
            color: var(--text-muted);
            font-size: 12px;
            transition: transform 0.2s;
        }

        .panel-header .collapse-icon.collapsed {
            transform: rotate(-90deg);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages.collapsed {
            display: none;
        }

        /* Round Containers */
        .round-container {
            margin-bottom: 4px;
            border-left: 3px solid var(--border-color);
            padding-left: 12px;
            transition: border-color 0.3s;
        }

        .round-container.active {
            border-left-color: var(--primary);
        }

        .round-container.completed {
            border-left-color: var(--accent-success);
        }

        .round-container.failed {
            border-left-color: var(--error-color);
        }

        .round-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            margin-bottom: 8px;
            background: var(--sidebar-bg);
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        .round-header:hover {
            background: #eef0f2;
        }

        .round-number {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .round-progress {
            font-size: 11px;
            color: var(--text-muted);
        }

        .round-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccc;
        }

        .round-status-dot.active {
            background: var(--primary);
            animation: pulse 1.5s infinite;
        }

        .round-status-dot.done {
            background: var(--accent-success);
        }

        .round-footer {
            font-size: 11px;
            color: var(--text-muted);
            padding: 4px 8px;
            margin-top: 6px;
            border-top: 1px solid var(--sidebar-bg);
        }

        .round-messages {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .round-messages.collapsed-round {
            display: none;
        }

        .task-separator {
            text-align: center;
            padding: 8px;
            border-top: 1px dashed var(--border-color);
            border-bottom: 1px dashed var(--border-color);
            margin: 8px 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ========== Message Styles ========== */
        .message {
            padding: 12px;
            border-radius: var(--radius-sm);
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            align-self: flex-end;
        }

        .message.agent {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--agent-color, var(--primary));
            align-self: flex-start;
        }

        .message.system {
            background: var(--info-bg);
            border: 1px solid #b8daff;
            align-self: center;
            font-size: 12px;
            color: var(--info-color);
            max-width: 90%;
        }

        .message.error {
            background: var(--error-bg);
            border: 1px solid #f5c6cb;
            align-self: center;
            color: var(--error-color);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .agent-role {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .agent-role.supervisor { background: rgba(102, 126, 234, 0.15); color: var(--primary); }
        .agent-role.child { background: rgba(76, 175, 80, 0.15); color: #2e7d32; }
        .agent-role.worker { background: rgba(63, 81, 181, 0.15); color: #303f9f; }
        .agent-role.voter { background: rgba(255, 152, 0, 0.15); color: #e65100; }
        .agent-role.aggregator { background: rgba(156, 39, 176, 0.15); color: #7b1fa2; }
        .agent-role.generator { background: rgba(255, 87, 34, 0.15); color: #d84315; }
        .agent-role.discriminator { background: rgba(233, 30, 99, 0.15); color: #c2185b; }
        .agent-role.judge { background: rgba(255, 193, 7, 0.15); color: #f57f17; }
        .agent-role.game { background: rgba(0, 150, 136, 0.15); color: #00695c; }
        .agent-role.player_black { background: rgba(66, 66, 66, 0.15); color: #212121; }
        .agent-role.player_white { background: rgba(189, 189, 189, 0.15); color: #616161; }
        .agent-role.referee { background: rgba(255, 152, 0, 0.15); color: #e65100; }
        .agent-role.summary { background: rgba(33, 150, 243, 0.15); color: #1565c0; }
        .agent-role.participant { background: rgba(0, 150, 136, 0.15); color: #00695c; }

        .round-badge {
            background: var(--sidebar-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .message-content {
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary);
        }

        .message-content.collapsible {
            max-height: 120px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: max-height 0.3s ease;
        }

        .message-content.collapsible::after {
            content: '...';
            position: absolute;
            bottom: 0;
            right: 0;
            background: linear-gradient(transparent, var(--msg-bg, var(--sidebar-bg)));
            padding: 0 8px;
        }

        .message-content.expanded {
            max-height: none;
        }

        .message-content.expanded::after {
            display: none;
        }

        /* Thinking Indicator */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--sidebar-bg);
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            animation: dotPulse 1.2s infinite;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        .thinking-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ========== Right Panel - Config ========== */
        .config-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg);
            flex-shrink: 0;
            border-left: 1px solid var(--border-color);
        }

        .config-panel.collapsed {
            width: 0;
            overflow: hidden;
            border-left: none;
        }

        .config-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .config-content.collapsed {
            display: none;
        }

        .config-section {
            margin-bottom: 20px;
        }

        .config-section h4 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .config-item {
            margin-bottom: 12px;
        }

        .config-item label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .config-item select,
        .config-item input {
            width: 100%;
            padding: 6px 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
        }

        .config-item select:focus,
        .config-item input:focus {
            outline: none;
            border-color: var(--border-focus);
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .agent-card {
            padding: 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .agent-card:hover {
            box-shadow: var(--hover-shadow);
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex: 1;
        }

        .agent-card-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .agent-card-role {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .agent-card-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .agent-card-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
        }

        .agent-card-status.thinking {
            background: var(--primary);
            animation: pulse 1.5s infinite;
        }

        .agent-card-status.done {
            background: var(--accent-success);
        }

        .agent-card-status.error {
            background: var(--error-color);
        }

        /* Shared State Viewer */
        .shared-state-viewer {
            font-size: 11px;
            color: var(--text-secondary);
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            transition: background 0.3s;
        }

        .shared-state-viewer.flash {
            background: var(--sidebar-bg);
        }

        /* ========== Edit Mode Panel ========== */
        .edit-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .edit-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: inherit;
        }

        .edit-tab:hover {
            color: var(--text-secondary);
            background: var(--sidebar-bg);
        }

        .edit-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .edit-tab.has-changes::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--error-color);
            margin-left: 6px;
            vertical-align: middle;
        }

        .edit-panel {
            display: none;
        }

        .edit-panel.active {
            display: block;
        }

        .role-slot {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .role-slot-label {
            min-width: 70px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            text-align: center;
            flex-shrink: 0;
        }

        .role-slot select {
            flex: 1;
            padding: 6px 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
        }

        .role-slot select:focus {
            outline: none;
            border-color: var(--border-focus);
        }

        .role-slot-remove {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .role-slot-remove:hover {
            background: var(--error-bg);
            color: var(--error-color);
        }

        /* Delete button in collab cards */
        .collab-delete-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .collab-delete-btn:hover {
            background: var(--error-bg);
            color: var(--error-color);
        }

        .view-delete-btn {
            width: 100%;
            margin-top: 16px;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--error-color);
            border-radius: 6px;
            color: var(--error-color);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .view-delete-btn:hover {
            background: var(--error-bg);
        }

        .role-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px;
            background: transparent;
            border: 1px dashed var(--border-color);
            border-radius: 6px;

        .mode-param-group select,

        .btn-save {

        /* ========== Input Bar ========== */
        .input-bar {
            padding: 16px 24px;

            border-top: 1px solid var(--border-color);

            gap: 10px;

        .input-wrapper {
            flex: 1;

        .input-bar textarea {

            border-radius: var(--radius-sm);

            font-family: inherit;

            font-size: 11px;

        .send-btn {
            padding: 10px 24px;

            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 13px;

            font-family: inherit;

        .send-btn:hover {

        .send-btn:disabled {

        .stop-btn {

        /* ========== Status Bar ========== */

        /* ========== Modal ========== */

</head>
<body>
    <!-- App Container -->
    <div class="app-container">
        <!-- Header (matching main page) -->
        <div class="header">
            <div class="header-brand">
                <a href="/static/agent_manager.html" class="nav-btn" title="返回Agent管理">
                    &#8592; 返回
                </a>

        <!-- Main Container - Three Panels -->

                    <span class="collapse-icon" id="topologyCollapseIcon">&#9650;</span>
                </div>
                <div class="topology-content" id="topologyContent">
                    <div class="empty-state" style="padding: 20px;">
                        <div class="icon" style="font-size: 36px;">&#128279;</div>

                    </div>

            <!-- Center: Chat Flow -->
            <div class="chat-panel" id="chatPanel">
                <div class="panel-header" onclick="togglePanel('chat')">
                    <h3>协作流程</h3>
                    <span class="collapse-icon" id="chatCollapseIcon">&#9650;</span>
                </div>
                <div class="task-progress" id="taskProgress">
                    <span id="progressText">运行中...</span>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="progressBarFill"></div>

                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <div class="icon">&#128640;</div>

                            <button class="btn btn-primary" onclick="showCollabSelector()">
                                选择已有配置
                            </button>
                            <button class="btn btn-success" onclick="startNewCollab()">
                                新建协作配置
                            </button>

                        <p style="margin-top: 16px; font-size: 12px; color: var(--text-muted);">
                            选择已有配置，或新建一个多智能体协作任务
                        </p>

            <!-- Right: Config/Edit Panel -->
            <div class="config-panel" id="configPanel">
                <div class="panel-header" onclick="togglePanel('config')">

                    <span class="collapse-icon" id="configCollapseIcon">&#9650;</span>
                </div>
                <div class="edit-tabs" id="editTabs">
                    <button class="edit-tab active" id="tabView" onclick="switchTab('view')">查看</button>
                    <button class="edit-tab" id="tabEdit" onclick="switchTab('edit')">编辑</button>
                </div>
                <div class="config-content" id="configContent">
                    <!-- View Mode -->
                    <div class="edit-panel active" id="viewPanel">
                        <div class="empty-state" style="padding: 20px;">
                            <div class="icon">&#9881;</div>
                            <p>请选择协作配置以查看详情</p>
                        </div>
                    </div>
                    <!-- Edit Mode -->
                    <div class="edit-panel" id="editPanel">
                        <div class="empty-state" style="padding: 20px;">
                            <div class="icon">&#9998;</div>
                            <p>选择"新建配置"或切换到编辑标签</p>
                        </div>
                    </div>

            </div>
        </div>

        <!-- Input Bar -->
        <div class="input-bar">

                <textarea
                    id="inputText"

                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>

            </div>
            <button class="send-btn" id="sendBtn" onclick="executeTask()">&#9654; 执行</button>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Collab Selector Modal -->
    <div class="modal-overlay" id="collabSelectorModal">
        <div class="modal-content" style="width: 600px; height: 520px;">
            <div class="modal-header">
                <h2>选择协作配置</h2>
                <div class="modal-header-actions">
                    <button class="nav-btn" style="font-size: 12px; padding: 6px 14px;" onclick="startNewCollab(); closeCollabSelector();">+ 新建配置</button>
                    <button class="modal-close" onclick="closeCollabSelector()">&times;</button>
                </div>
            </div>
            <div class="modal-body" style="padding: 20px; overflow-y: auto;">
                <div class="modal-search">
                    <input type="text" id="collabSearchInput" placeholder="搜索配置名称..." oninput="filterCollabs(this.value)">
                </div>

                    <!-- Collab items will be loaded here -->
                </div>
            </div>
        </div>

    <script>
        // State
        let currentCollab = null;
        let isRunning = false;
        let eventSource = null;

        // Topology state: agent_id -> { status, role, round, name }
        let topologyState = {};

        // Round state
        let currentRound = 0;
        let maxRounds = 0;
        let currentRoundContainer = null;
        let currentMode = null; // current collaboration mode for event rendering

        // Thinking indicators: agent_id -> DOM element
        let thinkingIndicators = {};

        // Agent color assignment
        const AGENT_COLORS = ['#667eea', '#e67e22', '#27ae60', '#e74c3c', '#9b59b6', '#1abc9c', '#f39c12', '#3498db'];
        let agentColorMap = {};

        // API base
        const API_BASE = '/api/collaborations';

        // Edit mode state
        let editMode = 'view'; // 'view' or 'edit'
        let editHasChanges = false;
        let editRoleSlots = []; // [{role, agent_id}] — the in-memory role list being edited
        let editConfigJson = {}; // in-memory config during editing
        let editName = '';
        let editDescription = '';
        let editModeType = ''; // collaboration mode being edited
        let editCollabId = null; // existing collab ID (null for new)
        let agentsCache = []; // cached agent list for dropdowns

        // Mode definitions for edit UI
        const MODE_ROLES = {
            'supervisor': ['supervisor', 'child'],
            'pipeline': ['worker'],
            'voting': ['voter', 'aggregator'],
            'adversarial_game': ['participant', 'referee']
        };
        const MODE_ROLE_LABELS = {
            'supervisor': { 'supervisor': '监督者', 'child': '子Agent' },
            'pipeline': { 'worker': '处理步骤' },
            'voting': { 'voter': '投票者', 'aggregator': '聚合器' },
            'adversarial_game': { 'participant': '参与者', 'referee': '裁判' }
        };
        const MODE_NAMES = {
            'supervisor': '监督者模式',
            'pipeline': '流水线模式',
            'voting': '投票集成模式',
            'adversarial_game': '博弈模式'
        };
        const MODE_ICONS = {
            'supervisor': '&#128101;',
            'pipeline': '&#128736;',
            'voting': '&#127913;',
            'adversarial_game': '&#9876;'
        };

        // Load collaborations on start
        window.addEventListener('load', () => {
            loadCollabs();
            loadAgentsCache();
        });

        // =================== Agent Colors ===================
        function getAgentColor(agentId) {
            if (!agentColorMap[agentId]) {
                const idx = Object.keys(agentColorMap).length;
                agentColorMap[agentId] = AGENT_COLORS[idx % AGENT_COLORS.length];
            }
            return agentColorMap[agentId];
        }

        function getAgentName(agentId) {
            const agent = agentsCache.find(a => a.id === agentId);
            return agent ? agent.name : agentId;
        }

        function sanitizeForClass(str) {
            return str.replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        // =================== Load Collaborations ===================
        async function loadCollabs() {
            try {
                const resp = await fetch(`${API_BASE}?enabled_only=true`);
                const data = await resp.json();
                window.collabList = data.collaborations || [];
            } catch (e) {
                console.error('Failed to load collaborations:', e);
                updateStatus('加载配置失败', true);
            }
        }

        async function loadAgentsCache() {
            try {
                const resp = await fetch('/api/agents');
                const data = await resp.json();
                agentsCache = data.agents || [];
            } catch (e) {
                console.error('Failed to load agents:', e);
            }
        }

        // =================== Tab Switching ===================
        function switchTab(tab) {
            editMode = tab;
            document.getElementById('tabView').classList.toggle('active', tab === 'view');
            document.getElementById('tabEdit').classList.toggle('active', tab === 'edit');
            document.getElementById('viewPanel').classList.toggle('active', tab === 'view');
            document.getElementById('editPanel').classList.toggle('active', tab === 'edit');

            if (tab === 'edit') {
                renderEditPanel();
            }
        }

        // =================== New Collaboration ===================
        function startNewCollab() {
            editCollabId = null;
            editName = '';
            editDescription = '';
            editModeType = 'supervisor';
            editRoleSlots = [
                {role: 'supervisor', agent_id: ''},
                {role: 'child', agent_id: ''},
                {role: 'child', agent_id: ''}
            ];
            editConfigJson = {parallel_execution: true, split_prompt: null, summary_prompt: null};
            editHasChanges = true;
            currentCollab = null;
            switchTab('edit');
            updateStatus('新建协作配置', false);
            document.getElementById('collabInfo').textContent = '新建配置';
            document.getElementById('collabModeBadge').style.display = 'none';
            // Clear topology and chat
            document.getElementById('topologyContent').innerHTML = '<div class="empty-state" style="padding:20px;"><div class="icon" style="font-size:36px;">&#128279;</div><p style="font-size:12px;">保存后显示拓扑</p></div>';
            document.getElementById('chatMessages').innerHTML = '';
        }

        // =================== Edit Panel Rendering ===================
        function renderEditPanel() {
            const panel = document.getElementById('editPanel');

            const modeOptions = Object.entries(MODE_NAMES).map(([k, v]) =>
                `<option value="${k}" ${k === editModeType ? 'selected' : ''}>${v}</option>`
            ).join('');

            const agentOptions = agentsCache.map(a =>
                `<option value="${a.id}">${escapeHtml(a.name)}</option>`
            ).join('');

            // Build role slots HTML
            let roleSlotsHtml = '';
            editRoleSlots.forEach((slot, i) => {
                const labels = MODE_ROLE_LABELS[editModeType] || {};
                const roleLabel = labels[slot.role] || slot.role;
                const canRemove = canRemoveRoleSlot(i);
                const selectedAgent = agentsCache.find(a => a.id === slot.agent_id);
                const agentNameDisplay = selectedAgent ? ` — ${selectedAgent.name}` : '';
                roleSlotsHtml += `
                    <div class="role-slot" data-index="${i}">

                        <select onchange="onRoleSlotAgentChange(${i}, this.value)">
                            <option value="">-- 选择Agent --</option>

                        </select>
                        ${canRemove ? `<button class="role-slot-remove" onclick="removeRoleSlot(${i})" title="移除">&#10005;</button>` : ''}
                    </div>`;
            });

            // Determine which "add role" buttons to show
            const addButtonsHtml = getAddRoleButtons();

            // Mode-specific params
            const paramsHtml = renderModeParams();

            panel.innerHTML = `
                <div class="config-section">
                    <h4>基本信息</h4>
                    <div class="mode-param-group">
                        <label>名称</label>
                        <input type="text" id="editName" value="${escapeHtml(editName)}" placeholder="输入协作名称" onchange="onEditFieldChange()">
                    </div>
                    <div class="mode-param-group">
                        <label>模式</label>
                        <select id="editModeType" onchange="onEditModeChange()">
                            ${modeOptions}
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>描述</label>
                        <input type="text" id="editDesc" value="${escapeHtml(editDescription)}" placeholder="可选描述" onchange="onEditFieldChange()">
                    </div>
                </div>

                <div class="config-section">
                    <h4>智能体角色</h4>
                    ${roleSlotsHtml}
                    ${addButtonsHtml}
                </div>

                <div class="config-section">
                    <h4>模式参数</h4>
                    ${paramsHtml}
                </div>

                <div class="edit-actions">
                    <button class="btn btn-save" id="btnSave" onclick="saveEditCollab()">保存并去执行</button>
                    <button class="btn" onclick="cancelEdit()">取消</button>
                </div>
            `;
        }

        function canRemoveRoleSlot(index) {
            const mode = editModeType;
            const slot = editRoleSlots[index];
            const roles = MODE_ROLES[mode] || [];

            if (mode === 'supervisor' && slot.role === 'supervisor') return false;
            if (mode === 'pipeline' && editRoleSlots.filter(s => s.role === 'worker').length <= 2) return false;
            if (mode === 'voting' && slot.role === 'aggregator') return false;
            if (mode === 'voting' && slot.role === 'voter' && editRoleSlots.filter(s => s.role === 'voter').length <= 2) return false;
            if (mode === 'adversarial_game' && slot.role === 'referee') return false;
            if (mode === 'adversarial_game' && slot.role === 'participant' && editRoleSlots.filter(s => s.role === 'participant').length <= 2) return false;
            if (editRoleSlots.length <= 1) return false;
            return true;
        }

        function getAddRoleButtons() {
            const mode = editModeType;
            let html = '';
            if (mode === 'supervisor') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('child')">+ 添加子Agent</button>`;
            } else if (mode === 'pipeline') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('worker')">+ 添加处理步骤</button>`;
            } else if (mode === 'voting') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('voter')">+ 添加投票者</button>`;
            } else if (mode === 'adversarial_game') {
                html = `<button class="role-add-btn" onclick="addRoleSlot('participant')">+ 添加参与者</button>`;
            }
            return html;
        }

                    <div class="mode-param-group">

                    </div>
                    <div class="mode-param-group">
                        <label>任务拆分提示词</label>
                        <textarea id="param_split_prompt" onchange="onParamChange()" placeholder="自定义任务拆分提示词（留空使用默认）">${escapeHtml(cfg.split_prompt || '')}</textarea>
                    </div>
                    <div class="mode-param-group">
                        <label>汇总提示词</label>

            } else if (mode === 'pipeline') {
                html = `

                        <label>步骤提示词模板</label>
                        <textarea id="param_step_prompt_template" onchange="onParamChange()" placeholder="自定义步骤提示词模板（留空使用默认）">${escapeHtml(cfg.step_prompt_template || '')}</textarea>
                    </div>`;

                html = `
                    <div class="mode-param-group">
                        <label>聚合策略</label>
                        <select id="param_strategy" onchange="onParamChange()">
                            <option value="majority" ${cfg.strategy === 'majority' ? 'selected' : ''}>多数表决</option>
                        </select>
                    </div>
                    <div class="mode-param-group">
                        <label>聚合器提示词</label>
                        <textarea id="param_aggregator_prompt" onchange="onParamChange()" placeholder="自定义聚合器提示词（留空使用默认）">${escapeHtml(cfg.aggregator_prompt || '')}</textarea>
                    </div>`;
            } else if (mode === 'adversarial_game') {
                html = `
                    <div class="mode-param-group">
                        <label>回合策略</label>
                        <select id="param_turn_strategy" onchange="onParamChange()">
                            <option value="simultaneous" ${cfg.turn_strategy === 'simultaneous' ? 'selected' : ''}>同时行动</option>
                            <option value="sequential" ${cfg.turn_strategy === 'sequential' || cfg.turn_strategy === 'turn_based' ? 'selected' : ''}>顺序行动</option>

                        <label>裁判时机</label>
                        <select id="param_referee_timing" onchange="onParamChange()">
                            <option value="per_round" ${cfg.referee_timing !== 'final' ? 'selected' : ''}>每轮裁决</option>
                            <option value="final" ${cfg.referee_timing === 'final' ? 'selected' : ''}>终局裁决</option>

                    <div class="mode-param-group">

                        <textarea id="param_referee_prompt" onchange="onParamChange()" placeholder="自定义裁判提示词（留空使用默认）">${escapeHtml(cfg.referee_prompt || '')}</textarea>

        // =================== Edit Handlers ===================
        function onRoleSlotAgentChange(index, value) {
            editRoleSlots[index].agent_id = value;
            markEditChanged();
        }

        function addRoleSlot(role) {
            editRoleSlots.push({role: role, agent_id: ''});
            markEditChanged();
            renderEditPanel();
        }

        function removeRoleSlot(index) {
            editRoleSlots.splice(index, 1);
            markEditChanged();
            renderEditPanel();
        }

        function onEditModeChange() {
            const newMode = document.getElementById('editModeType').value;
            if (newMode === editModeType) return;
            editModeType = newMode;
            reassignRolesForMode();
            editConfigJson = getDefaultConfigForMode(newMode);
            markEditChanged();
            renderEditPanel();
        }

        function reassignRolesForMode() {
            const mode = editModeType;
            if (mode === 'pipeline') {
                editRoleSlots.forEach(s => s.role = 'worker');
            } else if (mode === 'voting') {
                let voterCount = 0, hasAgg = false;
                editRoleSlots.forEach(s => {
                    if (s.role === 'voter' && voterCount < 10) { voterCount++; }
                    else if (s.role === 'aggregator' && !hasAgg) { hasAgg = true; }
                    else {
                        if (voterCount < 2) { s.role = 'voter'; voterCount++; }
                        else if (!hasAgg) { s.role = 'aggregator'; hasAgg = true; }
                        else { s.role = 'voter'; voterCount++; }
                    }
                });
            } else if (mode === 'supervisor') {
                let hasSuper = false;
                editRoleSlots.forEach(s => {
                    if (!hasSuper && s.role !== 'child') { s.role = 'supervisor'; hasSuper = true; }
                    else { s.role = 'child'; }
                });
            } else if (mode === 'adversarial_game') {
                let partCount = 0, hasRef = false;
                editRoleSlots.forEach(s => {
                    if (partCount < 2) { s.role = 'participant'; partCount++; }
                    else if (!hasRef) { s.role = 'referee'; hasRef = true; }
                    else { s.role = 'participant'; partCount++; }
                });
            }
        }

        function getDefaultConfigForMode(mode) {
            switch (mode) {
                case 'supervisor': return {parallel_execution: true, split_prompt: null, summary_prompt: null};
                case 'pipeline': return {pass_context: true, step_prompt_template: null};
                case 'voting': return {strategy: 'majority', aggregator_prompt: null};
                case 'adversarial_game': return {turn_strategy: 'simultaneous', referee_timing: 'per_round', max_rounds: 10, game_rules: '', referee_enabled: true, referee_prompt: null, shared_state: {}};
                default: return {};
            }
        }

        function onEditFieldChange() {
            editName = document.getElementById('editName').value;
            editDescription = document.getElementById('editDesc').value;
            markEditChanged();
        }

        function onParamChange() {
            const mode = editModeType;
            if (mode === 'supervisor') {
                editConfigJson.parallel_execution = document.getElementById('param_parallel').value !== 'false';
                editConfigJson.split_prompt = document.getElementById('param_split_prompt').value || null;
                editConfigJson.summary_prompt = document.getElementById('param_summary_prompt').value || null;
            } else if (mode === 'pipeline') {
                editConfigJson.pass_context = document.getElementById('param_pass_context').value !== 'false';
                editConfigJson.step_prompt_template = document.getElementById('param_step_prompt_template').value || null;
            } else if (mode === 'voting') {
                editConfigJson.strategy = document.getElementById('param_strategy').value;
                editConfigJson.aggregator_prompt = document.getElementById('param_aggregator_prompt').value || null;
            } else if (mode === 'adversarial_game') {
                editConfigJson.turn_strategy = document.getElementById('param_turn_strategy').value;
                editConfigJson.referee_timing = document.getElementById('param_referee_timing').value;
                editConfigJson.max_rounds = parseInt(document.getElementById('param_game_max_rounds').value) || 10;
                editConfigJson.game_rules = document.getElementById('param_game_rules').value;
                editConfigJson.referee_enabled = document.getElementById('param_referee_enabled').value !== 'false';
                editConfigJson.referee_prompt = document.getElementById('param_referee_prompt').value || null;
            }
            markEditChanged();
        }

        function markEditChanged() {
            editHasChanges = true;
            const btnSave = document.getElementById('btnSave');
            if (btnSave) btnSave.classList.add('has-changes');
            const tabEdit = document.getElementById('tabEdit');
            if (tabEdit) tabEdit.classList.add('has-changes');
        }

        function clearEditChanged() {
            editHasChanges = false;
            const btnSave = document.getElementById('btnSave');
            if (btnSave) btnSave.classList.remove('has-changes');
            const tabEdit = document.getElementById('tabEdit');
            if (tabEdit) tabEdit.classList.remove('has-changes');
        }

        // =================== Save ===================
        async function saveEditCollab() {
            editName = document.getElementById('editName')?.value || editName;
            editDescription = document.getElementById('editDesc')?.value || editDescription;

            if (!editName.trim()) {
                showToast('请输入协作名称', 'error');
                return;
            }

            const validRoles = MODE_ROLES[editModeType] || [];
            const filledSlots = editRoleSlots.filter(s => s.agent_id);
            if (filledSlots.length === 0) {
                showToast('请至少为一个角色选择Agent', 'error');
                return;
            }

            if (editModeType === 'supervisor' && !filledSlots.some(s => s.role === 'supervisor')) {
                showToast('监督者模式需要至少一个监督者', 'error'); return;
            }
            if (editModeType === 'supervisor' && !filledSlots.some(s => s.role === 'child')) {
                showToast('监督者模式需要至少一个子Agent', 'error'); return;
            }
            if (editModeType === 'pipeline' && filledSlots.filter(s => s.role === 'worker').length < 2) {
                showToast('流水线模式需要至少2个步骤', 'error'); return;
            }
            if (editModeType === 'voting' && filledSlots.filter(s => s.role === 'voter').length < 2) {
                showToast('投票模式需要至少2个投票者', 'error'); return;
            }
            if (editModeType === 'voting' && !filledSlots.some(s => s.role === 'aggregator')) {
                showToast('投票模式需要至少1个聚合器', 'error'); return;
            }
            if (editModeType === 'adversarial_game' && filledSlots.filter(s => s.role === 'participant').length < 2) {
                showToast('博弈模式需要至少2个参与者', 'error'); return;
            }

            const agents = filledSlots.map(s => ({
                agent_id: s.agent_id,
                role: s.role,
                priority: 0,
                config_json: {}
            }));

            const payload = {
                name: editName.trim(),
                description: editDescription.trim(),
                mode: editModeType,
                agents: agents,
                config_json: editConfigJson,
                enabled: true
            };

            try {
                let result;
                if (editCollabId) {
                    result = await apiPut(`${API_BASE}/${editCollabId}`, payload);
                } else {
                    result = await apiPost(API_BASE, payload);
                }

                await loadCollabs();
                clearEditChanged();

                await selectCollab(result.id);
                editCollabId = result.id;

                showToast('保存成功', 'success');

                switchTab('view');
                document.getElementById('inputText').focus();
            } catch (e) {
                showToast('保存失败: ' + e.message, 'error');
            }
        }

        function cancelEdit() {
            if (editHasChanges && !confirm('有未保存的更改，确定取消？')) return;
            if (currentCollab) {
                switchTab('view');
                updateConfigPanel(currentCollab);
            } else {
                switchTab('view');
                document.getElementById('viewPanel').innerHTML = '<div class="empty-state" style="padding:20px;"><div class="icon">&#9881;</div><p>请选择协作配置以查看详情</p></div>';
            }
        }

        // =================== Edit from existing collab ===================
        function loadCollabIntoEditor(collab) {
            editCollabId = collab.id;
            editName = collab.name || '';
            editDescription = collab.description || '';
            editModeType = collab.mode;
            editRoleSlots = (collab.agents || []).map(a => ({role: a.role, agent_id: a.agent_id}));
            editConfigJson = {...(collab.config_json || {})};
            editHasChanges = false;
        }

        // =================== API helpers ===================
        async function apiPost(url, data) {
            const resp = await fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
            return await resp.json();
        }

        async function apiPut(url, data) {
            const resp = await fetch(url, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
            return await resp.json();
        }

        // =================== Toast Notification ===================
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const typeClass = type === 'error' ? 'toast-error' : type === 'warning' ? 'toast-warning' : 'toast-success';
            toast.className = `toast ${typeClass}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // =================== Show Collaboration Selector ===================
        function showCollabSelector() {
            const modal = document.getElementById('collabSelectorModal');
            const searchInput = document.getElementById('collabSearchInput');
            searchInput.value = '';
            renderCollabList('');
            modal.classList.add('visible');
            setTimeout(() => searchInput.focus(), 100);
        }

        function filterCollabs(query) {
            renderCollabList(query);
        }

        function renderCollabList(query) {
            const list = document.getElementById('collabList');
            const collabs = window.collabList || [];
            const filtered = query
                ? collabs.filter(c => c.name.toLowerCase().includes(query.toLowerCase()))
                : collabs;

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state" style="padding: 20px;"><div class="icon">&#128203;</div><p>${query ? '没有匹配的配置' : '未找到协作配置，请先创建一个。'}</p></div>`;
            } else {
                list.innerHTML = filtered.map(c => {
                    const modeIcon = MODE_ICONS[c.mode] || '&#128203;';
                    return `
                    <div class="collab-card" onclick="selectCollab('${c.id}')">
                        <div class="collab-card-header">
                            <span class="collab-card-name">${modeIcon} ${escapeHtml(c.name)}</span>
                            <span class="collab-card-mode">${escapeHtml(MODE_NAMES[c.mode] || c.mode)}</span>
                        </div>
                        <div class="collab-card-desc">${escapeHtml(c.description || '无描述')}</div>
                        <div class="collab-card-meta">
                            ${c.agents ? c.agents.length : 0} 个智能体 | 使用次数: ${c.usage_count || 0}
                        </div>
                        <button class="collab-delete-btn" style="position:absolute;top:8px;right:8px;" onclick="event.stopPropagation(); deleteCollab('${c.id}', '${escapeHtml(c.name)}')" title="删除配置">&#10005;</button>
                    </div>`;
                }).join('');
            }
        }

        function closeCollabSelector() {
            document.getElementById('collabSelectorModal').classList.remove('visible');
        }

        // =================== Select a Collaboration ===================
        async function selectCollab(collabId) {
            try {
                const resp = await fetch(`${API_BASE}/${collabId}`);
                if (!resp.ok) throw new Error('Failed to load collaboration');

                currentCollab = await resp.json();
                closeCollabSelector();

                // Reset state
                agentColorMap = {};
                topologyState = {};
                currentRound = 0;
                currentRoundContainer = null;
                thinkingIndicators = {};

                // Load into editor state
                loadCollabIntoEditor(currentCollab);

                // Build topology
                buildTopology(currentCollab);
                updateConfigPanel(currentCollab);
                updateStatus(`已选择: ${currentCollab.name}`, false);

                document.getElementById('collabInfo').textContent = currentCollab.name;
                const modeBadge = document.getElementById('collabModeBadge');
                modeBadge.textContent = MODE_NAMES[currentCollab.mode] || currentCollab.mode;
                modeBadge.style.display = 'inline';

                // Clear chat
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '';

            } catch (e) {
                console.error('Failed to select collaboration:', e);
                updateStatus('加载协作配置失败', true);
            }
        }

        // =================== Build Topology ===================
        function buildTopology(collab) {
            const container = document.getElementById('topologyContent');
            if (!collab || !collab.agents || collab.agents.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 20px;"><div class="icon" style="font-size:36px;">&#128279;</div><p style="font-size: 12px;">未配置智能体</p></div>';
                return;
            }

            topologyState = {};
            collab.agents.forEach(a => {
                topologyState[a.agent_id] = { status: 'idle', role: a.role, name: a.agent_id };
                getAgentColor(a.agent_id);
            });

            let html = '';
            const mode = collab.mode;

            if (mode === 'supervisor') {
                html = buildSupervisorTopology(collab);
            } else if (mode === 'pipeline') {
                html = buildPipelineTopology(collab);
            } else if (mode === 'voting') {
                html = buildVotingTopology(collab);
            } else if (mode === 'adversarial_game') {
                html = buildGameTopology(collab);
            } else {
                html = buildGenericTopology(collab);
            }

            container.innerHTML = html;
        }

        function buildSupervisorTopology(collab) {
            const supervisor = collab.agents.find(a => a.role === 'supervisor');
            const children = collab.agents.filter(a => a.role === 'child');
            const isParallel = collab.config_json && collab.config_json.parallel_execution !== false;

            let html = '<div class="topo-flow">';
            html += '<div class="topo-label">&#128230; 任务输入</div>';
            html += '<div class="topo-connector" data-from="input" data-to="supervisor"></div>';

            if (supervisor) {
                html += buildTopoNode(supervisor, 'supervisor');
            }
            html += '<div class="topo-label">&#128295; 拆分任务</div>';
            html += '<div class="topo-connector" data-from="supervisor" data-to="children"></div>';

            if (children.length > 0) {
                html += `<div class="topo-label">${isParallel ? '&#9889; 并行执行' : '&#128336; 顺序执行'}</div>`;
                html += '<div class="topo-parallel">';
                children.forEach((child, i) => {
                    html += buildTopoNode(child, `child_${i}`);
                });
                html += '</div>';
            }

            html += '<div class="topo-connector" data-from="children" data-to="supervisor_summary"></div>';
            html += '<div class="topo-label">&#128203; 汇总结果</div>';
            if (supervisor) {
                html += buildTopoNode(supervisor, 'supervisor_summary', '汇总');
            }

            html += '<div class="topo-connector" data-from="supervisor_summary" data-to="output"></div>';
            html += '<div class="topo-label">&#128230; 最终输出</div>';

            html += '</div>';
            return html;
        }

        function buildPipelineTopology(collab) {
            const workers = collab.agents.filter(a => a.role === 'worker');
            if (workers.length === 0) return '<div class="empty-state" style="padding:20px;"><div class="icon" style="font-size:36px;">&#128736;</div><p style="font-size:12px;">未配置worker</p></div>';

            let html = '<div class="topo-flow">';
            html += '<div class="topo-label">&#128230; 任务输入</div>';
            html += '<div class="topo-connector" data-from="input" data-to="pipeline"></div>';

            workers.forEach((w, i) => {
                html += buildTopoNode(w, `worker_${i}`, `步骤${i + 1}`);
                if (i < workers.length - 1) {
                    html += '<div class="topo-connector" data-from="pipeline" data-to="pipeline"></div>';
                    html += '<div class="topo-label">&#10132;</div>';
                }
            });

            html += '<div class="topo-connector" data-from="pipeline" data-to="output"></div>';
            html += '<div class="topo-label">&#128230; 最终输出</div>';
            html += '</div>';
            return html;
        }

        function buildVotingTopology(collab) {
            const voters = collab.agents.filter(a => a.role === 'voter');
            const aggregator = collab.agents.find(a => a.role === 'aggregator');
            if (voters.length === 0) return '<div class="empty-state" style="padding:20px;"><div class="icon" style="font-size:36px;">&#127913;</div><p style="font-size:12px;">未配置voter</p></div>';

            let html = '<div class="topo-flow">';
            html += '<div class="topo-label">&#128230; 相同问题</div>';
            html += '<div class="topo-connector" data-from="input" data-to="voters"></div>';
            html += '<div class="topo-label">&#128101; 独立投票</div>';
            html += '<div class="topo-parallel">';
            voters.forEach((v, i) => {
                html += buildTopoNode(v, `voter_${i}`, `投票者${i + 1}`);
            });
            html += '</div>';

            if (aggregator) {
                html += '<div class="topo-connector" data-from="voters" data-to="aggregator"></div>';
                html += '<div class="topo-label">&#128203; 聚合</div>';
                html += buildTopoNode(aggregator, 'aggregator', '聚合器');
            }

            html += '<div class="topo-connector" data-from="voters" data-to="output"></div>';
            html += '<div class="topo-label">&#128230; 最终答案</div>';
            html += '</div>';
            return html;
        }

        function buildGameTopology(collab) {
            const config = collab.config_json || {};
            const turnStrategy = config.turn_strategy === 'turn_based' ? 'sequential' : (config.turn_strategy || 'simultaneous');
            const refereeTiming = config.referee_timing || 'per_round';
            const participants = collab.agents.filter(a =>
                a.role === 'participant' || a.role === 'player_black' || a.role === 'player_white'
            );
            const referee = collab.agents.find(a => a.role === 'referee');
            const refereeEnabled = config.referee_enabled !== false;

            let html = '<div class="topo-flow">';

            html += '<div class="topo-label">&#128230; 游戏开始</div>';
            html += '<div class="topo-connector" data-from="input" data-to="game"></div>';

            if (turnStrategy === 'simultaneous') {
                html += '<div class="topo-label">&#9889; 同时行动</div>';
                html += '<div class="topo-parallel">';
                participants.forEach((p, i) => {
                    const key = p.role === 'participant' ? `participant_${i}` : p.role;
                    html += buildTopoNode(p, key, `参与者${i + 1}`);
                });
                html += '</div>';
            } else {
                html += `<div class="topo-label">&#128336; 顺序行动</div>`;
                html += '<div class="topo-game-row">';
                participants.forEach((p, i) => {
                    const key = p.role === 'participant' ? `participant_${i}` : p.role;
                    html += buildTopoNode(p, key, `参与者${i + 1}`);
                    if (i < participants.length - 1) {
                        html += '<div class="topo-bidi-arrow">&#8594;</div>';
                    }
                });
                html += '</div>';
            }

            if (refereeEnabled && referee) {
                html += '<div class="topo-connector" data-from="participants" data-to="referee"></div>';
                const timingLabel = refereeTiming === 'final' ? '&#127942; 终局裁决' : '&#9878; 每轮裁决';
                html += `<div class="topo-label">${timingLabel}</div>`;
                html += buildTopoNode(referee, 'referee', '裁判');
            }

            html += '<div class="topo-turn-indicator" id="topoTurnIndicator"></div>';
            html += '<div class="topo-connector" data-from="game" data-to="output"></div>';
            html += '<div class="topo-label">&#127942; 游戏结束</div>';

            html += '</div>';
            return html;
        }

        function buildGenericTopology(collab) {
            let html = '<div class="topo-flow">';
            collab.agents.forEach((agent, i) => {
                html += buildTopoNode(agent, sanitizeForClass(agent.agent_id));
                if (i < collab.agents.length - 1) {
                    html += '<div class="topo-connector"></div>';
                }
            });
            html += '</div>';
            return html;
        }

        function buildTopoNode(agent, key, overrideRole) {
            const color = getAgentColor(agent.agent_id);
            const roleDisplay = overrideRole || agent.role;
            const agentName = getAgentName(agent.agent_id);
            return `<div class="topo-node" id="topo_${sanitizeForClass(key)}" data-agent-id="${escapeHtml(agent.agent_id)}" style="--node-color: ${color};">
                <div class="topo-node-status" id="topoStatus_${sanitizeForClass(key)}"></div>
                <div class="topo-node-name" style="color: ${color};">${escapeHtml(agentName)}</div>
                <div class="topo-node-role agent-role ${agent.role}">${escapeHtml(roleDisplay)}</div>
            </div>`;
        }

        // =================== Topology State Updates ===================
        function resetTopology() {
            currentMode = null;
            Object.keys(topologyState).forEach(id => {
                topologyState[id].status = 'idle';
            });
            document.querySelectorAll('.topo-node').forEach(node => {
                node.classList.remove('thinking', 'done', 'error');
            });
            document.querySelectorAll('.topo-node-status').forEach(s => {
                s.className = 'topo-node-status';
            });
            document.querySelectorAll('.topo-connector').forEach(c => {
                c.classList.remove('active');
            });
            const turnIndicator = document.getElementById('topoTurnIndicator');
            if (turnIndicator) turnIndicator.textContent = '';

            document.querySelectorAll('.agent-card-status').forEach(s => {
                s.className = 'agent-card-status';
            });
        }

        function updateNodeStatus(agentId, status) {
            document.querySelectorAll('.topo-node').forEach(node => {
                if (node.dataset.agentId === agentId) {
                    node.classList.remove('thinking', 'done', 'error');
                    node.classList.add(status);
                }
            });

            // Update status dot on node
            document.querySelectorAll('.topo-node-status').forEach(s => {
                const parentNode = s.closest('.topo-node');
                if (parentNode && parentNode.dataset.agentId === agentId) {
                    s.className = 'topo-node-status ' + status;
                }
            });

            document.querySelectorAll(`.agent-card[data-agent-id="${agentId}"] .agent-card-status`).forEach(s => {
                s.className = 'agent-card-status ' + status;
            });

            if (topologyState[agentId]) {
                topologyState[agentId].status = status;
            }
        }

        function activateConnector(fromKey, toKey) {
            document.querySelectorAll('.topo-connector').forEach(c => {
                if (c.dataset.from === fromKey && c.dataset.to === toKey) {
                    c.classList.add('active');
                    setTimeout(() => c.classList.remove('active'), 2000);
                }
            });
        }

        function updateTurnIndicator(role) {
            const turnIndicator = document.getElementById('topoTurnIndicator');
            if (turnIndicator) {
                const roleLabels = {
                    'player_black': '黑方',
                    'player_white': '白方'
                };
                turnIndicator.textContent = `当前回合: ${roleLabels[role] || role}`;
            }
        }

                    <div class="config-item">
