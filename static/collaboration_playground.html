                            <textarea id="param_split_prompt" onchange="readParamsFromDom()" placeholder="自定义任务拆分提示词（留空使用默认）">${escapeHtml(cfg.split_prompt || '')}</textarea></div>
                        <div class="mode-param-group"><label>汇总提示词</label>
                            <textarea id="param_summary_prompt" onchange="readParamsFromDom()" placeholder="自定义汇总提示词（留空使用默认）">${escapeHtml(cfg.summary_prompt || '')}</textarea></div>
                    </div>
                </div>`;
        } else if (mode === 'pipeline') {
            paramsHtml = `
                <div class="config-section">
                    <div class="config-section-title open" onclick="toggleConfigSection(this)">模式参数</div>
                    <div class="config-section-body open">
                        <div class="mode-param-group"><label>上下文传递</label>
                            <select id="param_pass_context" onchange="readParamsFromDom()">
                                <option value="true" ${cfg.pass_context !== false ? 'selected' : ''}>传递全部历史</option>
                                <option value="false" ${cfg.pass_context === false ? 'selected' : ''}>仅传递上一步</option>
                            </select></div>
                        <div class="mode-param-group"><label>步骤提示词模板</label>
                            <textarea id="param_step_prompt_template" onchange="readParamsFromDom()" placeholder="自定义步骤提示词模板（留空使用默认）">${escapeHtml(cfg.step_prompt_template || '')}</textarea></div>
                    </div>
                </div>`;
        } else if (mode === 'voting') {
            paramsHtml = `
                <div class="config-section">
                    <div class="config-section-title open" onclick="toggleConfigSection(this)">模式参数</div>
                    <div class="config-section-body open">
                        <div class="mode-param-group"><label>聚合策略</label>
                            <select id="param_strategy" onchange="readParamsFromDom()">
                                <option value="majority" ${cfg.strategy === 'majority' ? 'selected' : ''}>多数表决</option>
                                <option value="best_of" ${cfg.strategy === 'best_of' ? 'selected' : ''}>择优选择</option>
                            </select></div>
                        <div class="mode-param-group"><label>聚合器提示词</label>
                            <textarea id="param_aggregator_prompt" onchange="readParamsFromDom()" placeholder="自定义聚合器提示词（留空使用默认）">${escapeHtml(cfg.aggregator_prompt || '')}</textarea></div>
                    </div>
                </div>`;
        } else if (mode === 'adversarial_game') {
            paramsHtml = `
                <div class="config-section">
                    <div class="config-section-title open" onclick="toggleConfigSection(this)">模式参数</div>
                    <div class="config-section-body open">
                        <div class="mode-param-group"><label>沙箱环境</label>
                            <select id="param_sandbox" onchange="onSandboxChange()">
                                <option value="">无（自由文本交互）</option>
                            </select>
                            <div id="sandboxDesc" style="font-size:11px;color:var(--text-muted);margin-top:2px;"></div></div>
                        <div class="mode-param-group"><label>回合策略</label>
                            <select id="param_turn_strategy" onchange="readParamsFromDom()">
                                <option value="simultaneous" ${cfg.turn_strategy === 'simultaneous' ? 'selected' : ''}>同时行动</option>
                                <option value="sequential" ${cfg.turn_strategy === 'sequential' ? 'selected' : ''}>轮流行动</option>
                            </select></div>
                        <div class="mode-param-group"><label>最大轮次</label>
                            <input type="number" id="param_game_max_rounds" value="${cfg.max_rounds || 10}" min="1" max="200" onchange="readParamsFromDom()"></div>
                        <div class="mode-param-group"><label>游戏规则</label>
                            <textarea id="param_game_rules" onchange="readParamsFromDom()" placeholder="描述游戏规则...">${escapeHtml(cfg.game_rules || '')}</textarea></div>
                        <div class="mode-param-group"><label>启用裁判</label>
                            <select id="param_referee_enabled" onchange="readParamsFromDom()">
                                <option value="true" ${cfg.referee_enabled !== false ? 'selected' : ''}>是</option>
                                <option value="false" ${cfg.referee_enabled === false ? 'selected' : ''}>否</option>
                            </select></div>
                        <div class="mode-param-group"><label>裁判提示词</label>
                            <textarea id="param_referee_prompt" onchange="readParamsFromDom()" placeholder="自定义裁判提示词（留空使用默认）">${escapeHtml(cfg.referee_prompt || '')}</textarea></div>
                    </div>
                </div>`;
            // Load sandbox options asynchronously after DOM insert
            setTimeout(() => loadSandboxOptions(cfg.sandbox || ''), 0);
        }

        // Iteration config (all modes)
        const iter = modalIteration;
        paramsHtml += `
            <div class="config-section">
                <div class="config-section-title" onclick="toggleConfigSection(this)">迭代配置</div>
                <div class="config-section-body">
                    <div class="toggle-row">
                        <label class="toggle-switch">
                            <input type="checkbox" id="param_iter_enabled" ${iter.enabled ? 'checked' : ''} onchange="onIterToggle()">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="toggle-label">启用迭代（不通过则自动重试）</span>
                    </div>
                    <div id="iterParams" style="${iter.enabled ? '' : 'display:none'}">
                        <div class="mode-param-group"><label>最大迭代轮次</label>
                            <input type="number" id="param_iter_max" value="${iter.max_iterations}" min="1" max="10" onchange="readIterFromDom()"></div>
                        <div class="mode-param-group"><label>评估提示词</label>
                            <textarea id="param_iter_eval_prompt" onchange="readIterFromDom()" placeholder="评估标准提示词（留空则自动通过）">${escapeHtml(iter.evaluator_prompt || '')}</textarea></div>
                    </div>
                </div>
            </div>`;

        container.innerHTML = paramsHtml;
    }

    function toggleConfigSection(el) {
        el.classList.toggle('open');
        el.nextElementSibling.classList.toggle('open');
    }

    function onIterToggle() {
        const enabled = document.getElementById('param_iter_enabled').checked;
        modalIteration.enabled = enabled;
        const iterParams = document.getElementById('iterParams');
        if (iterParams) iterParams.style.display = enabled ? '' : 'none';
    }

    // ======== Sandbox helpers ========
    let _sandboxTypes = [];
    async function loadSandboxOptions(selectedValue) {
        try {
            const resp = await fetch('/api/collaborations/sandboxes/list');
            const data = await resp.json();
            _sandboxTypes = data.sandboxes || [];
        } catch(e) {
            _sandboxTypes = [];
        }
        const sel = document.getElementById('param_sandbox');
        if (!sel) return;
        // Keep the "无" option, add sandbox types
        sel.innerHTML = '<option value="">无（自由文本交互）</option>';
        for (const s of _sandboxTypes) {
            sel.innerHTML += `<option value="${s.name}" ${s.name === selectedValue ? 'selected' : ''}>${s.name} — ${escapeHtml(s.description)}</option>`;
        }
        onSandboxChange();
    }

    function onSandboxChange() {
        const sel = document.getElementById('param_sandbox');
        const desc = document.getElementById('sandboxDesc');
        const val = sel?.value || '';
        if (desc) {
            const s = _sandboxTypes.find(x => x.name === val);
            desc.textContent = s ? s.description : '';
        }
        readParamsFromDom();
    }

    function readParamsFromDom() {
        const mode = document.getElementById('mMode')?.value;
        if (!mode) return;
        if (mode === 'supervisor') {
            modalConfigJson.parallel_execution = document.getElementById('param_parallel')?.value !== 'false';
            modalConfigJson.split_prompt = document.getElementById('param_split_prompt')?.value || null;
            modalConfigJson.summary_prompt = document.getElementById('param_summary_prompt')?.value || null;
        } else if (mode === 'pipeline') {
            modalConfigJson.pass_context = document.getElementById('param_pass_context')?.value !== 'false';
            modalConfigJson.step_prompt_template = document.getElementById('param_step_prompt_template')?.value || null;
        } else if (mode === 'voting') {
            modalConfigJson.strategy = document.getElementById('param_strategy')?.value || 'majority';
            modalConfigJson.aggregator_prompt = document.getElementById('param_aggregator_prompt')?.value || null;
        } else if (mode === 'adversarial_game') {
            modalConfigJson.turn_strategy = document.getElementById('param_turn_strategy')?.value || 'simultaneous';
            modalConfigJson.max_rounds = parseInt(document.getElementById('param_game_max_rounds')?.value) || 10;
            modalConfigJson.game_rules = document.getElementById('param_game_rules')?.value || '';
            modalConfigJson.referee_enabled = document.getElementById('param_referee_enabled')?.value !== 'false';
            modalConfigJson.referee_prompt = document.getElementById('param_referee_prompt')?.value || null;
            const sandboxVal = document.getElementById('param_sandbox')?.value || '';
            if (sandboxVal) {
                modalConfigJson.sandbox = sandboxVal;
                modalConfigJson.sandbox_config = {};
            } else {
                delete modalConfigJson.sandbox;
                delete modalConfigJson.sandbox_config;
            }
        }
    }

    function readIterFromDom() {
        modalIteration.enabled = document.getElementById('param_iter_enabled')?.checked || false;
        modalIteration.max_iterations = parseInt(document.getElementById('param_iter_max')?.value) || 3;
        modalIteration.evaluator_prompt = document.getElementById('param_iter_eval_prompt')?.value || '';
    }

    function buildConfigJson() {
        readParamsFromDom();
        readIterFromDom();
        const config = { ...modalConfigJson };
        if (modalIteration.enabled) {
            config.iteration = {
                enabled: true,
                max_iterations: modalIteration.max_iterations,
                evaluator_prompt: modalIteration.evaluator_prompt || null,
                feedback_strategy: modalIteration.feedback_strategy || 'full',
            };
        } else {
            config.iteration = { enabled: false };
        }
        for (const k of Object.keys(config)) {
            if (config[k] === '') config[k] = null;
        }
        return config;
    }

    function editCollab(id) {
        if (currentCollab && currentCollab.id === id) {
            openEditModal();
        } else {
            location.hash = '#detail/' + id;
            setTimeout(() => openEditModal(), 500);
        }
    }

    function addRoleRow(role, agentId, isHuman) {
        const container = document.getElementById('mRoles');
        if (!container) return;
        const mode = document.getElementById('mMode')?.value || 'supervisor';
        const modeInfo = MODE_ROLES[mode] || MODE_ROLES.supervisor;
        const div = document.createElement('div');
        div.className = 'role-row';
        const selectedId = isHuman ? 'human' : (agentId || '');
        div.innerHTML = `
            <select style="width:120px;">${modeInfo.roles.map(r=>`<option value="${r}" ${r===role?'selected':''}>${modeInfo.labels[r]||r}</option>`).join('')}</select>
            <select style="flex:1;"><option value="human" ${selectedId==='human'?'selected':''}>🧑 人类</option><option value="" ${!selectedId?'selected':''}>选择Agent</option>${agentsCache.map(a=>`<option value="${a.id}" ${a.id===selectedId?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}</select>
            <button class="btn" style="font-size:10px;padding:2px 6px;" onclick="this.parentElement.remove()">✕</button>`;
        container.appendChild(div);
    }

    async function saveCreate() {
        const name = document.getElementById('mName').value.trim();
        if (!name) { showToast('请输入名称','warning'); return; }
        const mode = document.getElementById('mMode').value;
        const desc = document.getElementById('mDesc').value.trim();
        const roleRows = document.querySelectorAll('#mRoles .role-row');
        const agents = [];
        roleRows.forEach(row => {
            const role = row.querySelector('select').value;
            const agentId = row.querySelectorAll('select')[1].value;
            const isHuman = agentId === 'human';
            if (agentId) agents.push({agent_id: isHuman ? 'human' : agentId, role: role, priority: 0, is_human: isHuman});
        });
        const config_json = buildConfigJson();

        try {
            const resp = await fetch(API_BASE, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({name, mode, description: desc, agents, config_json, enabled: true})
            });
            if (!resp.ok) throw new Error('Failed');
            closeModal();
            loadCollabList();
            showToast('创建成功','success');
        } catch(e) {
            showToast('创建失败','error');
        }
    }

    async function saveEdit() {
        if (!currentCollab) return;
        const name = document.getElementById('mName').value.trim();
        const mode = document.getElementById('mMode').value;
        const desc = document.getElementById('mDesc').value.trim();
        const roleRows = document.querySelectorAll('#mRoles .role-row');
        const agents = [];
        roleRows.forEach(row => {
            const role = row.querySelector('select').value;
            const agentId = row.querySelectorAll('select')[1].value;
            const isHuman = agentId === 'human';
            if (agentId) agents.push({agent_id: isHuman ? 'human' : agentId, role: role, priority: 0, is_human: isHuman});
        });
        const config_json = buildConfigJson();
        try {
            const resp = await fetch(`${API_BASE}/${currentCollab.id}`, {
                method: 'PUT', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({name, mode, description: desc, agents, config_json})
            });
            if (!resp.ok) throw new Error('Failed');
            closeModal();
            loadCollabDetail(currentCollab.id);
            showToast('保存成功','success');
        } catch(e) {
            showToast('保存失败','error');
        }
    }

    async function deleteCollab(id) {
        const collabId = id || (currentCollab ? currentCollab.id : null);
        if (!collabId) return;
        if (!confirm('确定删除此协作配置？')) return;
        try {
            const resp = await fetch(`${API_BASE}/${collabId}`, {method:'DELETE'});
            if (!resp.ok) throw new Error('Failed');
            showToast('已删除','success');
            location.hash = '#list';
        } catch(e) { showToast('删除失败','error'); }
    }

    function closeModal() {
        document.getElementById('collabModal').classList.remove('active');
    }
    </script>
</body>
</html>
