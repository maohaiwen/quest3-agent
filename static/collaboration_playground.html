            const votingStrategy = collab.config_json ? collab.config_json.strategy || 'best_of' : 'best_of';
            const votingStrategyNames = { majority: '多数表决', weighted: '加权投票', best_of: '择优选择' };
            const modeLabel = MODE_NAMES[collab.mode] || collab.mode;

            // Build agent list with role labels and agent names
            const roleLabels = MODE_ROLE_LABELS[collab.mode] || {};
            const roleCounts = {};
            const agentCardsHtml = (collab.agents || []).map(a => {
                const rLabel = roleLabels[a.role] || a.role;
                roleCounts[a.role] = (roleCounts[a.role] || 0) + 1;
                const displayLabel = roleCounts[a.role] > 1 ? `${rLabel}${roleCounts[a.role]}` : rLabel;
                const agentName = agentsCache.find(ag => ag.id === a.agent_id)?.name || a.agent_id;
                return `
                    <div class="agent-card" data-agent-id="${escapeHtml(a.agent_id)}">
                        <div class="agent-card-status"></div>
                        <div style="flex:1;">
                            <div class="agent-card-header">
                                <span class="agent-card-name" style="color: ${getAgentColor(a.agent_id)};">${escapeHtml(displayLabel)} — ${escapeHtml(agentName)}</span>
                                <span class="agent-card-role agent-role ${a.role}">${escapeHtml(a.role)}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');

            viewPanel.innerHTML = `
                <div class="config-section">
                    <h4>基本信息</h4>
                    <div class="config-item">
                        <label>名称</label>
                        <input type="text" value="${escapeHtml(collab.name)}" disabled>
                    </div>
                    <div class="config-item">
                        <label>模式</label>
                        <input type="text" value="${escapeHtml(modeLabel)}" disabled>
                    </div>
                    ${isGameMode ? `
                    <div class="config-item">
                        <label>回合策略</label>
                        <input type="text" value="${escapeHtml(strategyLabel)}" disabled>
                    </div>
                    ` : ''}
                    ${isSupervisorMode ? `
                    <div class="config-item">
                        <label>执行方式</label>
                        <input type="text" value="${parallelExec ? '并行执行' : '串行执行'}" disabled>
                    </div>
                    ` : ''}
                    ${isPipelineMode ? `
                    <div class="config-item">
                        <label>上下文传递</label>
                        <input type="text" value="${passContext ? '传递全部历史' : '仅传递上一步'}" disabled>
                    </div>
                    ` : ''}
                    ${isVotingMode ? `
                    <div class="config-item">
                        <label>聚合策略</label>
                        <input type="text" value="${escapeHtml(votingStrategyNames[votingStrategy] || votingStrategy)}" disabled>
                    </div>
                    ` : ''}
                    <div class="config-item">
                        <label>描述</label>
                        <input type="text" value="${escapeHtml(collab.description || '')}" disabled>
                    </div>
                </div>

                <div class="config-section">
                    <h4>智能体 (${collab.agents ? collab.agents.length : 0})</h4>
                    <div class="agent-list">
                        ${agentCardsHtml || '<p style="color: #606080; font-size: 12px;">未配置智能体</p>'}
                    </div>
                </div>

                ${isGameMode && gameRules ? `
                <div class="config-section">
                    <h4>游戏规则</h4>
                    <pre style="font-size: 11px; color: #b0b0d0; background: #0a0a15; padding: 10px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap;">${escapeHtml(gameRules)}</pre>
                </div>
                ` : ''}

                <div class="config-section">
                    <h4>配置</h4>
                    <pre style="font-size: 11px; color: #8080a0; background: #0a0a15; padding: 10px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap;">${escapeHtml(JSON.stringify(collab.config_json, null, 2))}</pre>
                </div>

                ${isGameMode ? `
                <div class="config-section" id="sharedStateSection">
                    <h4>共享状态</h4>
                    <pre class="shared-state-viewer" id="sharedStateViewer">{}</pre>
                </div>
                ` : ''}

                <button class="view-delete-btn" onclick="deleteCollab('${collab.id}', '${escapeHtml(collab.name)}')">&#10005; 删除此配置</button>
            `;
        }

        // =================== Delete Collaboration ===================
        async function deleteCollab(collabId, collabName) {
            if (!confirm(`确定要删除协作配置「${collabName}」吗？此操作不可撤销。`)) return;

            try {
                const resp = await fetch(`${API_BASE}/${collabId}`, {method: 'DELETE'});
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);

                // If deleting the currently selected collab, clear the state
                if (currentCollab && currentCollab.id === collabId) {
                    currentCollab = null;
                    agentColorMap = {};
                    topologyState = {};
                    currentRoundContainer = null;
                    thinkingIndicators = {};
                    document.getElementById('topologyContent').innerHTML = '<div class="empty-state" style="padding:20px;"><div class="icon" style="font-size:36px;">&#9698;</div><p style="font-size:12px;">选择协作配置后显示拓扑关系</p></div>';
                    document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><div class="icon">&#128640;</div><p style="margin-bottom: 16px;">欢迎使用多智能体协作平台</p><div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;"><button class="btn" onclick="showCollabSelector()" style="background:#0066cc;color:white;border-color:#0088ff;">选择已有配置</button><button class="btn" onclick="startNewCollab()" style="background:#10b981;color:white;border-color:#059669;">新建协作配置</button></div><p style="margin-top:16px;font-size:12px;color:#606080;">选择已有配置，或新建一个多智能体协作任务</p></div>';
                    document.getElementById('viewPanel').innerHTML = '<div class="empty-state" style="padding:20px;"><div class="icon">&#9881;</div><p>请选择协作配置以查看详情</p></div>';
                    document.getElementById('collabInfo').textContent = '未选择协作配置';
                    updateStatus('就绪', false);
                }

                // Refresh list
                await loadCollabs();
                showToast('已删除: ' + collabName);

                // Re-render selector if open
                const modal = document.getElementById('collabSelectorModal');
                if (modal.classList.contains('visible')) {
                    showCollabSelector();
                }
            } catch (e) {
                showToast('删除失败: ' + e.message, true);
            }
        }

        // =================== Round Containers ===================
        function createRoundContainer(round, max) {
            const chatMessages = document.getElementById('chatMessages');

            // Remove empty state if present
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Mark previous round as completed
            if (currentRoundContainer) {
                currentRoundContainer.classList.remove('active');
                currentRoundContainer.classList.add('completed');
                const prevDot = currentRoundContainer.querySelector('.round-status-dot');
                if (prevDot) { prevDot.classList.remove('active'); prevDot.classList.add('done'); }
            }

            let label;
            if (round >= 900) {
                label = '汇总阶段';
            } else if (round === 0) {
                label = '任务初始化';
            } else if (currentMode === 'pipeline') {
                label = `步骤 ${round}`;
            } else if (currentMode === 'voting') {
                label = round === 1 ? '投票阶段' : round === 2 ? '聚合阶段' : `第 ${round} 轮`;
            } else {
                label = `第 ${round} 轮`;
            }

            const container = document.createElement('div');
            container.className = 'round-container active';
            container.dataset.round = round;
            container.innerHTML = `
                <div class="round-header" onclick="toggleRound(this)">
                    <span class="round-number">${label}</span>
                    ${max ? `<span class="round-progress">/ ${max}</span>` : ''}
                    <span class="round-status-dot active"></span>
                </div>
                <div class="round-messages"></div>
            `;

            chatMessages.appendChild(container);
            currentRoundContainer = container.querySelector('.round-messages');
            currentRound = round;
            maxRounds = max || maxRounds;

            chatMessages.scrollTop = chatMessages.scrollHeight;
            return container;
        }

        function ensureRoundContainer(round, max) {
            // Find existing container for this round
            const existing = document.querySelector(`.round-container[data-round="${round}"]`);
            if (existing) {
                currentRoundContainer = existing.querySelector('.round-messages');
                return existing;
            }
            return createRoundContainer(round, max);
        }

        function toggleRound(headerEl) {
            const messages = headerEl.parentElement.querySelector('.round-messages');
            if (messages) {
                messages.classList.toggle('collapsed-round');
            }
        }

        function closeCurrentRound(result) {
            if (!currentRoundContainer) return;
            const container = currentRoundContainer.closest('.round-container');
            if (container) {
                container.classList.remove('active');
                if (result === 'passed') {
                    container.classList.add('completed');
                } else if (result === 'failed') {
                    container.classList.add('failed');
                }
                const dot = container.querySelector('.round-status-dot');
                if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }
            }
        }

        // =================== Thinking Indicators ===================
        function addThinkingIndicator(agentId, agentName, role, round) {
            if (!currentRoundContainer) {
                ensureRoundContainer(round || 0);
            }

            const color = getAgentColor(agentId);
            const div = document.createElement('div');
            div.className = 'thinking-indicator';
            div.dataset.agentId = agentId;
            div.innerHTML = `
                <div class="thinking-dots"><span></span><span></span><span></span></div>
                <span class="thinking-label" style="color: ${color};">${escapeHtml(agentName)} (${role}) 思考中...</span>
            `;

            currentRoundContainer.appendChild(div);
            thinkingIndicators[agentId] = div;

            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeThinkingIndicator(agentId) {
            const indicator = thinkingIndicators[agentId];
            if (indicator) {
                indicator.remove();
                delete thinkingIndicators[agentId];
            }
        }

        // =================== Shared State ===================
        function updateSharedState(state) {
            const viewer = document.getElementById('sharedStateViewer');
            if (viewer) {
                viewer.textContent = JSON.stringify(state, null, 2);
                viewer.classList.add('flash');
                setTimeout(() => viewer.classList.remove('flash'), 500);
            }
        }

        // =================== Execute Task ===================
        async function executeTask() {
            if (!currentCollab) {
                alert('请先选择协作配置');
                return;
            }

            const inputText = document.getElementById('inputText').value.trim();
            if (!inputText) {
                alert('请输入任务');
                return;
            }

            if (isRunning) {
                alert('已有任务正在运行');
                return;
            }

            // Start execution
            isRunning = true;
            updateStatus('运行中...', false, true);
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('taskProgress').classList.add('visible');

            // Reset
            resetTopology();
            currentRoundContainer = null;
            currentRound = 0;
            thinkingIndicators = {};

            const chatMessages = document.getElementById('chatMessages');

            // Add task separator if there are existing messages
            if (chatMessages.children.length > 0) {
                const sep = document.createElement('div');
                sep.className = 'task-separator';
                sep.textContent = '--- 新任务 ---';
                chatMessages.appendChild(sep);
            }

            // Remove empty state
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Create round 0 container for user message
            ensureRoundContainer(0);

            // Add user message
            addMessage('user', inputText, '用户', null, null);

            // Start SSE stream
            const url = `${API_BASE}/${currentCollab.id}/execute_sse?input=${encodeURIComponent(inputText)}`;

            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource(url);

            eventSource.onmessage = (event) => {
                if (event.data === '[DONE]') {
                    eventSource.close();
                    isRunning = false;
                    updateStatus('已完成', false);
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('taskProgress').classList.remove('visible');
                    closeCurrentRound();
                    return;
                }

                try {
                    const data = JSON.parse(event.data);
                    handleStreamEvent(data);
                } catch (e) {
                    console.error('Failed to parse SSE data:', e);
                }
            };

            eventSource.onerror = (error) => {
                console.error('SSE error:', error);
                eventSource.close();
                isRunning = false;
                updateStatus('发生错误', true);
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('taskProgress').classList.remove('visible');
                closeCurrentRound('failed');
                addMessage('error', '连接错误，请重试。', '系统', null, null);
            };
        }

        // =================== Handle SSE Events ===================
        function handleStreamEvent(data) {
            const chatMessages = document.getElementById('chatMessages');

            switch (data.type) {
                case 'task_start':
                    currentMode = data.mode;
                    updateStatus(`任务开始: ${data.mode}`, false, true);
                    resetTopology();
                    break;

                case 'round_start':
                    addMessage('system', `--- 第 ${data.round} 轮 / 共 ${data.max_rounds || '?'} 轮 ---`, '系统', null, null);
                    ensureRoundContainer(data.round, data.max_rounds);
                    updateProgress(data.round, data.max_rounds);
                    break;

                case 'agent_start': {
                    const round = data.round || 0;
                    if (currentMode === 'pipeline' && data.step) {
                        ensureRoundContainer(round, data.total_steps);
                    } else if (!currentRoundContainer || round !== currentRound) {
                        ensureRoundContainer(round);
                    }
                    updateNodeStatus(data.agent_id, 'thinking');
                    addThinkingIndicator(data.agent_id, data.agent_id, data.role, round);
                    updateTurnIndicator(data.role);
                    break;
                }

                case 'agent_message': {
                    // Ensure round container exists
                    if (data.round !== undefined && data.round !== null) {
                        if (data.round >= 900) {
                            ensureRoundContainer(data.round);
                        } else {
                            ensureRoundContainer(data.round);
                        }
                    }
                    removeThinkingIndicator(data.agent_id);
                    updateNodeStatus(data.agent_id, 'done');
                    addMessage('agent', data.content, data.agent_id, data.round, data.role);
                    break;
                }

                case 'agent_done':
                    updateNodeStatus(data.agent_id, 'done');
                    removeThinkingIndicator(data.agent_id);
                    break;

                case 'round_end': {
                    let result = null;
                    if (data.game_over) {
                        result = 'completed';
                        const winnerText = data.winner ? `${data.winner} 获胜！` : '';
                        addMessage('system', `第 ${data.round} 轮结束。&#127942; ${winnerText}${data.round_result || ''}`, '系统', data.round, null);
                    } else if (data.passed !== undefined) {
                        result = data.passed ? 'passed' : 'failed';
                        addMessage('system', `第 ${data.round} 轮结束。${data.passed ? '&#9989; 通过' : '&#10060; 未通过'}`, '系统', data.round, null);
                    }
                    closeCurrentRound(result);
                    break;
                }

                case 'game_start':
                    const strategyLabel = data.turn_strategy === 'turn_based' ? '轮流行动' : '同时行动';
                    const refereeLabel = data.referee_enabled ? '，裁判: 开启' : '';
                    addMessage('system', `游戏开始，参与者: ${data.participants.join(', ')}，策略: ${strategyLabel}${refereeLabel}`, '系统', null, null);
                    // Show shared state section if hidden
                    const section = document.getElementById('sharedStateSection');
                    if (section) section.style.display = '';
                    break;

                case 'shared_state_update':
                    updateSharedState(data.shared_state);
                    break;

                case 'termination':
                    addMessage('system', `终止条件触发: ${data.message}`, '系统', data.round, null);
                    break;

                case 'task_complete':
                    addMessage('system', `任务执行成功！`, '系统', null, null);
                    closeCurrentRound('passed');
                    // Mark all nodes as done
                    Object.keys(topologyState).forEach(id => {
                        updateNodeStatus(id, 'done');
                    });
                    if (data.output) {
                        ensureRoundContainer(999);
                        addMessage('agent', data.output, '最终输出', null, 'summary');
                    }
                    break;

                case 'task_failed':
                    addMessage('error', `任务失败: ${data.error}`, '错误', null, null);
                    closeCurrentRound('failed');
                    Object.keys(topologyState).forEach(id => {
                        updateNodeStatus(id, 'error');
                    });
                    break;

                case 'error':
                    addMessage('error', `错误: ${data.message}`, '错误', null, null);
                    break;
            }

            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // =================== Add Message ===================
        function addMessage(type, content, sender, round, role) {
            const chatMessages = document.getElementById('chatMessages');

            // Remove empty state if present
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            // Agent color
            if (type === 'agent' && sender) {
                const color = getAgentColor(sender);
                msgDiv.style.setProperty('--agent-color', color);
            }

            let headerHtml = '';
            if (type === 'agent') {
                const roleClass = role || 'default';
                const color = sender ? getAgentColor(sender) : '#e0e0e0';
                let roundLabel = '';
                if (round !== null && round !== undefined) {
                    if (round >= 900) {
                        roundLabel = '<span class="round-badge">汇总</span>';
                    } else if (round > 0) {
                        roundLabel = `<span class="round-badge">第 ${round} 轮</span>`;
                    }
                }
                headerHtml = `
                    <div class="message-header">
                        <span style="color: ${color}; font-weight: 600;">${escapeHtml(sender)}</span>
                        <span class="agent-role ${roleClass}">${escapeHtml(role || '')}</span>
                        ${roundLabel}
                    </div>
                `;
            } else if (type === 'error') {
                headerHtml = `
                    <div class="message-header">
                        <span style="color: #ff6666;">${escapeHtml(sender)}</span>
                    </div>
                `;
            } else if (type === 'system') {
                headerHtml = `
                    <div class="message-header">
                        <span style="color: #6080a0; font-size: 11px;">${escapeHtml(sender)}</span>
                    </div>
                `;
            }

            const isLong = content && content.length > 300;
            const collapsibleClass = isLong ? 'collapsible' : '';

            // Determine the background for the gradient overlay
            let msgBg = '#1a2a3a';
            if (type === 'user') msgBg = '#1a3a5a';
            else if (type === 'system') msgBg = '#2a2a2a';
            else if (type === 'error') msgBg = '#3a1a1a';

            msgDiv.innerHTML = `
                ${headerHtml}
                <div class="message-content ${collapsibleClass}" style="--msg-bg: ${msgBg};" onclick="toggleContent(this)">
                    ${escapeHtml(content)}
                </div>
            `;

            // Append to current round container or directly to chat
            if (currentRoundContainer) {
                currentRoundContainer.appendChild(msgDiv);
            } else {
                chatMessages.appendChild(msgDiv);
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // =================== Toggle Content ===================
        function toggleContent(el) {
            if (el.classList.contains('collapsible')) {
                el.classList.toggle('expanded');
            }
        }

        // =================== Toggle Panel ===================
        function togglePanel(panel) {
            if (panel === 'topology') {
                const topologyPanel = document.getElementById('topologyPanel');
                const topologyContent = document.getElementById('topologyContent');
                const icon = document.getElementById('topologyCollapseIcon');
                topologyPanel.classList.toggle('collapsed');
                topologyContent.classList.toggle('collapsed');
                icon.classList.toggle('collapsed');
            } else if (panel === 'chat') {
                const chatMessages = document.getElementById('chatMessages');
                const icon = document.getElementById('chatCollapseIcon');
                chatMessages.classList.toggle('collapsed');
                icon.classList.toggle('collapsed');
            } else if (panel === 'config') {
                const configPanel = document.getElementById('configPanel');
                const configContent = document.getElementById('configContent');
                const icon = document.getElementById('configCollapseIcon');
                configPanel.classList.toggle('collapsed');
                configContent.classList.toggle('collapsed');
                icon.classList.toggle('collapsed');
            }
        }

        // =================== Update Status ===================
        function updateStatus(text, isError, isActive) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            statusText.textContent = text;
            statusDot.className = 'status-dot';
            if (isError) {
                statusDot.classList.add('error');
            } else if (isActive) {
                statusDot.classList.add('active');
            }
        }

        // =================== Update Progress ===================
        function updateProgress(current, max) {
            if (!max) return;
            const fill = document.getElementById('progressBarFill');
            const text = document.getElementById('progressText');
            const pct = Math.min((current / max) * 100, 100);
            fill.style.width = pct + '%';
            text.textContent = `第 ${current} 轮 / 共 ${max} 轮`;
        }

        // =================== Keyboard ===================

        // =================== Keyboard ===================
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                executeTask();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCollabSelector();
            }
        });

        // Warn before leaving with unsaved changes
        window.addEventListener('beforeunload', (e) => {
            if (editHasChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // =================== Utility ===================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
