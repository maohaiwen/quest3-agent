<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多智能体协作 - Quest3 Agent</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <script src="/static/core/Auth.js"></script>
    <script src="/static/shared/nav.js"></script>
    <script src="/static/shared/modal.js"></script>
    <script src="/static/shared/toast.js"></script>
    <style>
        /* ========== List View ========== */
        .page-header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: var(--space-5); flex-wrap: wrap; gap: var(--space-3);
        }
        .page-header-bar h2 { font-size: var(--text-2xl); font-weight: 700; color: var(--text-primary); }
        .collab-card { cursor: pointer; }
        .collab-mode-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
        }
        .collab-mode-badge.supervisor { background: rgba(102,126,234,0.15); color: var(--primary); }
        .collab-mode-badge.pipeline { background: rgba(63,81,181,0.15); color: #303f9f; }
        .collab-mode-badge.voting { background: rgba(255,152,0,0.15); color: #e65100; }
        .collab-mode-badge.adversarial_game { background: rgba(0,150,136,0.15); color: #00695c; }
        .collab-desc { font-size: 13px; color: var(--text-secondary); margin: var(--space-2) 0; }
        .collab-meta { display: flex; gap: var(--space-4); font-size: 12px; color: var(--text-muted); }
        .collab-actions { display: flex; gap: 8px; margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px solid var(--border-light); }

        /* ========== Detail View ========== */
        .detail-container {
            display: flex; flex-direction: column; flex: 1; min-height: 0;
        }
        .detail-header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; background: var(--bg-container);
        }
        .detail-back {
            display: flex; align-items: center; gap: 4px;
            color: var(--text-secondary); cursor: pointer;
            font-size: 14px; padding: 4px 8px; border-radius: 6px;
            transition: background 0.15s;
        }
        .detail-back:hover { background: var(--bg-hover); color: var(--text-primary); }
        .detail-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
        .detail-body {
            display: flex; flex: 1; overflow: hidden; min-height: 0;
        }

        /* Sidebar - task list */
        .detail-sidebar {
            width: 260px; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; flex-shrink: 0;
            background: var(--bg-sidebar);
        }
        .sidebar-header {
            padding: 10px 12px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-header span { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .task-list { flex: 1; overflow-y: auto; padding: 6px; }
        .task-list-item {
            padding: 8px 10px; border-radius: 8px; cursor: pointer;
            margin-bottom: 4px; transition: background 0.15s;
            border: 1px solid transparent;
        }
        .task-list-item:hover { background: var(--bg-hover); }
        .task-list-item.active { background: var(--primary-light); border-color: var(--primary); }
        .task-list-input {
            font-size: 12px; color: var(--text-primary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .task-list-meta {
            display: flex; align-items: center; gap: 6px; margin-top: 4px;
        }
        .task-list-time { font-size: 10px; color: var(--text-muted); }
        .task-delete-btn {
            font-size: 10px; color: var(--text-muted); cursor: pointer;
            padding: 2px 4px; border-radius: 4px; line-height: 1;
            opacity: 0; transition: opacity 0.15s, color 0.15s;
        }
        .task-list-item:hover .task-delete-btn { opacity: 1; }
        .task-delete-btn:hover { color: var(--error-color); background: var(--error-bg); }
        .status-badge {
            font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600;
        }
        .status-badge.completed { background: var(--success-light); color: var(--success-color); }
        .status-badge.failed { background: var(--error-bg); color: var(--error-color); }
        .status-badge.running { background: var(--info-bg); color: var(--info-color); }
        .status-badge.canceled { background: #f3f4f6; color: #9ca3af; }
        .status-badge.interrupted { background: #fef3c7; color: #b45309; }
        .status-badge.pending { background: #fef3c7; color: #d97706; }
        .status-spinner {
            display: inline-block; width: 10px; height: 10px; border: 2px solid var(--info-bg);
            border-top-color: var(--info-color); border-radius: 50%;
            animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 2px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Main area */
        .detail-main {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .main-messages {
            flex: 1; overflow-y: auto; padding: 16px;
        }

        /* Welcome state */
        .welcome-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; gap: 16px; color: var(--text-muted);
        }
        .welcome-state .icon { font-size: 48px; }
        .welcome-state p { font-size: 14px; }

        /* Round containers */
        .round-container { margin-bottom: 12px; }
        .round-header {
            display: flex; align-items: center; gap: 6px; padding: 6px 0;
            cursor: pointer; font-size: 12px; color: var(--text-secondary);
            font-weight: 600; border-bottom: 1px solid var(--border-light);
        }
        .round-status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
            margin-left: auto;
        }
        .round-status-dot.active { background: var(--accent-running, #00d4ff); animation: pulse 1.5s infinite; }
        .round-status-dot.done { background: var(--success); }
        .round-messages { padding: 4px 0; }
        .round-messages.collapsed-round { display: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Messages */
        .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; line-height: 1.6; }
        .msg.user { background: rgba(102,126,234,0.1); }
        .msg.agent { background: var(--bg-sidebar); border-left: 3px solid var(--primary); }
        .msg.system { background: var(--info-bg); color: var(--info-color); font-size: 12px; }
        .msg.error { background: var(--error-bg); color: var(--error-color); }
        .msg-header { font-weight: 600; font-size: 11px; margin-bottom: 4px; }
        .msg-body { white-space: pre-wrap; word-break: break-word; }
        .msg-body.collapsible { max-height: 150px; overflow: hidden; position: relative; cursor: pointer; }
        .msg-body.collapsible::after {
            content: '点击展开'; position: absolute; bottom: 0; left: 0; right: 0;
            text-align: center; padding: 24px 0 4px;
            background: linear-gradient(transparent, var(--bg-sidebar));
            font-size: 10px; color: var(--text-muted);
        }
        .msg-body.collapsible.expanded { max-height: none; overflow: visible; }
        .msg-body.collapsible.expanded::after { display: none; }
        .agent-role { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
        .agent-role.supervisor { background: rgba(102,126,234,0.15); color: var(--primary); }
        .agent-role.child { background: rgba(76,175,80,0.15); color: #2e7d32; }
        .agent-role.worker { background: rgba(63,81,181,0.15); color: #303f9f; }
        .agent-role.voter { background: rgba(255,152,0,0.15); color: #e65100; }
        .agent-role.aggregator { background: rgba(156,39,176,0.15); color: #7b1fa2; }
        .agent-role.referee { background: rgba(255,152,0,0.15); color: #e65100; }
        .agent-role.participant { background: rgba(0,150,136,0.15); color: #00695c; }
        .agent-role.summary { background: rgba(33,150,243,0.15); color: #1565c0; }

        /* Thinking indicator */
        .thinking-indicator { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 12px; }
        .thinking-dots span {
            width: 6px; height: 6px; border-radius: 50%; background: var(--primary);
            display: inline-block; animation: thinking-bounce 1.4s infinite ease-in-out both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes thinking-bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

        /* Agent progress panel */
        .agent-progress {
            border: 1px solid var(--border-color); border-radius: 10px;
            margin-bottom: 8px; background: var(--bg-sidebar); overflow: hidden;
        }
        .agent-progress-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; cursor: pointer; font-size: 12px;
            border-bottom: 1px solid transparent; transition: border-color 0.15s;
        }
        .agent-progress-header:hover { background: var(--bg-hover); }
        .agent-progress.open .agent-progress-header { border-bottom-color: var(--border-color); }
        .agent-progress-name { font-weight: 600; color: var(--text-primary); }
        .agent-progress-role { font-size: 10px; padding: 1px 6px; border-radius: 4px; }
        .agent-progress-status {
            margin-left: auto; display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-muted);
        }
        .agent-progress-status .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
        }
        .agent-progress-status .status-dot.thinking { background: var(--primary); animation: pulse 1.5s infinite; }
        .agent-progress-status .status-dot.acting { background: #f59e0b; animation: pulse 1.5s infinite; }
        .agent-progress-status .status-dot.done { background: var(--success); }
        .agent-progress-status .status-dot.error { background: var(--error); }
        .agent-progress-timeline {
            padding: 8px 12px; max-height: 400px; overflow-y: auto;
            display: none; font-size: 12px;
        }
        .agent-progress.open .agent-progress-timeline { display: block; }
        .progress-step {
            display: flex; gap: 8px; padding: 4px 0;
            border-left: 2px solid var(--border-light); margin-left: 6px; padding-left: 12px;
        }
        .progress-step.thinking-step { border-left-color: var(--primary); }
        .progress-step.action-step { border-left-color: #f59e0b; }
        .progress-step.observation-step { border-left-color: #27ae60; }
        .progress-step.content-step { border-left-color: var(--success); }
        .progress-step.error-step { border-left-color: var(--error); }
        .progress-step-icon {
            width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; margin-top: 1px;
        }
        .progress-step.thinking-step .progress-step-icon { background: rgba(102,126,234,0.15); color: var(--primary); }
        .progress-step.action-step .progress-step-icon { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .progress-step.observation-step .progress-step-icon { background: rgba(39,174,96,0.15); color: #27ae60; }
        .progress-step.content-step .progress-step-icon { background: rgba(39,174,96,0.15); color: var(--success); }
        .progress-step.error-step .progress-step-icon { background: var(--error-bg); color: var(--error); }
        .progress-step-body { flex: 1; min-width: 0; }
        .progress-step-label { font-weight: 600; color: var(--text-secondary); font-size: 11px; margin-bottom: 2px; }
        .progress-step-content {
            color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;
            max-height: 80px; overflow: hidden; position: relative;
            font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; line-height: 1.4;
        }
        .progress-step-content.expandable { cursor: pointer; }
        .progress-step-content.expandable.expanded { max-height: none; }
        .progress-thinking {
            color: var(--text-muted); font-style: italic; font-size: 11px;
            max-height: 60px; overflow: hidden; position: relative;
        }
        .progress-thinking.expanded { max-height: none; }
        .progress-step-count { font-size: 10px; color: var(--text-muted); }

        /* Artifacts */
        .artifacts-section { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .artifacts-section h4 { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px 0; }
        .artifact-card {
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 10px 12px; margin-bottom: 8px; background: var(--bg-container);
        }
        .artifact-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .artifact-type-tag {
            font-size: 10px; padding: 1px 6px; border-radius: 4px;
            font-weight: 600; text-transform: uppercase;
        }
        .artifact-type-tag.code { background: #ede9fe; color: #6d28d9; }
        .artifact-type-tag.data { background: #dbeafe; color: #1d4ed8; }
        .artifact-type-tag.text { background: #f1f5f9; color: #475569; }
        .artifact-type-tag.chart { background: #fef3c7; color: #92400e; }
        .artifact-type-tag.file { background: #dcfce7; color: #166534; }
        .artifact-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
        .artifact-producer { font-size: 10px; color: var(--text-muted); margin-left: auto; }
        .artifact-content {
            font-size: 12px; color: var(--text-secondary); background: var(--bg-page);
            border-radius: 6px; padding: 8px; white-space: pre-wrap; word-break: break-word;
            max-height: 200px; overflow-y: auto;
            font-family: 'SFMono-Regular', Consolas, monospace; line-height: 1.4;
        }

        /* Input bar */
        .detail-input {
            padding: 12px 16px; border-top: 1px solid var(--border-color);
            display: flex; gap: 8px; align-items: flex-end;
            background: var(--bg-container); flex-shrink: 0;
        }
        .detail-input textarea {
            flex: 1; border: 1px solid var(--border-color); border-radius: 10px;
            padding: 8px 12px; font-size: 14px; resize: none;
            max-height: 120px; min-height: 36px; outline: none;
            font-family: inherit;
        }
        .detail-input textarea:focus { border-color: var(--primary); box-shadow: var(--shadow-focus); }
        .detail-input .send-btn {
            width: 40px; height: 40px; border-radius: 10px; border: none;
            background: var(--gradient); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0; transition: opacity 0.15s;
        }
        .detail-input .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .detail-input .stop-btn {
            width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--error);
            background: transparent; color: var(--error); cursor: pointer;
            display: none; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .detail-input .stop-btn.visible { display: flex; }

        /* Modal for create/edit */
        .modal-select { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; }
        .modal-input { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; }
        .role-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
        .role-row select, .role-row input { padding: 6px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 12px; }
        .mode-param-group { margin-bottom: 10px; }
        .mode-param-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .mode-param-group select,
        .mode-param-group input,
        .mode-param-group textarea { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; font-family: inherit; }
        .mode-param-group textarea { min-height: 60px; resize: vertical; }
        .config-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
        .config-section-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .config-section-title::before { content: '▸'; font-size: 10px; transition: transform 0.15s; }
        .config-section-title.open::before { transform: rotate(90deg); }
        .config-section-body { display: none; }
        .config-section-body.open { display: block; }
        .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border-color); border-radius: 20px; transition: 0.2s; }
        .toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        .toggle-switch input:checked + .toggle-slider { background: var(--primary); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
        .toggle-label { font-size: 12px; color: var(--text-secondary); }

        /* ======== Chess Board ======== */
        .sandbox-display {
            flex-shrink: 0; max-height: 50vh; overflow-y: auto;
            padding: 8px; background: var(--bg-container);
            border-bottom: 1px solid var(--border-color);
        }
        /* ========== Human Input Panel ========== */
        .human-input-panel {
            flex-shrink: 0; padding: 16px 20px;
            background: linear-gradient(135deg, rgba(102,126,234,0.06), rgba(102,126,234,0.02));
            border-bottom: 1px solid var(--border-color);
            animation: humanPanelIn 0.3s ease;
        }
        @keyframes humanPanelIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .human-input-header {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        }
        .human-input-icon { font-size: 20px; }
        .human-input-title { font-weight: 700; color: var(--primary); font-size: 15px; }
        .human-input-role {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            background: rgba(102,126,234,0.12); color: var(--primary); font-weight: 600;
        }
        .human-input-pulse {
            width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
            margin-left: auto;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        .human-input-error {
            color: #d32f2f; font-size: 13px; padding: 8px 12px;
            background: rgba(211,47,47,0.08); border-radius: 8px; margin-bottom: 10px;
            border-left: 3px solid #d32f2f;
        }
        .human-input-row {
            display: flex; gap: 10px; align-items: center;
        }
        .human-move-input {
            flex: 1; padding: 10px 14px; border: 1.5px solid var(--border-dark);
            border-radius: 10px; font-size: 15px; outline: none;
            background: var(--bg-base); color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .human-move-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .human-move-input::placeholder { color: var(--text-muted); }
        .human-submit-btn {
            padding: 10px 24px; background: var(--primary); color: #fff;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .human-submit-btn:hover { background: #4a5fc1; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(102,126,234,0.3); }
        .human-submit-btn:active { transform: translateY(0); }
        .human-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body class="gradient-bg">
    <div class="page-container">
        <div id="pageNav"></div>
        <div class="page-body" style="position:relative;">

        <!-- ===== List View ===== -->
        <div id="listView">
            <div class="page-header-bar">
                <h2>多智能体协作</h2>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新建协作
                </button>
            </div>
            <div id="collabGrid" class="agent-grid"></div>
        </div>

        <!-- ===== Detail View ===== -->
        <div id="detailView" style="display:none; flex:1; min-height:0; overflow:hidden;">
            <div class="detail-container">
                <div class="detail-header">
                    <div class="detail-back" onclick="location.hash='#list'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        返回
                    </div>
                    <span class="detail-title" id="detailTitle">协作</span>
                    <span class="collab-mode-badge" id="detailModeBadge"></span>
                    <div style="margin-left:auto; display:flex; gap:8px;">
                        <button class="btn" onclick="openEditModal()" style="font-size:12px;">编辑</button>
                        <button class="btn" style="font-size:12px; color:var(--error-color);" onclick="deleteCollab()">删除</button>
                    </div>
                </div>
                <div class="detail-body">
                    <div class="detail-sidebar">
                        <div class="sidebar-header">
                            <span>执行记录</span>
                        </div>
                        <div class="task-list" id="taskList"></div>
                    </div>
                    <div class="detail-main">
                        <div id="sandboxDisplay" class="sandbox-display" style="display:none;"></div>
                        <div id="humanInputPanel" class="human-input-panel" style="display:none;">
                            <div class="human-input-header">
                                <span class="human-input-icon">&#9995;</span>
                                <span class="human-input-title">等待你操作</span>
                                <span id="humanInputRole" class="human-input-role"></span>
                                <span class="human-input-pulse"></span>
                            </div>
                            <div id="humanInputError" class="human-input-error" style="display:none;"></div>
                            <div class="human-input-row">
                                <input type="text" id="humanMoveInput" class="human-move-input"
                                    placeholder="输入走法，如 炮二平五"
                                    onkeydown="if(event.key==='Enter')submitHumanInput()">
                                <button class="human-submit-btn" onclick="submitHumanInput()">发送</button>
                            </div>
                        </div>
                        <div class="main-messages" id="mainMessages">
                            <div class="welcome-state">
                                <div class="icon">&#128640;</div>
                                <p>输入任务描述，开始协作</p>
                            </div>
                        </div>
                        <div class="detail-input">
                            <textarea id="inputText" placeholder="输入协作任务..." rows="1"
                                onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                            <button class="send-btn" id="sendBtn" onclick="executeTask()">&#9654;</button>
                            <button class="stop-btn" id="stopBtn" onclick="stopExecution()">&#9632;</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="collabModal" class="modal">
        <div class="modal-content" style="max-width:640px;">
            <div class="modal-header">
                <h2 id="modalTitle">新建协作</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
    if (!Auth.requireAuth()) { throw new Error('Not authenticated'); }
    const API_BASE = '/api/collaborations';
    const MODE_NAMES = { supervisor:'监督者模式', pipeline:'流水线模式', voting:'投票集成模式', adversarial_game:'博弈模式' };
    const MODE_ICONS = { supervisor:'&#128101;', pipeline:'&#128736;', voting:'&#127913;', adversarial_game:'&#9876;' };
    const MODE_ROLES = {
        supervisor: {roles: ['supervisor','child'], labels: {'supervisor':'监督者','child':'子Agent'}, addRole: 'child'},
        pipeline: {roles: ['worker'], labels: {'worker':'步骤'}, addRole: 'worker'},
        voting: {roles: ['voter','aggregator'], labels: {'voter':'投票者','aggregator':'聚合器'}, addRole: 'voter'},
        adversarial_game: {roles: ['participant','referee'], labels: {'participant':'参与者','referee':'裁判'}, addRole: 'participant'},
    };
    const AGENT_COLORS = ['#667eea','#e67e22','#27ae60','#e74c3c','#9b59b6','#1abc9c','#f39c12','#3498db'];

    let collabList = [];
    let agentsCache = [];
    let currentCollab = null;
    let currentTasks = [];
    let selectedTaskId = null;
    let agentColorMap = {};
    let isRunning = false;
    let eventSource = null;
    let currentRoundContainer = null;
    let currentRound = 0;
    let currentMode = '';
    let currentSandbox = '';
    let thinkingIndicators = {};
    let agentProgressPanels = {};  // panelKey -> DOM element for the progress panel
    function _panelKey(agentId, role) { return agentId + '_' + (role || ''); }
    function _getPanel(agentId, role) { return agentProgressPanels[_panelKey(agentId, role)]; }
    function _setPanel(agentId, role, panel) { agentProgressPanels[_panelKey(agentId, role)] = panel; }
    function _getState(agentId, role) { return agentProgressState[_panelKey(agentId, role)]; }
    function _setState(agentId, role, state) { agentProgressState[_panelKey(agentId, role)] = state; }
    let agentProgressState = {};   // agent_id -> {stepCount, status, thinkingContent, content}

    // =================== Init ===================
    window.addEventListener('load', async () => {
        SharedNav.render(document.getElementById('pageNav'), { active: 'playground' });
        await loadAgentsCache();
        handleRoute();
    });
    window.addEventListener('hashchange', handleRoute);

    function handleRoute() {
        const hash = location.hash || '#list';
        if (hash.startsWith('#detail/')) {
            const collabId = hash.replace('#detail/', '');
            showDetailView(collabId);
        } else {
            showListView();
        }
    }

    async function showListView() {
        // Clean up polling timer when leaving detail view
        if (taskPollTimer) { clearInterval(taskPollTimer); taskPollTimer = null; }
        document.getElementById('listView').style.display = '';
        document.getElementById('detailView').style.display = 'none';
        // Restore styles - let CSS defaults take over
        document.querySelector('.page-body').style.cssText = '';
        document.querySelector('.page-container').style.cssText = '';
        // Hide sandbox display
        const sandboxEl = document.getElementById('sandboxDisplay');
        if (sandboxEl) { sandboxEl.style.display = 'none'; sandboxEl.innerHTML = ''; }
        if (!agentsCache.length) await loadAgentsCache();
        loadCollabList();
    }

    function showDetailView(collabId) {
        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').style.display = 'flex';
        // Detail view: page-container fills viewport, internal flex layout for scrolling
        document.querySelector('.page-container').style.cssText = 'overflow:hidden;height:calc(100vh - 40px);';
        document.querySelector('.page-body').style.cssText = 'display:flex;flex-direction:column;overflow:hidden;padding:0;flex:1;min-height:0;';
        loadCollabDetail(collabId);
    }

    // =================== Agents Cache ===================
    async function loadAgentsCache() {
        try {
            const resp = await fetch('/api/agents');
            const data = await resp.json();
            agentsCache = data.agents || [];
        } catch(e) { console.error(e); }
    }

    function getAgentName(id) {
        if (id === 'human') return '人类';
        const a = agentsCache.find(a => a.id === id);
        return a ? a.name : id;
    }
    function getAgentColor(id) {
        if (!agentColorMap[id]) {
            const idx = Object.keys(agentColorMap).length;
            agentColorMap[id] = AGENT_COLORS[idx % AGENT_COLORS.length];
        }
        return agentColorMap[id];
    }
    function escapeHtml(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    // =================== List View ===================
    async function loadCollabList() {
        try {
            const resp = await fetch(API_BASE);
            const data = await resp.json();
            collabList = data.collaborations || [];
            renderCollabGrid();
        } catch(e) {
            console.error(e);
            document.getElementById('collabGrid').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
        }
    }

    function renderCollabGrid() {
        const grid = document.getElementById('collabGrid');
        if (!collabList.length) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">&#128101;</div><h3>暂无协作配置</h3><p>点击"新建协作"创建多智能体协作</p></div>';
            return;
        }
        grid.innerHTML = collabList.map(c => {
            const modeName = MODE_NAMES[c.mode] || c.mode;
            const modeIcon = MODE_ICONS[c.mode] || '&#9881;';
            const agents = (c.agents || []).map(a => getAgentName(a.agent_id)).filter(Boolean);
            return `
            <div class="agent-card collab-card" onclick="location.hash='#detail/${c.id}'">
                <div class="agent-header">
                    <div>
                        <div class="agent-name">${escapeHtml(c.name)}</div>
                        <div style="margin-top:6px; display:flex; gap:4px; flex-wrap:wrap;">
                            <span class="collab-mode-badge ${c.mode}">${modeIcon} ${modeName}</span>
                            ${c.enabled ? '' : '<span class="agent-status">✗ 已禁用</span>'}
                        </div>
                    </div>
                </div>
                <div class="agent-description">${escapeHtml(c.description || '')}</div>
                <div class="agent-tags-row">
                    ${agents.length ? agents.slice(0,4).map(n=>`<span class="skill-tag">${escapeHtml(n)}</span>`).join('') + (agents.length>4?`<span class="skill-tag">+${agents.length-4}</span>`:'') : ''}
                </div>
                <div class="agent-info">
                    <span>执行 ${c.usage_count||0} 次</span>
                    <span class="info-sep"></span>
                    <span>${formatDate(c.created_at)}</span>
                </div>
                <div class="agent-actions">
                    <button type="button" class="primary" onclick="event.stopPropagation();location.hash='#detail/${c.id}'">进入</button>
                    <button type="button" onclick="event.stopPropagation();editCollab('${c.id}')">编辑</button>
                    <button type="button" class="danger" onclick="event.stopPropagation();deleteCollab('${c.id}')">删除</button>
                </div>
            </div>`;
        }).join('');
    }

    function formatDate(d) {
        if (!d) return '';
        try { return new Date(d).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}); } catch(e) { return d; }
    }

    // =================== Detail View ===================
    async function loadCollabDetail(collabId) {
        try {
            const resp = await fetch(`${API_BASE}/${collabId}`);
            if (!resp.ok) throw new Error('Not found');
            currentCollab = await resp.json();
            agentColorMap = {};
            // Update header
            document.getElementById('detailTitle').textContent = currentCollab.name;
            const badge = document.getElementById('detailModeBadge');
            badge.className = `collab-mode-badge ${currentCollab.mode}`;
            badge.innerHTML = `${MODE_ICONS[currentCollab.mode]||''} ${MODE_NAMES[currentCollab.mode]||currentCollab.mode}`;
            // Reset
            document.getElementById('mainMessages').innerHTML = '<div class="welcome-state"><div class="icon">&#128640;</div><p>输入任务描述，开始协作</p></div>';
            selectedTaskId = null;
            isRunning = false;
            if (eventSource) { eventSource.close(); eventSource = null; }
            // Load tasks
            await loadTasks();
        } catch(e) {
            console.error(e);
            showToast('加载协作失败', 'error');
            location.hash = '#list';
        }
    }

    let taskPollTimer = null;

    async function loadTasks() {
        if (!currentCollab) return;
        try {
            const resp = await fetch(`${API_BASE}/${currentCollab.id}/tasks`);
            const data = await resp.json();
            currentTasks = data.tasks || [];
            renderTaskList();
            // If there are running tasks, poll for completion
            const hasRunning = currentTasks.some(t => t.status === 'running');
            if (hasRunning && !taskPollTimer && !isRunning) {
                taskPollTimer = setInterval(pollRunningTasks, 5000);
            } else if (!hasRunning && taskPollTimer) {
                clearInterval(taskPollTimer);
                taskPollTimer = null;
            }
        } catch(e) { console.error(e); }
    }

    async function pollRunningTasks() {
        if (!currentCollab) return;
        try {
            const resp = await fetch(`${API_BASE}/${currentCollab.id}/tasks`);
            const data = await resp.json();
            const newTasks = data.tasks || [];
            // Check if any running task just completed
            for (const nt of newTasks) {
                const old = currentTasks.find(t => t.task_id === nt.task_id);
                if (old && old.status === 'running' && nt.status !== 'running') {
                    addStreamMsg('system', `✅ 后台任务已完成: ${(nt.input||'').substring(0,30)}...`, '系统');
                    // If this is the currently selected task, re-render it
                    if (nt.task_id === selectedTaskId) {
                        selectTask(nt.task_id);
                    }
                }
            }
            currentTasks = newTasks;
            renderTaskList();
            // If the currently selected task is still running, refresh its events
            if (selectedTaskId) {
                const selTask = currentTasks.find(t => t.task_id === selectedTaskId);
                if (selTask && selTask.status === 'running') {
                    refreshRunningTaskEvents(selectedTaskId);
                }
            }
            // Stop polling if no more running tasks
            const hasRunning = currentTasks.some(t => t.status === 'running');
            if (!hasRunning && taskPollTimer) {
                clearInterval(taskPollTimer);
                taskPollTimer = null;
            }
        } catch(e) { console.error(e); }
    }

    let lastEventCountMap = {};
    async function refreshRunningTaskEvents(taskId) {
        try {
            const [eventsResp, artifactsResp] = await Promise.all([
                fetch(`${API_BASE}/tasks/${taskId}/events?exclude_types=agent_thinking&limit=2000`),
                fetch(`${API_BASE}/tasks/${taskId}/artifacts`)
            ]);
            const data = await eventsResp.json();
            const artData = await artifactsResp.json();
            const events = data.events || [];
            const lastCount = lastEventCountMap[taskId] || 0;
            // Only re-render if new events arrived
            if (events.length > lastCount) {
                lastEventCountMap[taskId] = events.length;
                // Re-render the full detail with latest events
                const taskResp = await fetch(`${API_BASE}/tasks/${taskId}`);
                const taskData = await taskResp.json();
                renderTaskDetail(taskData, events, artData.artifacts || []);
            }
        } catch(e) { console.error(e); }
    }

    function renderTaskList() {
        const list = document.getElementById('taskList');
        if (!currentTasks.length) {
            list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px;">暂无执行记录</div>';
            return;
        }
        list.innerHTML = currentTasks.map(t => {
            const inputShort = (t.input||'').substring(0,40) + ((t.input||'').length>40?'...':'');
            const timeStr = t.started_at ? new Date(t.started_at).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
            const isRunning = t.status === 'running';
            const statusMap = {completed:'完成', failed:'失败', running:'运行中', canceled:'已取消', pending:'等待中', interrupted:'已中断'};
            const statusLabel = statusMap[t.status] || t.status;
            const spinner = isRunning ? '<span class="status-spinner"></span>' : '';
            return `
            <div class="task-list-item ${t.task_id===selectedTaskId?'active':''}" onclick="selectTask('${t.task_id}')">
                <div style="display:flex;justify-content:space-between;align-items:start;">
                    <div class="task-list-input" style="flex:1;min-width:0;">${escapeHtml(inputShort)}</div>
                    ${!isRunning ? `<span class="task-delete-btn" onclick="event.stopPropagation();deleteTask('${t.task_id}')" title="删除">&#10005;</span>` : ''}
                </div>
                <div class="task-list-meta">
                    ${spinner}<span class="status-badge ${t.status}">${statusLabel}</span>
                    <span class="task-list-time">${timeStr}</span>
                </div>
            </div>`;
        }).join('');
    }

    async function deleteTask(taskId) {
        if (!confirm('确定删除此执行记录？')) return;
        try {
            const resp = await fetch(`${API_BASE}/tasks/${taskId}`, {method: 'DELETE'});
            if (!resp.ok) {
                const data = await resp.json();
                showToast(data.detail || '删除失败', 'error');
                return;
            }
            if (selectedTaskId === taskId) {
                selectedTaskId = null;
                document.getElementById('mainMessages').innerHTML = '<div class="welcome-state"><div class="icon">&#128640;</div><p>输入任务描述，开始协作</p></div>';
            }
            loadTasks();
            showToast('已删除', 'success');
        } catch(e) {
            showToast('删除失败', 'error');
        }
    }

    async function selectTask(taskId) {
        selectedTaskId = taskId;
        renderTaskList();
        const main = document.getElementById('mainMessages');
        main.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">加载中...</div>';

        try {
            // Load summary events (excluding agent_thinking for speed)
            const [taskResp, eventsResp, artifactsResp] = await Promise.all([
                fetch(`${API_BASE}/tasks/${taskId}`),
                fetch(`${API_BASE}/tasks/${taskId}/events?exclude_types=agent_thinking&limit=2000`),
                fetch(`${API_BASE}/tasks/${taskId}/artifacts`)
            ]);
            const taskData = await taskResp.json();
            const eventsData = await eventsResp.json();
            const artifactsData = await artifactsResp.json();
            const events = eventsData.events || [];
            const totalEvents = eventsData.total || events.length;
            lastEventCountMap[taskId] = totalEvents;
            renderTaskDetail(taskData, events, artifactsData.artifacts || []);
            // Add "load thinking" button if there are thinking events excluded
            if (totalEvents > events.length) {
                addLoadThinkingButton(taskId);
            }
            // Disconnect recovery: check if task is waiting for human input
            if (taskData.status === 'running') {
                try {
                    const pendingResp = await fetch(`${API_BASE}/tasks/${taskId}/pending-human`);
                    const pendingData = await pendingResp.json();
                    if (pendingData.waiting) {
                        showHumanInputPanel(pendingData.role || '', '');
                    }
                } catch(e) { /* ignore */ }
            }
        } catch(e) {
            main.innerHTML = `<div style="text-align:center;padding:20px;color:var(--error);">加载失败</div>`;
        }
    }

    function addLoadThinkingButton(taskId) {
        const main = document.getElementById('mainMessages');
        const btn = document.createElement('button');
        btn.className = 'load-thinking-btn';
        btn.textContent = '查看思考过程';
        btn.style.cssText = 'display:block;margin:8px auto;padding:6px 16px;border:1px solid var(--border-dark);border-radius:6px;background:rgba(255,255,255,0.06);color:var(--text-secondary);cursor:pointer;font-size:12px;';
        btn.onclick = async () => {
            btn.textContent = '加载中...';
            btn.disabled = true;
            try {
                const resp = await fetch(`${API_BASE}/tasks/${taskId}/events?types=agent_thinking&limit=5000`);
                const data = await resp.json();
                const thinkingEvents = data.events || [];
                // Replay thinking events into existing panels
                for (const evt of thinkingEvents) {
                    insertThinkingEvent(evt);
                }
                btn.remove();
            } catch(e) {
                btn.textContent = '加载失败，点击重试';
                btn.disabled = false;
            }
        };
        main.appendChild(btn);
    }

    function insertThinkingEvent(evt) {
        const panel = _getPanel(evt.agent_id, evt.role);
        if (!panel) return;
        const thinkingEl = panel.querySelector('.progress-thinking');
        if (thinkingEl && evt.content) {
            // Append thinking content (collapsed by default)
            const wrapper = document.createElement('details');
            const summary = document.createElement('summary');
            summary.textContent = `思考 (step ${evt.step || '?'})`;
            summary.style.cssText = 'cursor:pointer;font-size:11px;color:var(--text-muted);margin:2px 0;';
            const content = document.createElement('div');
            content.className = 'thinking-content';
            content.style.cssText = 'font-size:11px;color:var(--text-secondary);white-space:pre-wrap;max-height:200px;overflow-y:auto;padding:4px 0;';
            content.textContent = evt.content;
            wrapper.appendChild(summary);
            wrapper.appendChild(content);
            thinkingEl.appendChild(wrapper);
        }
    }

    function renderTaskDetail(task, events, artifacts) {
        const main = document.getElementById('mainMessages');
        // Clear pending wait timers from previous render
        for (const key of Object.keys(agentProgressState)) {
            const state = agentProgressState[key];
            if (state && state.waitTimer) { clearTimeout(state.waitTimer); }
        }
        main.innerHTML = '';
        currentRoundContainer = null;
        currentRound = 0;
        agentProgressPanels = {};
        agentProgressState = {};
        thinkingIndicators = {};
        sseEventCount = 0; // Reset so replay doesn't affect SSE state

        // User input
        if (task.input) {
            ensureRound(1);
            addStreamMsg('user', task.input, '用户');
        }

        // Replay events — same rendering as live SSE
        if (events.length) {
            for (const evt of events) {
                handleSSE(evt);
            }
        } else {
            // Fallback: no stored events — show output/messages from DB
            if (task.status === 'completed' && task.output) {
                ensureRound(1);
                addStreamMsg('agent', task.output, '最终输出', 'summary');
            } else if (task.status === 'failed') {
                addStreamMsg('error', task.output || '任务失败', '');
            } else if (task.status === 'interrupted') {
                addStreamMsg('system', '⚠️ 任务因服务重启而中断', '');
                if (task.output) addStreamMsg('agent', task.output, '部分输出', '');
            }
            // Show messages if available
            if (task.messages && task.messages.length) {
                for (const msg of task.messages) {
                    if (msg.content && msg.content !== task.output) {
                        addStreamMsg('agent', msg.content, msg.role || 'Agent', '');
                    }
                }
            }
        }

        // Show artifacts
        if (artifacts && artifacts.length) {
            const section = document.createElement('div');
            section.className = 'artifacts-section';
            section.innerHTML = '<h4>📦 产物</h4>';
            for (const a of artifacts) {
                const isLong = a.content && a.content.length > 500;
                section.innerHTML += `
                <div class="artifact-card">
                    <div class="artifact-card-header">
                        <span class="artifact-type-tag ${a.artifact_type}">${a.artifact_type}</span>
                        <span class="artifact-name">${escapeHtml(a.name)}</span>
                        ${a.producer_agent_id ? `<span class="artifact-producer">${escapeHtml(getAgentName(a.producer_agent_id))}</span>` : ''}
                    </div>
                    <div class="artifact-content${isLong ? ' expandable' : ''}" ${isLong ? 'onclick="this.classList.toggle(\'expanded\')"' : ''}>${escapeHtml(a.content || '')}</div>
                </div>`;
            }
            main.appendChild(section);
        }

        // Running task — show spinner at bottom
        if (task.status === 'running') {
            const spinner = document.createElement('div');
            spinner.style.cssText = 'text-align:center;padding:12px;color:var(--info-color);font-size:12px;';
            spinner.innerHTML = '<span class="status-spinner" style="width:14px;height:14px;border-width:2px;"></span> 任务执行中...';
            main.appendChild(spinner);
        }

        main.scrollTop = main.scrollHeight;
    }

    // =================== Execute Task (SSE) ===================
    async function executeTask() {
        if (!currentCollab) return;
        const inputText = document.getElementById('inputText').value.trim();
        if (!inputText) return;
        if (isRunning) return;

        isRunning = true;
        selectedTaskId = null;
        renderTaskList();

        const main = document.getElementById('mainMessages');
        main.innerHTML = '';
        currentRoundContainer = null;
        currentRound = 0;
        currentMode = currentCollab.mode;
        thinkingIndicators = {};
        agentProgressPanels = {};
        agentProgressState = {};
        sseEventCount = 0;

        document.getElementById('sendBtn').disabled = true;
        document.getElementById('stopBtn').classList.add('visible');

        ensureRound(1);
        addStreamMsg('user', inputText, '用户');

        document.getElementById('inputText').value = '';
        autoResize(document.getElementById('inputText'));

        const url = `${API_BASE}/${currentCollab.id}/execute_sse?input=${encodeURIComponent(inputText)}`;
        if (eventSource) eventSource.close();
        eventSource = new EventSource(url);

        eventSource.onmessage = (evt) => {
            if (evt.data === '[DONE]') {
                eventSource.close();
                finishExec();
                closeRound();
                loadTasks(); // refresh task list
                return;
            }
            try {
                const data = JSON.parse(evt.data);
                handleSSE(data);
            } catch(e) { console.error('[SSE] parse error:', e, evt.data); }
        };

        eventSource.onerror = () => {
            eventSource.close();
            isRunning = false;
            finishExec();
            // Don't show "连接错误" — the task continues in the background
            addStreamMsg('system', '⏳ 连接断开，任务将在后台继续执行，稍后可查看结果', '系统');
            closeRound();
            loadTasks();
        };
    }

    function stopExecution() {
        if (eventSource) eventSource.close();
        isRunning = false;
        finishExec();
        closeRound();
        addStreamMsg('system', '⏳ 已断开流式连接，任务将在后台继续执行', '系统');
        loadTasks();
    }

    function finishExec() {
        isRunning = false;
        hideHumanInputPanel();
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('stopBtn').classList.remove('visible');
    }

    let sseEventCount = 0;

    function handleSSE(data) {
        const main = document.getElementById('mainMessages');
        sseEventCount++;
        switch(data.type) {
            case 'ping':
                break;
            case 'task_start':
                currentMode = data.mode || currentMode;
                if (data.task_id) selectedTaskId = data.task_id;
                break;
            case 'game_start':
                // Store sandbox info for rendering
                if (data.sandbox) {
                    currentSandbox = data.sandbox;
                }
                break;
            case 'round_start':
                addStreamMsg('system', `--- 第 ${data.round} 轮 ---`, '');
                ensureRound(data.round);
                break;
            case 'agent_start': {
                const color = getAgentColor(data.agent_id);
                const name = getAgentName(data.agent_id);
                const panel = createAgentProgressPanel(data.agent_id, name, data.role, color);
                currentRoundContainer.appendChild(panel);
                const pk = _panelKey(data.agent_id, data.role);
                agentProgressPanels[pk] = panel;
                agentProgressState[pk] = { stepCount: 0, status: 'thinking', thinkingContent: '', content: '', waitTimer: null };
                // Only show "thinking..." placeholder during live SSE, not during event replay
                if (isRunning) {
                    const _capturedPanel = panel;
                    agentProgressState[pk].waitTimer = setTimeout(() => {
                        const thinkingEl = _capturedPanel.querySelector(`.progress-thinking[data-panel-key="${pk}"]`);
                        if (thinkingEl && !thinkingEl.textContent) {
                            thinkingEl.textContent = '思考中...';
                            thinkingEl.style.fontStyle = 'italic';
                        }
                    }, 15000);
                }
                break;
            }
            case 'agent_thinking': {
                const panel = _getPanel(data.agent_id, data.role);
                if (!panel) break;
                clearAgentWaitTimer(data.agent_id, data.role);
                updateAgentProgress(data.agent_id, data.role, 'thinking', data.content, data.step);
                break;
            }
            case 'agent_phase': {
                const panel2 = _getPanel(data.agent_id, data.role);
                if (!panel2) break;
                clearAgentWaitTimer(data.agent_id, data.role);
                const phase = data.phase;
                if (phase === 'thinking') {
                    updateAgentProgressStatus(data.agent_id, data.role, 'thinking', '思考中...');
                } else if (phase === 'tool-call') {
                    updateAgentProgressStatus(data.agent_id, data.role, 'acting', '调用工具...');
                } else if (phase === 'observation') {
                    updateAgentProgressStatus(data.agent_id, data.role, 'acting', '获取结果...');
                } else if (phase === 'summarizing') {
                    updateAgentProgressStatus(data.agent_id, data.role, 'thinking', '总结中...');
                }
                break;
            }
            case 'agent_action': {
                const panel3 = _getPanel(data.agent_id, data.role);
                if (!panel3) break;
                clearAgentWaitTimer(data.agent_id, data.role);
                const toolInfo = data.tool_name + (data.tool_args && Object.keys(data.tool_args).length ? `(${formatToolArgs(data.tool_args)})` : '');
                addProgressStep(data.agent_id, data.role, 'action-step', '&#9881;', `调用工具: ${data.tool_name}`, toolInfo);
                updateAgentProgressStatus(data.agent_id, data.role, 'acting', `工具: ${data.tool_name}`);
                break;
            }
            case 'agent_observation': {
                const panel4 = _getPanel(data.agent_id, data.role);
                if (!panel4) break;
                clearAgentWaitTimer(data.agent_id, data.role);
                const obsText = typeof data.result === 'string' ? data.result : JSON.stringify(data.result);
                addProgressStep(data.agent_id, data.role, 'observation-step', '&#128065;', '观察结果', obsText);
                updateAgentProgressStatus(data.agent_id, data.role, 'acting', '已获取结果');
                break;
            }
            case 'agent_content': {
                const panel5 = _getPanel(data.agent_id, data.role);
                if (!panel5) break;
                clearAgentWaitTimer(data.agent_id, data.role);
                appendAgentContent(data.agent_id, data.role, data.content);
                break;
            }
            case 'agent_error': {
                const panel6 = _getPanel(data.agent_id, data.role);
                if (!panel6) break;
                clearAgentWaitTimer(data.agent_id, data.role);
                addProgressStep(data.agent_id, data.role, 'error-step', '&#10060;', '错误', data.message || '未知错误');
                updateAgentProgressStatus(data.agent_id, data.role, 'error', '出错');
                break;
            }
            // ---- Legacy agent_message (kept for backward compat) ----
            case 'agent_message': {
                const ind = thinkingIndicators[data.agent_id];
                if (ind) { ind.remove(); delete thinkingIndicators[data.agent_id]; }
                const color = getAgentColor(data.agent_id);
                const name = getAgentName(data.agent_id);
                const roleStr = data.role ? `<span class="agent-role ${data.role}">${data.role}</span>` : '';
                const div = document.createElement('div');
                div.className = 'msg agent';
                div.style.borderLeftColor = color;
                div.innerHTML = `<div class="msg-header" style="color:${color}">${escapeHtml(name)} ${roleStr}</div><div class="msg-body">${escapeHtml(data.content)}</div>`;
                currentRoundContainer.appendChild(div);
                break;
            }
            case 'agent_done': {
                const ind2 = thinkingIndicators[data.agent_id];
                if (ind2) { ind2.remove(); delete thinkingIndicators[data.agent_id]; }
                // Finalize progress panel
                clearAgentWaitTimer(data.agent_id, data.role);
                finalizeAgentProgress(data.agent_id, data.role);
                break;
            }
            case 'round_end': {
                if (data.passed !== undefined) {
                    addStreamMsg('system', data.passed ? '✅ 通过' : '❌ 未通过', '');
                }
                closeRound(data.passed ? 'passed' : 'failed');
                break;
            }
            case 'task_complete':
                addStreamMsg('system', '✅ 任务完成', '');
                closeRound('passed');
                if (data.output) {
                    addStreamMsg('agent', data.output, '最终输出', 'summary');
                }
                break;
            case 'termination':
                addStreamMsg('system', `🏁 游戏结束${data.winner ? '：' + data.winner + ' 获胜' : ''} — ${data.message || ''}`, '');
                break;
            case 'task_failed':
                addStreamMsg('error', `任务失败: ${data.error||''}`, '');
                closeRound('failed');
                break;
            case 'error':
                addStreamMsg('error', data.message||'未知错误', '');
                break;
            case 'iteration_start':
                closeRound('passed');
                ensureRound(data.round||1);
                addStreamMsg('system', `🔄 迭代第 ${data.round}/${data.max_iterations} 轮`, '');
                break;
            case 'iteration_evaluate':
                addStreamMsg('system', data.passed ? `✅ 第${data.round}轮评估通过` : `❌ 第${data.round}轮评估未通过`, '');
                break;
            case 'iteration_complete':
                addStreamMsg('system', data.passed ? '🎉 迭代完成！' : '⚠️ 达到最大迭代轮次', '');
                break;
            case 'artifact_created':
                addStreamMsg('system', `📦 产物: ${data.name} (${data.artifact_type})`, '');
                break;
            case 'sandbox_state': {
                // Sandbox generates HTML on the backend — just insert it
                if (data.state && data.state.html) {
                    const sandboxEl = document.getElementById('sandboxDisplay');
                    if (sandboxEl) {
                        sandboxEl.innerHTML = data.state.html;
                        sandboxEl.style.display = '';
                    }
                }
                break;
            }
            case 'waiting_for_human': {
                showHumanInputPanel(data.role, data.round);
                addStreamMsg('system', `⏳ 等待${data.role}操作...`, '');
                break;
            }
            case 'human_moved': {
                addStreamMsg('system', `✅ 操作成功: ${data.result?.message || ''}`, '');
                hideHumanInputPanel();
                break;
            }
            case 'human_move_error': {
                showMoveError(data.error || '无效操作');
                break;
            }
        }
        main.scrollTop = main.scrollHeight;
    }

    // =================== Human Input ===================
    function showHumanInputPanel(role, round) {
        const panel = document.getElementById('humanInputPanel');
        const roleEl = document.getElementById('humanInputRole');
        const errorEl = document.getElementById('humanInputError');
        const inputEl = document.getElementById('humanMoveInput');
        if (panel) {
            panel.style.display = '';
            if (roleEl) roleEl.textContent = role || '';
            if (errorEl) errorEl.style.display = 'none';
            if (inputEl) {
                inputEl.value = '';
                // Adjust placeholder based on sandbox type
                if (currentSandbox === 'chinese_chess') {
                    inputEl.placeholder = '输入走法，如 炮二平五';
                } else {
                    inputEl.placeholder = '输入你的操作';
                }
                inputEl.focus();
            }
        }
    }

    function hideHumanInputPanel() {
        const panel = document.getElementById('humanInputPanel');
        if (panel) panel.style.display = 'none';
    }

    function showMoveError(errorMsg) {
        const errorEl = document.getElementById('humanInputError');
        if (errorEl) {
            errorEl.textContent = errorMsg;
            errorEl.style.display = '';
        }
        const inputEl = document.getElementById('humanMoveInput');
        if (inputEl) inputEl.focus();
    }

    async function submitHumanInput() {
        const inputEl = document.getElementById('humanMoveInput');
        const btn = document.querySelector('.human-submit-btn');
        const move = inputEl ? inputEl.value.trim() : '';
        if (!move || !selectedTaskId) return;

        btn.disabled = true;
        try {
            const resp = await fetch(`${API_BASE}/tasks/${selectedTaskId}/human-input`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'make_move', params: {move}})
            });
            const result = await resp.json();
            if (!result.success) {
                showMoveError(result.error || '操作失败');
            }
            // Success: backend will send human_moved via SSE, which hides the panel
        } catch (e) {
            showMoveError('网络错误，请重试');
        } finally {
            btn.disabled = false;
        }
    }

    // =================== Agent Progress Panel ===================
    function clearAgentWaitTimer(agentId, role) {
        const state = agentProgressState[_panelKey(agentId, role)];
        if (state && state.waitTimer) {
            clearTimeout(state.waitTimer);
            state.waitTimer = null;
        }
    }

    function createAgentProgressPanel(agentId, name, role, color) {
        const pk = _panelKey(agentId, role);
        const panel = document.createElement('div');
        panel.className = 'agent-progress open';
        panel.dataset.panelKey = pk;
        const roleStr = role ? `<span class="agent-progress-role agent-role ${role}">${role}</span>` : '';
        panel.innerHTML = `
            <div class="agent-progress-header" onclick="this.parentElement.classList.toggle('open')">
                <span style="color:${color};font-weight:700;">${escapeHtml(name)}</span>
                ${roleStr}
                <span class="progress-step-count" data-steps="0"></span>
                <span class="agent-progress-status">
                    <span class="status-dot thinking"></span>
                    <span class="status-text">思考中...</span>
                </span>
            </div>
            <div class="agent-progress-timeline" data-panel-key="${pk}">
                <div class="progress-thinking" data-panel-key="${pk}"></div>
            </div>
        `;
        return panel;
    }

    function updateAgentProgress(agentId, role, type, content, step) {
        const pk = _panelKey(agentId, role);
        const state = agentProgressState[pk];
        if (!state) return;

        if (type === 'thinking') {
            state.thinkingContent += content;
            state.status = 'thinking';
            // Use panel reference to avoid finding stale panels from previous rounds
            const panel = agentProgressPanels[pk];
            const thinkingEl = panel ? panel.querySelector(`.progress-thinking[data-panel-key="${pk}"]`) : null;
            if (thinkingEl) {
                thinkingEl.textContent = state.thinkingContent;
                thinkingEl.onclick = () => thinkingEl.classList.toggle('expanded');
                if (!thinkingEl.classList.contains('expanded')) {
                    thinkingEl.title = '点击展开思考内容';
                }
            }
            // Update status
            updateAgentProgressStatus(agentId, role, 'thinking', `思考中...`);
        }
    }

    function updateAgentProgressStatus(agentId, role, status, text) {
        const pk = _panelKey(agentId, role);
        const state = agentProgressState[pk];
        if (state) state.status = status;

        const panel = agentProgressPanels[pk];
        if (!panel) return;
        const dot = panel.querySelector('.status-dot');
        const statusText = panel.querySelector('.status-text');
        if (dot) {
            dot.className = `status-dot ${status}`;
        }
        if (statusText) {
            statusText.textContent = text;
        }
    }

    function addProgressStep(agentId, role, stepClass, icon, label, content) {
        const pk = _panelKey(agentId, role);
        const state = agentProgressState[pk];
        if (state) state.stepCount++;

        const panel = agentProgressPanels[pk];
        const timeline = panel ? panel.querySelector(`.agent-progress-timeline[data-panel-key="${pk}"]`) : null;
        if (!timeline) return;

        const stepEl = document.createElement('div');
        stepEl.className = `progress-step ${stepClass}`;
        const isLong = content && content.length > 300;
        stepEl.innerHTML = `
            <span class="progress-step-icon">${icon}</span>
            <div class="progress-step-body">
                <div class="progress-step-label">${label}</div>
                ${content ? `<div class="progress-step-content${isLong ? ' expandable' : ''}" ${isLong ? 'onclick="this.classList.toggle(\'expanded\')"' : ''}>${escapeHtml(content)}</div>` : ''}
            </div>
        `;
        timeline.appendChild(stepEl);

        // Update step count
        if (panel) {
            const countEl = panel.querySelector('.progress-step-count');
            if (countEl) countEl.textContent = `${state.stepCount}步`;
        }

        // Auto-scroll timeline
        timeline.scrollTop = timeline.scrollHeight;
    }

    function appendAgentContent(agentId, role, chunk) {
        const pk = _panelKey(agentId, role);
        const state = agentProgressState[pk];
        if (!state) return;
        state.content += chunk;

        // Find or create the content step — use panel reference to avoid stale panels
        const panel = agentProgressPanels[pk];
        const timeline = panel ? panel.querySelector(`.agent-progress-timeline[data-panel-key="${pk}"]`) : null;
        if (!timeline) return;

        let contentStep = timeline.querySelector('.progress-step.content-step');
        if (!contentStep) {
            contentStep = document.createElement('div');
            contentStep.className = 'progress-step content-step';
            contentStep.innerHTML = `
                <span class="progress-step-icon">&#9998;</span>
                <div class="progress-step-body">
                    <div class="progress-step-label">输出</div>
                    <div class="progress-step-content expanded"></div>
                </div>
            `;
            timeline.appendChild(contentStep);
        }
        const contentEl = contentStep.querySelector('.progress-step-content');
        if (contentEl) {
            contentEl.textContent = state.content;
            // Auto-scroll
            timeline.scrollTop = timeline.scrollHeight;
        }
        updateAgentProgressStatus(agentId, role, 'acting', '输出中...');
    }

    function finalizeAgentProgress(agentId, role) {
        const pk = _panelKey(agentId, role);
        const state = agentProgressState[pk];
        if (!state) return;

        updateAgentProgressStatus(agentId, role, 'done', '完成');

        const panel = agentProgressPanels[pk];
        if (panel) {
            // Auto-collapse the progress panel when done
            panel.classList.remove('open');

            // Show final content as a summary msg below the panel
            if (state.content) {
                const color = getAgentColor(agentId);
                const name = getAgentName(agentId);
                const div = document.createElement('div');
                div.className = 'msg agent';
                div.style.borderLeftColor = color;
                const isLong = state.content.length > 500;
                div.innerHTML = `<div class="msg-header" style="color:${color}">${escapeHtml(name)}</div><div class="msg-body${isLong ? ' collapsible' : ''}" ${isLong ? 'onclick="this.classList.toggle(\'expanded\')"' : ''}>${escapeHtml(state.content)}</div>`;
                panel.after(div);
            }
        }

        // Cleanup
        delete agentProgressPanels[pk];
        delete agentProgressState[pk];
    }

    function formatToolArgs(args) {
        if (!args || typeof args !== 'object') return '';
        const keys = Object.keys(args);
        if (keys.length === 0) return '';
        if (keys.length <= 2) {
            return keys.map(k => {
                const v = typeof args[k] === 'string' ? args[k] : JSON.stringify(args[k]);
                return `${k}=${v.length > 20 ? v.substring(0, 20) + '...' : v}`;
            }).join(', ');
        }
        return `${keys.length}个参数`;
    }

    function addStreamMsg(type, content, sender, role) {
        const main = document.getElementById('mainMessages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'agent' && role === 'summary') {
            div.style.borderLeftColor = 'var(--success)';
        }
        let headerHtml = '';
        if (sender && type !== 'system' && type !== 'error') {
            const color = type === 'agent' ? (role === 'summary' ? 'var(--success)' : 'var(--primary)') : '';
            headerHtml = `<div class="msg-header" style="color:${color}">${escapeHtml(sender)}${role ? `<span class="agent-role ${role}">${role}</span>` : ''}</div>`;
        }
        div.innerHTML = `${headerHtml}<div class="msg-body">${escapeHtml(content)}</div>`;
        if (currentRoundContainer) {
            currentRoundContainer.appendChild(div);
        } else {
            main.appendChild(div);
        }
        main.scrollTop = main.scrollHeight;
    }

    // =================== Round Containers ===================
    function ensureRound(round) {
        const main = document.getElementById('mainMessages');
        const existing = main.querySelector(`.round-container[data-round="${round}"]`);
        if (existing) {
            currentRoundContainer = existing.querySelector('.round-messages');
            return;
        }
        // Close previous
        if (currentRoundContainer) {
            const prevContainer = currentRoundContainer.closest('.round-container');
            if (prevContainer) {
                prevContainer.classList.remove('active');
                const dot = prevContainer.querySelector('.round-status-dot');
                if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }
            }
        }
        let label = round >= 900 ? '汇总' : `第 ${round} 轮`;
        const container = document.createElement('div');
        container.className = 'round-container active';
        container.dataset.round = round;
        container.innerHTML = `<div class="round-header" onclick="this.nextElementSibling.classList.toggle('collapsed-round')"><span>${label}</span><span class="round-status-dot active"></span></div><div class="round-messages"></div>`;
        main.appendChild(container);
        currentRoundContainer = container.querySelector('.round-messages');
        currentRound = round;
    }

    function closeRound(result) {
        if (!currentRoundContainer) return;
        const container = currentRoundContainer.closest('.round-container');
        if (container) {
            container.classList.remove('active');
            const dot = container.querySelector('.round-status-dot');
            if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }
        }
    }

    // =================== Input Helpers ===================
    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            executeTask();
        }
    }
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // =================== CRUD Modals ===================
    let modalConfigJson = {};
    let modalIteration = { enabled: false, max_iterations: 3, evaluator_prompt: '', feedback_strategy: 'full' };

    function getDefaultConfig(mode) {
        switch (mode) {
            case 'supervisor': return { parallel_execution: true, split_prompt: '', summary_prompt: '' };
            case 'pipeline': return { pass_context: true, step_prompt_template: '' };
            case 'voting': return { strategy: 'majority', aggregator_prompt: '' };
            case 'adversarial_game': return { turn_strategy: 'simultaneous', max_rounds: 10, game_rules: '', referee_enabled: true, referee_prompt: '', shared_state: {} };
            default: return {};
        }
    }

    async function openCreateModal() {
        const body = document.getElementById('modalBody');
        document.getElementById('modalTitle').textContent = '新建协作';
        modalConfigJson = getDefaultConfig('supervisor');
        modalIteration = { enabled: false, max_iterations: 3, evaluator_prompt: '', feedback_strategy: 'full' };

        body.innerHTML = `
            <div class="form-group"><label>名称</label><input class="modal-input" id="mName" placeholder="输入协作名称"></div>
            <div class="form-group"><label>模式</label><select class="modal-select" id="mMode" onchange="onModeChange()">
                ${Object.entries(MODE_NAMES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
            </select></div>
            <div class="form-group"><label>描述</label><input class="modal-input" id="mDesc" placeholder="可选"></div>
            <div class="form-group"><label>智能体角色</label><div id="mRoles"></div>
                <button class="btn" style="font-size:11px;margin-top:4px;" onclick="addRoleRow()">+ 添加角色</button>
            </div>
            <div id="modeParamsContainer"></div>
            <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCreate()">创建</button>
            </div>`;
        addDefaultRoles('supervisor');
        renderModeParams('supervisor');
        document.getElementById('collabModal').classList.add('active');
    }

    async function openEditModal() {
        if (!currentCollab) return;
        const body = document.getElementById('modalBody');
        document.getElementById('modalTitle').textContent = '编辑协作';
        const mode = currentCollab.mode;
        modalConfigJson = { ...getDefaultConfig(mode), ...(currentCollab.config_json || {}) };
        const iter = currentCollab.config_json?.iteration || {};
        modalIteration = { enabled: iter.enabled || false, max_iterations: iter.max_iterations || 3, evaluator_prompt: iter.evaluator_prompt || '', feedback_strategy: iter.feedback_strategy || 'full' };

        body.innerHTML = `
            <div class="form-group"><label>名称</label><input class="modal-input" id="mName" value="${escapeHtml(currentCollab.name)}"></div>
            <div class="form-group"><label>模式</label><select class="modal-select" id="mMode" onchange="onModeChange()">
                ${Object.entries(MODE_NAMES).map(([k,v])=>`<option value="${k}" ${k===mode?'selected':''}>${v}</option>`).join('')}
            </select></div>
            <div class="form-group"><label>描述</label><input class="modal-input" id="mDesc" value="${escapeHtml(currentCollab.description||'')}"></div>
            <div class="form-group"><label>智能体角色</label><div id="mRoles"></div>
                <button class="btn" style="font-size:11px;margin-top:4px;" onclick="addRoleRow()">+ 添加角色</button>
            </div>
            <div id="modeParamsContainer"></div>
            <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            </div>`;
        for (const a of (currentCollab.agents||[])) {
            addRoleRow(a.role, a.agent_id, a.is_human);
        }
        if (!(currentCollab.agents||[]).length) { addDefaultRoles(mode); }
        renderModeParams(mode);
        document.getElementById('collabModal').classList.add('active');
    }

    function onModeChange() {
        const mode = document.getElementById('mMode').value;
        modalConfigJson = getDefaultConfig(mode);
        const container = document.getElementById('mRoles');
        container.innerHTML = '';
        addDefaultRoles(mode);
        renderModeParams(mode);
    }

    function addDefaultRoles(mode) {
        if (mode === 'supervisor') {
            addRoleRow('supervisor'); addRoleRow('child'); addRoleRow('child');
        } else if (mode === 'pipeline') {
            addRoleRow('worker'); addRoleRow('worker'); addRoleRow('worker');
        } else if (mode === 'voting') {
            addRoleRow('voter'); addRoleRow('voter'); addRoleRow('voter'); addRoleRow('aggregator');
        } else if (mode === 'adversarial_game') {
            addRoleRow('participant'); addRoleRow('participant'); addRoleRow('referee');
        }
    }

    function renderModeParams(mode) {
        const container = document.getElementById('modeParamsContainer');
        if (!container) return;
        const cfg = modalConfigJson;
        let paramsHtml = '';

        if (mode === 'supervisor') {
            paramsHtml = `
                <div class="config-section">
                    <div class="config-section-title open" onclick="toggleConfigSection(this)">模式参数</div>
                    <div class="config-section-body open">
                        <div class="mode-param-group"><label>执行方式</label>
                            <select id="param_parallel" onchange="readParamsFromDom()">
                                <option value="true" ${cfg.parallel_execution !== false ? 'selected' : ''}>并行执行</option>
                                <option value="false" ${cfg.parallel_execution === false ? 'selected' : ''}>串行执行</option>
                            </select></div>
                        <div class="mode-param-group"><label>任务拆分提示词</label>
