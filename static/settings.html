<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - Quest3 Agent</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <style>
        body { padding: 20px; min-height: 100vh; }
        @media (max-width: 768px) { body { padding: 0; } .page-container { border-radius: 0; } }
    </style>
</head>
<body class="gradient-bg">
    <div class="page-container page-narrow">
        <div id="pageNav"></div>

        <div class="page-body">
            <!-- Setup Banner -->
            <div class="setup-banner" id="setupBanner" style="display: none;">
                <span class="icon">⚠️</span>
                <span class="text">检测到系统尚未完成初始配置，请先填写 LLM API Key 等必要参数，然后点击保存。</span>
            </div>

            <!-- Tabs -->
            <div class="tabs" data-tabs="settingsTabs">
                <button class="tab active" data-tab="llm">🤖 LLM 配置</button>
                <button class="tab" data-tab="memory">🧠 记忆配置</button>
                <button class="tab" data-tab="search">🔍 搜索配置</button>
                <button class="tab" id="userTab" data-tab="users" style="display:none;">👥 用户管理</button>
            </div>

            <!-- LLM Tab -->
            <div data-tab-panel="llm" class="tab-panel active" id="llmPanel">
                <div class="setting-group" id="llmSettings">
                    <div class="loading">加载中...</div>
                </div>
                <div style="margin-top: 16px;">
                    <button class="btn btn-success" onclick="testLLMConnection()">🔗 测试 LLM 连接</button>
                    <div class="test-result" id="testResult"></div>
                </div>
                <div class="actions-bar">
                    <button class="btn btn-primary" onclick="saveSettings('llm')">💾 保存 LLM 配置</button>
                </div>
            </div>

            <!-- Memory Tab -->
            <div data-tab-panel="memory" class="tab-panel" id="memoryPanel" style="display: none;">
                <div class="setting-group" id="memorySettings">
                    <div class="loading">加载中...</div>
                </div>
                <div class="actions-bar">
                    <button class="btn btn-primary" onclick="saveSettings('memory')">💾 保存记忆配置</button>
                </div>
            </div>

            <!-- Search Tab -->
            <div data-tab-panel="search" class="tab-panel" id="searchPanel" style="display: none;">
                <div class="setting-group" id="searchSettings">
                    <div class="loading">加载中...</div>
                </div>
                <div class="actions-bar">
                    <button class="btn btn-primary" onclick="saveSettings('search')">💾 保存搜索配置</button>
                </div>
            </div>

            <!-- Users Tab (admin only) -->
            <div data-tab-panel="users" class="tab-panel" id="usersPanel" style="display: none;">
                <div class="section-title">用户列表</div>
                <table class="user-table" id="userTable">
                    <thead>
                        <tr><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
                <div class="setting-group" style="margin-top: 20px; border: 2px dashed var(--border-dark);">
                    <h3 style="margin-bottom: 16px;">添加新用户</h3>
                    <div class="form-row">
                        <div class="form-field">
                            <label>用户名</label>
                            <input type="text" id="newUsername" class="form-control" placeholder="输入用户名">
                        </div>
                        <div class="form-field">
                            <label>密码</label>
                            <input type="password" id="newPassword" class="form-control" placeholder="输入密码">
                        </div>
                        <div class="form-field">
                            <label>角色</label>
                            <select id="newRole" class="form-control">
                                <option value="user">普通用户</option>
                                <option value="admin">管理员</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addUser()">➕ 添加用户</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/core/Auth.js"></script>
    <script src="/static/shared/utils.js"></script>
    <script src="/static/shared/toast.js"></script>
    <script src="/static/shared/modal.js"></script>
    <script src="/static/shared/tabs.js"></script>
    <script src="/static/shared/nav.js"></script>
    <script>
        const currentUser = Auth.requireAuth() ? Auth.getCurrentUser() : null;
        if (!currentUser) throw new Error('Not authenticated');

        SharedNav.render(document.getElementById('pageNav'), { active: 'settings' });

        // Show user management tab for admin
        if (currentUser.role === 'admin') {
            document.getElementById('userTab').style.display = '';
        }

        // Check if this is a first-time setup
        const params = new URLSearchParams(window.location.search);
        if (params.get('setup') === '1') {
            document.getElementById('setupBanner').style.display = 'flex';
        }

        // Listen for tab changes to load users
        document.addEventListener('tab-change', (e) => {
            if (e.detail.tab === 'users') loadUsers();
        });

        let allSettings = {};

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                allSettings = {};
                (data.settings || []).forEach(s => { allSettings[s.key] = s; });
                renderSettings('llm', 'llmSettings');
                renderSettings('memory', 'memorySettings');
                renderSettings('search', 'searchSettings');

                const initRes = await fetch('/api/settings/init-status');
                const initData = await initRes.json();
                if (!initData.initialized) document.getElementById('setupBanner').style.display = 'flex';
            } catch (e) { console.error('Failed to load settings:', e); }
        }

        function renderSettings(group, containerId) {
            const container = document.getElementById(containerId);
            const groupSettings = Object.values(allSettings).filter(s => s.group_name === group);
            if (groupSettings.length === 0) {
                container.innerHTML = '<div class="loading">暂无配置项</div>';
                return;
            }
            let html = '';
            groupSettings.forEach(s => {
                const isSecret = s.value_type === 'secret';
                const isEditable = s.editable === 1;
                const currentValue = s.display_value || '';
                html += `<div class="setting-item">`;
                html += `  <div class="setting-label">${s.description || s.key}<div class="desc">${s.key}</div></div>`;
                html += `  <div class="setting-input">`;
                if (isSecret) {
                    html += `    <div class="secret-field">`;
                    html += `      <input type="password" class="form-control" id="setting_${s.key}" value="${currentValue}" placeholder="点击编辑按钮修改" ${!isEditable ? 'disabled' : ''}>`;
                    html += `      <button class="toggle-btn" onclick="toggleSecret('${s.key}')">显示</button>`;
                    html += `    </div>`;
                } else if (s.value_type === 'boolean') {
                    const checked = currentValue === 'true' ? 'checked' : '';
                    html += `    <input type="checkbox" id="setting_${s.key}" ${checked} ${!isEditable ? 'disabled' : ''} style="width:auto; transform:scale(1.3);">`;
                } else {
                    html += `    <input type="text" class="form-control" id="setting_${s.key}" value="${currentValue}" ${!isEditable ? 'disabled' : ''}>`;
                }
                html += `  </div></div>`;
            });
            container.innerHTML = html;
        }

        function toggleSecret(key) {
            const input = document.getElementById(`setting_${key}`);
            const btn = input.parentElement.querySelector('.toggle-btn');
            if (input.type === 'password') { input.type = 'text'; btn.textContent = '隐藏'; }
            else { input.type = 'password'; btn.textContent = '显示'; }
        }

        async function saveSettings(group) {
            const groupSettings = Object.values(allSettings).filter(s => s.group_name === group);
            const updates = {};
            groupSettings.forEach(s => {
                const el = document.getElementById(`setting_${s.key}`);
                if (!el || !s.editable) return;
                let value;
                if (s.value_type === 'boolean') { value = el.checked ? 'true' : 'false'; }
                else {
                    value = el.value.trim();
                    if (s.value_type === 'secret' && value.startsWith('****')) return;
                }
                updates[s.key] = value;
            });
            if (Object.keys(updates).length === 0) { showToast('没有需要保存的更改', 'warning'); return; }
            try {
                const res = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ updates, user_role: currentUser.role })
                });
                const data = await res.json();
                if (data.success) { showToast('配置已保存'); await loadSettings(); }
                else showToast(data.error || '保存失败', 'error');
            } catch (e) { showToast('保存失败: ' + e.message, 'error'); }
        }

        async function testLLMConnection() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'test-result';
            resultDiv.textContent = '正在测试连接...';
            try {
                const res = await fetch('/api/settings/test-llm', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    resultDiv.className = 'test-result success';
                    resultDiv.textContent = `连接成功！模型响应预览: ${data.response_preview || '(空)'}`;
                } else {
                    resultDiv.className = 'test-result error';
                    resultDiv.textContent = `连接失败: ${data.error}`;
                }
            } catch (e) {
                resultDiv.className = 'test-result error';
                resultDiv.textContent = `测试出错: ${e.message}`;
            }
        }

        // User Management
        async function loadUsers() {
            if (!Auth.isAdmin()) return;
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                renderUsers(data.users || []);
            } catch (e) { console.error('Failed to load users:', e); }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${Utils.escapeHtml(u.username)}</td>
                    <td><span class="role-badge ${u.role}">${u.role === 'admin' ? '管理员' : '普通用户'}</span></td>
                    <td>${u.created_at ? new Date(u.created_at).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) : '-'}</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="editUserPassword('${u.id}', '${Utils.escapeHtml(u.username)}')">改密码</button>
                        ${u.username !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}', '${Utils.escapeHtml(u.username)}')">删除</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addUser() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;
            if (!username || !password) { showToast('请填写用户名和密码', 'error'); return; }
            try {
                const res = await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, role, current_user_role: currentUser.role }) });
                const data = await res.json();
                if (data.success) { showToast(`用户 ${username} 创建成功`); document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = ''; await loadUsers(); }
                else showToast(data.error || '创建失败', 'error');
            } catch (e) { showToast('创建失败: ' + e.message, 'error'); }
        }

        function editUserPassword(userId, username) {
            const newPassword = prompt(`为用户 ${username} 设置新密码:`);
            if (!newPassword) return;
            fetch(`/api/users/${userId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: newPassword, current_user_role: currentUser.role }) })
                .then(res => res.json())
                .then(data => { if (data.success) showToast('密码已更新'); else showToast(data.error || '更新失败', 'error'); })
                .catch(() => showToast('更新失败', 'error'));
        }

        function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 ${username} 吗？`)) return;
            fetch(`/api/users/${userId}?current_user_role=${currentUser.role}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => { if (data.success) { showToast('用户已删除'); loadUsers(); } else showToast(data.error || '删除失败', 'error'); })
                .catch(() => showToast('删除失败', 'error'));
        }

        loadSettings();
    </script>
</body>
</html>
