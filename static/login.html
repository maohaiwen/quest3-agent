<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Quest3 Agent</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-logo { width: 56px; height: 56px; border-radius: var(--radius-md); background: var(--gradient); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-5); color: white; }
        .login-logo svg { width: 28px; height: 28px; }
    </style>
</head>
<body class="gradient-bg">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M16 14h.01"/><path d="M8 14h.01"/><path d="M12 18v4"/><path d="M8 22h8"/><path d="M5 12a7 7 0 0 0 14 0"/></svg>
        </div>
        <h1>Quest3 Agent</h1>
        <p class="subtitle">请登录以继续</p>

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" class="form-control" placeholder="请输入用户名" autofocus>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" class="form-control" placeholder="请输入密码">
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">登录</button>

        <p class="hint">首次使用？默认账号: admin / Admin123</p>
    </div>

    <script src="/static/core/Auth.js"></script>
    <script src="/static/shared/toast.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = '/static/agent_manager.html';
        }

        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                await Auth.login(username, password);
                const res = await fetch('/api/settings/init-status');
                const data = await res.json();

                if (!data.initialized) {
                    window.location.href = '/static/settings.html?setup=1';
                } else {
                    window.location.href = '/static/agent_manager.html';
                }
            } catch (e) {
                showToast(e.message || '登录失败', 'error');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
    </script>
</body>
</html>
